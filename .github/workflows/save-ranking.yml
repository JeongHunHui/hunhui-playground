name: Save Vampire Ranking

on:
  workflow_dispatch:
    inputs:
      initials:
        description: '이니셜 (1-3자)'
        required: true
      time:
        description: '생존 시간(초)'
        required: true
      kills:
        description: '처치 수'
        required: true
      level:
        description: '레벨'
        required: true
      token:
        description: '검증 토큰'
        required: true

jobs:
  save:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.token == 'vamp2026' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install google-auth google-auth-httplib2 google-api-python-client
      - name: Validate & Save
        env:
          INITIALS: ${{ github.event.inputs.initials }}
          TIME: ${{ github.event.inputs.time }}
          KILLS: ${{ github.event.inputs.kills }}
          LEVEL: ${{ github.event.inputs.level }}
          SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: |
          python3 - << 'PYEOF'
          import os, re, json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from datetime import datetime

          initials = os.environ['INITIALS'].upper().strip()
          time_val = float(os.environ['TIME'])
          kills = int(os.environ['KILLS'])
          level = int(os.environ['LEVEL'])

          BAD = ['sex','ass','shit','wtf','kkk','nazi','dick','porn']
          assert re.match(r'^[A-Z가-힣ㄱ-ㅎ]{1,3}$', initials), "이니셜 오류"
          assert not any(w in initials.lower() for w in BAD), "사용 불가"
          assert 5 <= time_val <= 7200, "시간 범위"
          assert 0 <= kills <= 99999, "처치수 범위"

          sa_key = json.loads(os.environ['SA_KEY'])
          creds = service_account.Credentials.from_service_account_info(
              sa_key, scopes=['https://www.googleapis.com/auth/spreadsheets'])
          service = build('sheets', 'v4', credentials=creds)
          now = datetime.now().strftime('%Y-%m-%d %H:%M:%S')
          service.spreadsheets().values().append(
              spreadsheetId='1C-ZzU2SFfrQ5Wv76smw-3qsouT0c5CP9zuIB7DdvzV8',
              range='뱀파이어랭킹!A:E',
              valueInputOption='RAW',
              insertDataOption='INSERT_ROWS',
              body={'values': [[initials, int(time_val), kills, level, now]]}
          ).execute()
          print(f"저장 완료: {initials} / {int(time_val)}초 / {kills}킬 / lv{level}")
          PYEOF
