<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎹 절대음감 테스트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a; color: #f0f0f0;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }
    .bg-blur { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.2; animation: float 10s ease-in-out infinite; }
    .blob-1 { width: 500px; height: 500px; background: #6366f1; top: -100px; left: -100px; }
    .blob-2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -80px; right: -80px; animation-delay: 4s; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    .container { position: relative; z-index: 1; width: 100%; max-width: 520px; text-align: center; }
    .back-btn {
      position: fixed; top: 16px; left: 16px; color: #94a3b8; text-decoration: none;
      font-size: 0.9rem; display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 14px; border-radius: 99px; transition: all 0.2s;
    }
    .back-btn:hover { color: #f0f0f0; background: rgba(255,255,255,0.1); }
    h1 { font-size: 2.4rem; font-weight: 800; margin-bottom: 8px;
      background: linear-gradient(135deg, #e0e7ff, #a5b4fc, #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #64748b; font-size: 0.95rem; margin-bottom: 24px; }
    .mode-tabs { display: flex; gap: 8px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
    .mode-tab {
      padding: 8px 18px; border-radius: 99px; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04); color: #64748b; transition: all 0.2s;
    }
    .mode-tab.active { background: rgba(99,102,241,0.2); border-color: rgba(99,102,241,0.5); color: #a5b4fc; }
    .score-bar {
      display: flex; justify-content: space-between;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 14px 20px; margin-bottom: 16px;
    }
    .score-item { display: flex; flex-direction: column; gap: 4px; }
    .score-label { color: #64748b; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .score-value { font-size: 1.5rem; font-weight: 700; color: #a5b4fc; }
    .streak-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.3);
      color: #fbbf24; border-radius: 99px; padding: 4px 14px;
      font-size: 0.8rem; font-weight: 700; margin-bottom: 14px;
      opacity: 0; transition: opacity 0.3s;
    }
    .streak-badge.visible { opacity: 1; }
    .play-area {
      background: rgba(99,102,241,0.07); border: 1px solid rgba(99,102,241,0.2);
      border-radius: 24px; padding: 28px 24px; margin-bottom: 20px;
    }
    .note-display { font-size: 4rem; margin-bottom: 10px; transition: transform 0.2s; }
    .note-display.playing { animation: pop 0.3s ease-out; }
    @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
    .play-hint { color: #475569; font-size: 0.85rem; margin-bottom: 18px; }
    .play-btn {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: white; border: none; border-radius: 99px;
      padding: 13px 36px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 0 24px rgba(99,102,241,0.4);
    }
    .play-btn:hover { transform: scale(1.05); }
    .play-btn:active { transform: scale(0.97); }
    .play-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .keys-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
    .key-btn {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px; padding: 14px 6px; color: #e2e8f0;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
      display: flex; flex-direction: column; gap: 3px; align-items: center;
    }
    .key-btn .solfege { font-size: 0.65rem; color: #64748b; }
    .key-btn:hover { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.4); }
    .key-btn:active { transform: scale(0.95); }
    .key-btn.correct { background: rgba(34,197,94,0.2); border-color: #22c55e; color: #4ade80; animation: correctFlash 0.4s; }
    .key-btn.wrong { background: rgba(239,68,68,0.2); border-color: #ef4444; color: #f87171; animation: shake 0.3s; }
    .key-btn.reveal { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.4); }
    @keyframes correctFlash { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .feedback { font-size: 1rem; font-weight: 600; height: 26px; }
    .feedback.correct { color: #4ade80; }
    .feedback.wrong { color: #f87171; }
    .game-over-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
    }
    .game-over-overlay.show { display: flex; }
    .game-over-box {
      background: #1a1a2e; border: 1px solid rgba(99,102,241,0.3);
      border-radius: 24px; padding: 36px 44px; text-align: center;
    }
    .game-over-box h2 { font-size: 1.8rem; margin-bottom: 6px; }
    .final-score { font-size: 3rem; font-weight: 800; color: #a5b4fc; margin: 14px 0; }
    .game-over-box p { color: #64748b; margin-bottom: 22px; }
    .restart-btn {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: white; border: none; border-radius: 99px;
      padding: 12px 32px; font-size: 0.95rem; font-weight: 600;
      cursor: pointer;
    }
    .restart-btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>
<div class="bg-blur"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
<a class="back-btn" href="/">← 홈</a>
<div class="container">
  <h1>🎹 절대음감</h1>
  <p class="subtitle">음을 듣고 정확히 맞춰보세요</p>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('basic')">기본 (도~시)</button>
    <button class="mode-tab" onclick="setMode('chromatic')">크로매틱 (반음포함)</button>
    <button class="mode-tab" onclick="setMode('timed')">타임어택 ⚡</button>
  </div>
  <div class="score-bar">
    <div class="score-item"><span class="score-label">점수</span><span class="score-value" id="scoreVal">0</span></div>
    <div class="score-item"><span class="score-label">정답률</span><span class="score-value" id="accuracyVal">-</span></div>
    <div class="score-item"><span class="score-label" id="thirdLabel">연속</span><span class="score-value" id="thirdVal">0</span></div>
  </div>
  <div class="streak-badge" id="streakBadge">🔥 <span id="streakNum">0</span>연속!</div>
  <div class="play-area">
    <div class="note-display" id="noteDisplay">🎵</div>
    <p class="play-hint" id="playHint">버튼을 눌러 음을 들어보세요</p>
    <button class="play-btn" id="playBtn" onclick="playCurrentNote()">▶ 음 듣기</button>
  </div>
  <div class="keys-grid" id="keysGrid"></div>
  <div class="feedback" id="feedback"></div>
</div>
<div class="game-over-overlay" id="gameOverOverlay">
  <div class="game-over-box">
    <h2>⏰ 시간 종료!</h2>
    <div class="final-score" id="finalScore">0점</div>
    <p id="finalAcc">정답률 -</p>
    <button class="restart-btn" onclick="restartGame()">다시 하기</button>
  </div>
</div>
<script>
const BASIC=[
  {key:'C4',name:'C',sf:'도',freq:261.63},
  {key:'D4',name:'D',sf:'레',freq:293.66},
  {key:'E4',name:'E',sf:'미',freq:329.63},
  {key:'F4',name:'F',sf:'파',freq:349.23},
  {key:'G4',name:'G',sf:'솔',freq:392.00},
  {key:'A4',name:'A',sf:'라',freq:440.00},
  {key:'B4',name:'B',sf:'시',freq:493.88},
];
const CHROMATIC=[
  {key:'C4',name:'C',sf:'도',freq:261.63},{key:'Cs4',name:'C#',sf:'도#',freq:277.18},
  {key:'D4',name:'D',sf:'레',freq:293.66},{key:'Ds4',name:'D#',sf:'레#',freq:311.13},
  {key:'E4',name:'E',sf:'미',freq:329.63},{key:'F4',name:'F',sf:'파',freq:349.23},
  {key:'Fs4',name:'F#',sf:'파#',freq:369.99},{key:'G4',name:'G',sf:'솔',freq:392.00},
  {key:'Gs4',name:'G#',sf:'솔#',freq:415.30},{key:'A4',name:'A',sf:'라',freq:440.00},
  {key:'As4',name:'A#',sf:'라#',freq:466.16},{key:'B4',name:'B',sf:'시',freq:493.88},
];
let audioCtx=null,currentNote=null,score=0,total=0,streak=0;
let answered=false,mode='basic',timerInterval=null,timeLeft=60;
let currentNotes=BASIC,played=false;

function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playFreq(freq,dur=1.4){
  const ctx=getCtx();
  [[freq,0.6],[freq*2,0.25],[freq*3,0.08]].forEach(([f,g])=>{
    const o=ctx.createOscillator(),gn=ctx.createGain();
    o.connect(gn);gn.connect(ctx.destination);
    o.type='sine';o.frequency.value=f;
    gn.gain.setValueAtTime(g,ctx.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start();o.stop(ctx.currentTime+dur);
  });
  const nd=document.getElementById('noteDisplay');
  nd.classList.remove('playing');void nd.offsetWidth;nd.classList.add('playing');
}

function pickNewNote(){
  currentNote=currentNotes[Math.floor(Math.random()*currentNotes.length)];
  answered=false;played=false;
  document.getElementById('noteDisplay').textContent='🎵';
  document.getElementById('playHint').textContent='버튼을 눌러 음을 들어보세요';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('playBtn').textContent='▶ 음 듣기';
  document.getElementById('playBtn').disabled=false;
  document.querySelectorAll('.key-btn').forEach(b=>{b.disabled=false;b.className='key-btn';});
}

function playCurrentNote(){
  if(!currentNote)return;
  playFreq(currentNote.freq);
  played=true;
  document.getElementById('playHint').textContent='어떤 음일까요?';
  document.getElementById('playBtn').textContent='↺ 다시 듣기';
}

function guess(key){
  if(answered){return;}
  if(!played){
    document.getElementById('feedback').textContent='먼저 음을 들어보세요!';
    document.getElementById('feedback').className='feedback wrong';return;
  }
  answered=true;total++;
  const ok=key===currentNote.key;
  document.querySelectorAll('.key-btn').forEach(b=>{
    b.disabled=true;
    if(b.dataset.key===currentNote.key)b.classList.add('reveal');
  });
  const btn=document.querySelector('.key-btn[data-key="'+key+'"]');
  if(ok){
    score++;streak++;
    btn.classList.add('correct');
    document.getElementById('feedback').textContent='🎉 정답!';
    document.getElementById('feedback').className='feedback correct';
    document.getElementById('noteDisplay').textContent='🎵 '+currentNote.name+' ('+currentNote.sf+')';
  } else {
    streak=0;
    btn.classList.add('wrong');
    document.getElementById('feedback').textContent='❌ 틀림! 정답: '+currentNote.name+' ('+currentNote.sf+')';
    document.getElementById('feedback').className='feedback wrong';
    document.getElementById('noteDisplay').textContent='😢 '+currentNote.name+' ('+currentNote.sf+')';
    setTimeout(()=>playFreq(currentNote.freq),400);
  }
  updateUI();
  setTimeout(pickNewNote,mode==='timed'?900:1600);
}

function updateUI(){
  document.getElementById('scoreVal').textContent=score;
  const acc=total>0?Math.round(score/total*100):0;
  document.getElementById('accuracyVal').textContent=total>0?acc+'%':'-';
  if(mode!=='timed'){document.getElementById('thirdVal').textContent=streak;}
  const b=document.getElementById('streakBadge');
  document.getElementById('streakNum').textContent=streak;
  b.classList.toggle('visible',streak>=3);
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-tab').forEach((t,i)=>{
    t.classList.toggle('active',['basic','chromatic','timed'][i]===m);
  });
  currentNotes=m==='chromatic'?CHROMATIC:BASIC;
  restartGame();
}

function startTimer(){
  clearInterval(timerInterval);timeLeft=60;
  document.getElementById('thirdLabel').textContent='남은시간';
  document.getElementById('thirdVal').textContent='60s';
  timerInterval=setInterval(()=>{
    timeLeft--;
    document.getElementById('thirdVal').textContent=timeLeft+'s';
    if(timeLeft<=0){clearInterval(timerInterval);endGame();}
  },1000);
}

function endGame(){
  const acc=total>0?Math.round(score/total*100):0;
  document.getElementById('finalScore').textContent=score+'점';
  document.getElementById('finalAcc').textContent='정답률 '+acc+'% ('+score+'/'+total+')';
  document.getElementById('gameOverOverlay').classList.add('show');
}

function restartGame(){
  clearInterval(timerInterval);
  score=0;total=0;streak=0;played=false;
  updateUI();
  document.getElementById('gameOverOverlay').classList.remove('show');
  document.getElementById('streakBadge').classList.remove('visible');
  buildKeys();pickNewNote();
  if(mode==='timed'){startTimer();}
  else{
    document.getElementById('thirdLabel').textContent='연속';
    document.getElementById('thirdVal').textContent='0';
  }
}

function buildKeys(){
  const grid=document.getElementById('keysGrid');
  grid.innerHTML='';
  currentNotes.forEach(n=>{
    const btn=document.createElement('button');
    btn.className='key-btn';btn.dataset.key=n.key;
    btn.innerHTML='<span>'+n.name+'</span><span class="solfege">'+n.sf+'</span>';
    btn.onclick=()=>guess(n.key);
    grid.appendChild(btn);
  });
}

buildKeys();pickNewNote();
</script>
</body>
</html>
