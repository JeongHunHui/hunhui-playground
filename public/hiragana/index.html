<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🇯🇵 히라가나 마스터</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a; color: #f0f0f0;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }
    .bg-blur { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: float 10s ease-in-out infinite; }
    .blob-1 { width: 500px; height: 500px; background: #ec4899; top: -120px; left: -100px; }
    .blob-2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -80px; right: -80px; animation-delay: 4s; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
    .back-btn {
      position: fixed; top: 16px; left: 16px; color: #94a3b8; text-decoration: none;
      font-size: 0.9rem; display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 14px; border-radius: 99px; transition: all 0.2s;
    }
    .back-btn:hover { color: #f0f0f0; background: rgba(255,255,255,0.1); }
    .container { position: relative; z-index: 1; width: 100%; max-width: 560px; text-align: center; }
    h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 6px;
      background: linear-gradient(135deg, #fce7f3, #f9a8d4, #ec4899);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 20px; }

    /* Mode tabs */
    .mode-tabs { display: flex; gap: 8px; margin-bottom: 16px; justify-content: center; flex-wrap: wrap; }
    .mode-tab {
      padding: 7px 16px; border-radius: 99px; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04); color: #64748b; transition: all 0.2s;
    }
    .mode-tab.active { background: rgba(236,72,153,0.2); border-color: rgba(236,72,153,0.5); color: #f9a8d4; }

    /* Score */
    .score-bar {
      display: flex; justify-content: space-between;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 12px 20px; margin-bottom: 16px;
    }
    .score-item { display: flex; flex-direction: column; gap: 3px; }
    .score-label { color: #64748b; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .score-value { font-size: 1.4rem; font-weight: 700; color: #f9a8d4; }

    /* Streak */
    .streak-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.3);
      color: #fbbf24; border-radius: 99px; padding: 4px 14px;
      font-size: 0.8rem; font-weight: 700; margin-bottom: 14px;
      opacity: 0; transition: opacity 0.3s;
    }
    .streak-badge.visible { opacity: 1; }

    /* Card */
    .card {
      background: rgba(236,72,153,0.07); border: 1px solid rgba(236,72,153,0.2);
      border-radius: 24px; padding: 32px 24px; margin-bottom: 20px;
    }
    .kana-display {
      font-size: 6rem; line-height: 1; margin-bottom: 12px;
      font-family: 'Hiragino Kana', 'Yu Gothic', serif;
      animation: none; transition: transform 0.2s;
    }
    .kana-display.pop { animation: pop 0.25s ease-out; }
    @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }
    .kana-hint { color: #475569; font-size: 0.85rem; min-height: 22px; margin-bottom: 4px; }

    /* Quiz mode: choices */
    .choices { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
    .choice-btn {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px; padding: 14px 10px;
      color: #e2e8f0; font-size: 1.1rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .choice-btn:hover { background: rgba(236,72,153,0.15); border-color: rgba(236,72,153,0.4); }
    .choice-btn:active { transform: scale(0.95); }
    .choice-btn.correct { background: rgba(34,197,94,0.2); border-color: #22c55e; color: #4ade80; animation: correctFlash 0.4s; }
    .choice-btn.wrong { background: rgba(239,68,68,0.2); border-color: #ef4444; color: #f87171; animation: shake 0.3s; }
    .choice-btn.reveal { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.4); }
    .choice-btn:disabled { cursor: not-allowed; }
    @keyframes correctFlash { 0%{transform:scale(1)} 50%{transform:scale(1.06)} 100%{transform:scale(1)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    /* Type mode: input */
    .type-input-wrap { display: flex; gap: 10px; justify-content: center; margin-bottom: 14px; }
    .type-input {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px; padding: 14px 20px; font-size: 1.2rem; font-weight: 600;
      color: #f0f0f0; outline: none; width: 200px; text-align: center;
      transition: border-color 0.2s;
    }
    .type-input:focus { border-color: rgba(236,72,153,0.5); }
    .type-input.correct { border-color: #22c55e; background: rgba(34,197,94,0.1); }
    .type-input.wrong { border-color: #ef4444; background: rgba(239,68,68,0.1); }
    .submit-btn {
      background: linear-gradient(135deg, #ec4899, #f472b6);
      color: white; border: none; border-radius: 14px;
      padding: 14px 24px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .submit-btn:hover { transform: scale(1.05); }
    .submit-btn:active { transform: scale(0.97); }

    /* Flashcard mode */
    .flashcard-wrap { perspective: 600px; margin-bottom: 14px; cursor: pointer; }
    .flashcard {
      width: 100%; height: 160px; position: relative;
      transform-style: preserve-3d; transition: transform 0.5s;
    }
    .flashcard.flipped { transform: rotateY(180deg); }
    .flashcard-face {
      position: absolute; inset: 0; border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
    }
    .flashcard-front {
      background: rgba(236,72,153,0.1); border: 1px solid rgba(236,72,153,0.25);
      font-size: 4.5rem; font-family: 'Hiragino Kana', 'Yu Gothic', serif;
    }
    .flashcard-back {
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
      transform: rotateY(180deg); font-size: 2rem; font-weight: 700; color: #4ade80;
      flex-direction: column; gap: 6px;
    }
    .flashcard-back .reading { font-size: 1rem; color: #64748b; }
    .flash-btns { display: flex; gap: 10px; justify-content: center; }
    .flash-btn {
      border: none; border-radius: 12px; padding: 10px 28px; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .flash-btn.know { background: rgba(34,197,94,0.2); border: 1px solid #22c55e; color: #4ade80; }
    .flash-btn.unknown { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; color: #f87171; }
    .flash-btn:hover { transform: scale(1.05); }

    .feedback { font-size: 1rem; font-weight: 600; height: 24px; }
    .feedback.correct { color: #4ade80; }
    .feedback.wrong { color: #f87171; }

    /* Table mode */
    .kana-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-bottom: 14px; }
    .kana-table th { color: #64748b; font-size: 0.7rem; text-transform: uppercase; padding: 8px 4px; }
    .kana-table td {
      text-align: center; padding: 8px 4px; border-radius: 8px;
      font-family: 'Hiragino Kana', 'Yu Gothic', serif;
    }
    .kana-table td span.r { font-size: 0.6rem; color: #64748b; display: block; font-family: sans-serif; }
    .kana-table td:not(:empty) { background: rgba(255,255,255,0.04); font-size: 1.4rem; cursor: default; }
    .kana-table tr:hover td:not(:empty) { background: rgba(236,72,153,0.1); }

    .progress-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 99px; margin-bottom: 16px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #ec4899, #f472b6); border-radius: 99px; transition: width 0.4s; }

    .game-over-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
    }
    .game-over-overlay.show { display: flex; }
    .game-over-box {
      background: #1a1a2e; border: 1px solid rgba(236,72,153,0.3);
      border-radius: 24px; padding: 36px 44px; text-align: center;
    }
    .game-over-box h2 { font-size: 1.8rem; margin-bottom: 6px; }
    .final-score { font-size: 3rem; font-weight: 800; color: #f9a8d4; margin: 14px 0; }
    .game-over-box p { color: #64748b; margin-bottom: 22px; }
    .restart-btn {
      background: linear-gradient(135deg, #ec4899, #f472b6);
      color: white; border: none; border-radius: 99px;
      padding: 12px 32px; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .restart-btn:hover { transform: scale(1.05); }

    /* Group filter */
    .group-filter { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 14px; }
    .group-chip {
      padding: 5px 12px; border-radius: 99px; font-size: 0.72rem; font-weight: 600;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04); color: #64748b; transition: all 0.15s;
    }
    .group-chip.on { background: rgba(236,72,153,0.2); border-color: rgba(236,72,153,0.5); color: #f9a8d4; }
  </style>
</head>
<body>
<div class="bg-blur"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
<a class="back-btn" href="/">← 홈</a>
<div class="container">
  <h1>🇯🇵 히라가나 마스터</h1>
  <p class="subtitle">히라가나를 완벽하게 외워보자!</p>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('quiz')">📝 퀴즈</button>
    <button class="mode-tab" onclick="setMode('type')">⌨️ 직접입력</button>
    <button class="mode-tab" onclick="setMode('flash')">🃏 플래시카드</button>
    <button class="mode-tab" onclick="setMode('table')">📊 일람표</button>
  </div>

  <div class="group-filter" id="groupFilter"></div>

  <div class="score-bar" id="scoreBar">
    <div class="score-item"><span class="score-label">점수</span><span class="score-value" id="scoreVal">0</span></div>
    <div class="score-item"><span class="score-label">정답률</span><span class="score-value" id="accuracyVal">-</span></div>
    <div class="score-item"><span class="score-label" id="thirdLabel">연속</span><span class="score-value" id="thirdVal">0</span></div>
  </div>

  <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="streak-badge" id="streakBadge">🔥 <span id="streakNum">0</span>연속!</div>

  <!-- Quiz mode -->
  <div id="quizArea">
    <div class="card">
      <div class="kana-display" id="kanaDisplay">あ</div>
      <div class="kana-hint" id="kanaHint">이 히라가나의 발음은?</div>
    </div>
    <div class="choices" id="choicesGrid"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <!-- Type mode -->
  <div id="typeArea" style="display:none">
    <div class="card">
      <div class="kana-display" id="kanaDisplayType">あ</div>
      <div class="kana-hint">로마자로 입력하세요 (예: a, ka, shi)</div>
    </div>
    <div class="type-input-wrap">
      <input class="type-input" id="typeInput" placeholder="입력..." autocomplete="off" autocapitalize="off" spellcheck="false" />
      <button class="submit-btn" onclick="submitType()">확인</button>
    </div>
    <div class="feedback" id="feedbackType"></div>
  </div>

  <!-- Flash mode -->
  <div id="flashArea" style="display:none">
    <div class="flashcard-wrap" onclick="flipCard()">
      <div class="flashcard" id="flashcard">
        <div class="flashcard-face flashcard-front" id="flashFront">あ</div>
        <div class="flashcard-face flashcard-back" id="flashBack">
          <span id="flashAnswer">a</span>
          <span class="reading" id="flashReading"></span>
        </div>
      </div>
    </div>
    <p style="color:#475569;font-size:0.82rem;margin-bottom:12px">카드를 클릭해서 뒤집어보세요</p>
    <div class="flash-btns" id="flashBtns" style="display:none">
      <button class="flash-btn unknown" onclick="flashResult(false)">😵 몰라</button>
      <button class="flash-btn know" onclick="flashResult(true)">✅ 알아!</button>
    </div>
    <div class="feedback" id="feedbackFlash"></div>
  </div>

  <!-- Table mode -->
  <div id="tableArea" style="display:none">
    <div class="card" style="padding:16px;overflow-x:auto">
      <table class="kana-table" id="kanaTable"></table>
    </div>
    <p style="color:#475569;font-size:0.8rem">전체 히라가나 일람 — 외운 것은 퀴즈로 테스트!</p>
  </div>
</div>

<div class="game-over-overlay" id="gameOverOverlay">
  <div class="game-over-box">
    <h2>🎉 완주!</h2>
    <div class="final-score" id="finalScore">0점</div>
    <p id="finalAcc">정답률 -</p>
    <button class="restart-btn" onclick="restartGame()">다시 하기</button>
  </div>
</div>

<script>
// All hiragana data
const HIRAGANA = [
  // Vowels
  {k:'あ',r:'a',group:'あ행'},{k:'い',r:'i',group:'あ행'},{k:'う',r:'u',group:'あ행'},{k:'え',r:'e',group:'あ행'},{k:'お',r:'o',group:'あ행'},
  // K
  {k:'か',r:'ka',group:'か행'},{k:'き',r:'ki',group:'か행'},{k:'く',r:'ku',group:'か행'},{k:'け',r:'ke',group:'か행'},{k:'こ',r:'ko',group:'か행'},
  // S
  {k:'さ',r:'sa',group:'さ행'},{k:'し',r:'shi',group:'さ행'},{k:'す',r:'su',group:'さ행'},{k:'せ',r:'se',group:'さ행'},{k:'そ',r:'so',group:'さ행'},
  // T
  {k:'た',r:'ta',group:'た행'},{k:'ち',r:'chi',group:'た행'},{k:'つ',r:'tsu',group:'た행'},{k:'て',r:'te',group:'た행'},{k:'と',r:'to',group:'た행'},
  // N
  {k:'な',r:'na',group:'な행'},{k:'に',r:'ni',group:'な행'},{k:'ぬ',r:'nu',group:'な행'},{k:'ね',r:'ne',group:'な행'},{k:'の',r:'no',group:'な행'},
  // H
  {k:'は',r:'ha',group:'は행'},{k:'ひ',r:'hi',group:'は행'},{k:'ふ',r:'fu',group:'は행'},{k:'へ',r:'he',group:'は행'},{k:'ほ',r:'ho',group:'は행'},
  // M
  {k:'ま',r:'ma',group:'ま행'},{k:'み',r:'mi',group:'ま행'},{k:'む',r:'mu',group:'ま행'},{k:'め',r:'me',group:'ま행'},{k:'も',r:'mo',group:'ま행'},
  // Y
  {k:'や',r:'ya',group:'や행'},{k:'ゆ',r:'yu',group:'や행'},{k:'よ',r:'yo',group:'や행'},
  // R
  {k:'ら',r:'ra',group:'ら행'},{k:'り',r:'ri',group:'ら행'},{k:'る',r:'ru',group:'ら행'},{k:'れ',r:'re',group:'ら행'},{k:'ろ',r:'ro',group:'ら행'},
  // W
  {k:'わ',r:'wa',group:'わ행'},{k:'を',r:'wo',group:'わ행'},
  // N
  {k:'ん',r:'n',group:'ん'},
  // Dakuten
  {k:'が',r:'ga',group:'탁음'},{k:'ぎ',r:'gi',group:'탁음'},{k:'ぐ',r:'gu',group:'탁음'},{k:'げ',r:'ge',group:'탁음'},{k:'ご',r:'go',group:'탁음'},
  {k:'ざ',r:'za',group:'탁음'},{k:'じ',r:'ji',group:'탁음'},{k:'ず',r:'zu',group:'탁음'},{k:'ぜ',r:'ze',group:'탁음'},{k:'ぞ',r:'zo',group:'탁음'},
  {k:'だ',r:'da',group:'탁음'},{k:'ぢ',r:'di',group:'탁음'},{k:'づ',r:'du',group:'탁음'},{k:'で',r:'de',group:'탁음'},{k:'ど',r:'do',group:'탁음'},
  {k:'ば',r:'ba',group:'탁음'},{k:'び',r:'bi',group:'탁음'},{k:'ぶ',r:'bu',group:'탁음'},{k:'べ',r:'be',group:'탁음'},{k:'ぼ',r:'bo',group:'탁음'},
  // Handakuten
  {k:'ぱ',r:'pa',group:'반탁음'},{k:'ぴ',r:'pi',group:'반탁음'},{k:'ぷ',r:'pu',group:'반탁음'},{k:'ぺ',r:'pe',group:'반탁음'},{k:'ぽ',r:'po',group:'반탁음'},
];

const ALL_GROUPS = [...new Set(HIRAGANA.map(h=>h.group))];
let activeGroups = new Set(ALL_GROUPS.filter(g=>['あ행','か행','さ행','た행','な행'].includes(g)));

let mode = 'quiz';
let pool = [];
let currentItem = null;
let score = 0, total = 0, streak = 0;
let answered = false;
let flashFlipped = false;
let flashQueue = [];

// Build group filter chips
function buildGroupFilter() {
  const el = document.getElementById('groupFilter');
  el.innerHTML = '';
  ALL_GROUPS.forEach(g => {
    const chip = document.createElement('button');
    chip.className = 'group-chip' + (activeGroups.has(g) ? ' on' : '');
    chip.textContent = g;
    chip.onclick = () => toggleGroup(g, chip);
    el.appendChild(chip);
  });
}
function toggleGroup(g, chip) {
  if (activeGroups.has(g)) {
    if (activeGroups.size === 1) return;
    activeGroups.delete(g);
    chip.classList.remove('on');
  } else {
    activeGroups.add(g);
    chip.classList.add('on');
  }
  rebuildPool();
  restartGame();
}

function getPool() {
  return HIRAGANA.filter(h => activeGroups.has(h.group));
}

function rebuildPool() {
  pool = [...getPool()];
  shuffle(pool);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pickRandom(exclude) {
  const p = getPool().filter(h => h.k !== exclude);
  return p[Math.floor(Math.random() * p.length)];
}

// ---- QUIZ MODE ----
function nextQuiz() {
  if (pool.length === 0) rebuildPool();
  currentItem = pool.pop();
  answered = false;

  const nd = document.getElementById('kanaDisplay');
  nd.textContent = currentItem.k;
  nd.classList.remove('pop'); void nd.offsetWidth; nd.classList.add('pop');
  document.getElementById('kanaHint').textContent = 'この히라가나의 발음은?';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  // Build 4 choices
  const choices = [currentItem];
  while (choices.length < 4) {
    const c = pickRandom(currentItem.k);
    if (!choices.find(x=>x.k===c.k)) choices.push(c);
  }
  shuffle(choices);

  const grid = document.getElementById('choicesGrid');
  grid.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.r;
    btn.dataset.key = c.k;
    btn.onclick = () => guessQuiz(c.k, btn);
    grid.appendChild(btn);
  });

  updateProgress();
}

function guessQuiz(key, btn) {
  if (answered) return;
  answered = true;
  total++;
  const ok = key === currentItem.k;
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.key === currentItem.k) b.classList.add('reveal');
  });
  if (ok) {
    score++; streak++;
    btn.classList.add('correct');
    document.getElementById('feedback').textContent = '🎉 정답! ' + currentItem.r;
    document.getElementById('feedback').className = 'feedback correct';
  } else {
    streak = 0;
    btn.classList.add('wrong');
    document.getElementById('feedback').textContent = '❌ 오답! 정답: ' + currentItem.r;
    document.getElementById('feedback').className = 'feedback wrong';
  }
  updateScoreUI();
  checkComplete();
  setTimeout(nextQuiz, 1400);
}

// ---- TYPE MODE ----
function nextType() {
  if (pool.length === 0) rebuildPool();
  currentItem = pool.pop();
  answered = false;
  const nd = document.getElementById('kanaDisplayType');
  nd.textContent = currentItem.k;
  nd.classList.remove('pop'); void nd.offsetWidth; nd.classList.add('pop');
  const inp = document.getElementById('typeInput');
  inp.value = '';
  inp.className = 'type-input';
  inp.disabled = false;
  inp.focus();
  document.getElementById('feedbackType').textContent = '';
  document.getElementById('feedbackType').className = 'feedback';
  updateProgress();
}

function submitType() {
  if (answered) return;
  const inp = document.getElementById('typeInput');
  const val = inp.value.trim().toLowerCase();
  if (!val) return;
  answered = true;
  total++;
  const ok = val === currentItem.r || (currentItem.r === 'shi' && val === 'si') ||
    (currentItem.r === 'chi' && val === 'ti') || (currentItem.r === 'tsu' && val === 'tu') ||
    (currentItem.r === 'fu' && val === 'hu') || (currentItem.r === 'ji' && val === 'zi');
  inp.disabled = true;
  if (ok) {
    score++; streak++;
    inp.className = 'type-input correct';
    document.getElementById('feedbackType').textContent = '🎉 정답!';
    document.getElementById('feedbackType').className = 'feedback correct';
  } else {
    streak = 0;
    inp.className = 'type-input wrong';
    document.getElementById('feedbackType').textContent = '❌ 정답: ' + currentItem.r;
    document.getElementById('feedbackType').className = 'feedback wrong';
  }
  updateScoreUI();
  checkComplete();
  setTimeout(nextType, 1400);
}

// ---- FLASH MODE ----
function nextFlash() {
  if (flashQueue.length === 0) { flashQueue = [...getPool()]; shuffle(flashQueue); }
  currentItem = flashQueue.pop();
  flashFlipped = false;
  const card = document.getElementById('flashcard');
  card.classList.remove('flipped');
  document.getElementById('flashFront').textContent = currentItem.k;
  document.getElementById('flashAnswer').textContent = currentItem.r;
  document.getElementById('flashReading').textContent = '';
  document.getElementById('flashBtns').style.display = 'none';
  document.getElementById('feedbackFlash').textContent = '';
  updateProgress();
}

function flipCard() {
  if (flashFlipped) return;
  flashFlipped = true;
  document.getElementById('flashcard').classList.add('flipped');
  document.getElementById('flashBtns').style.display = 'flex';
}

function flashResult(knew) {
  if (!knew) { flashQueue.unshift(currentItem); }
  else { score++; streak++; total++; }
  if (!knew) { total++; streak = 0; }
  updateScoreUI();
  setTimeout(nextFlash, 300);
}

// ---- TABLE MODE ----
function buildTable() {
  const rows = [
    ['','あ行','か行','さ行','た行','な行','は行','ま行','や行','ら行','わ行'],
    ['a/i/u/e/o','あい','かき','さし','たち','なに','はひ','まみ','や','らり','わ'],
  ];
  const groups = [
    HIRAGANA.filter(h=>h.group==='あ行').slice(0,5),
    HIRAGANA.filter(h=>h.group==='か行').slice(0,5),
    HIRAGANA.filter(h=>h.group==='さ行').slice(0,5),
    HIRAGANA.filter(h=>h.group==='た行').slice(0,5),
    HIRAGANA.filter(h=>h.group==='な행').slice(0,5),
    HIRAGANA.filter(h=>h.group==='は행').slice(0,5),
    HIRAGANA.filter(h=>h.group==='ま행').slice(0,5),
    HIRAGANA.filter(h=>h.group==='や行'),
    HIRAGANA.filter(h=>h.group==='ら行').slice(0,5),
    HIRAGANA.filter(h=>h.group==='わ行'),
  ];

  // Simple flat table
  const allGroups = ALL_GROUPS;
  const table = document.getElementById('kanaTable');
  table.innerHTML = '';
  // Header
  const hr = table.insertRow();
  const th = document.createElement('th'); th.textContent = '행'; hr.appendChild(th);
  ['a','i','u','e','o'].forEach(v=>{
    const th2 = document.createElement('th'); th2.textContent = v; hr.appendChild(th2);
  });

  // Rows per group
  const mainGroups = ['あ행','か행','さ행','た행','な행','は행','ま행','や행','ら행','わ행','ん','탁음','반탁음'];
  const vowels = ['a','i','u','e','o'];
  mainGroups.forEach(g => {
    const items = HIRAGANA.filter(h=>h.group===g);
    if (!items.length) return;
    const tr = table.insertRow();
    const td0 = document.createElement('td');
    td0.style.cssText='color:#64748b;font-size:0.75rem;font-family:sans-serif;white-space:nowrap';
    td0.textContent = g; tr.appendChild(td0);

    if (g === 'ん') {
      const td = document.createElement('td');
      td.innerHTML = items[0].k + '<span class="r">'+items[0].r+'</span>';
      td.colSpan = 5; tr.appendChild(td);
    } else {
      vowels.forEach(v => {
        const item = items.find(h => h.r.endsWith(v) || h.r === v || (v==='i'&&(h.r==='shi'||h.r==='chi'||h.r==='ni'||h.r==='ji')) || (v==='u'&&(h.r==='tsu'||h.r==='fu'||h.r==='zu'||h.r==='du')));
        const td = document.createElement('td');
        if (item) {
          td.innerHTML = item.k + '<span class="r">'+item.r+'</span>';
        }
        tr.appendChild(td);
      });
    }
  });
}

// Shared
function updateScoreUI() {
  document.getElementById('scoreVal').textContent = score;
  const acc = total > 0 ? Math.round(score/total*100) : 0;
  document.getElementById('accuracyVal').textContent = total > 0 ? acc+'%' : '-';
  document.getElementById('thirdVal').textContent = streak;
  const badge = document.getElementById('streakBadge');
  document.getElementById('streakNum').textContent = streak;
  badge.classList.toggle('visible', streak >= 3);
}

function updateProgress() {
  const p = getPool();
  const done = p.length - pool.length;
  const pct = p.length > 0 ? (done / p.length * 100) : 0;
  document.getElementById('progressFill').style.width = Math.min(pct, 100) + '%';
}

function checkComplete() {
  if (pool.length === 0 && total > 0) {
    const acc = Math.round(score/total*100);
    document.getElementById('finalScore').textContent = score + '점';
    document.getElementById('finalAcc').textContent = '정답률 ' + acc + '% (' + score + '/' + total + ')';
    setTimeout(() => document.getElementById('gameOverOverlay').classList.add('show'), 1600);
  }
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach((t,i) => {
    t.classList.toggle('active', ['quiz','type','flash','table'][i] === m);
  });
  ['quizArea','typeArea','flashArea','tableArea'].forEach((id,i) => {
    document.getElementById(id).style.display = ['quiz','type','flash','table'][i] === m ? '' : 'none';
  });
  const showScore = m !== 'table';
  document.getElementById('scoreBar').style.display = showScore ? '' : 'none';
  document.getElementById('progressBar').style.display = showScore ? '' : 'none';
  document.getElementById('groupFilter').style.display = m !== 'table' ? '' : 'none';
  restartGame();
}

function restartGame() {
  score = 0; total = 0; streak = 0;
  updateScoreUI();
  document.getElementById('gameOverOverlay').classList.remove('show');
  document.getElementById('streakBadge').classList.remove('visible');
  rebuildPool();

  if (mode === 'quiz') nextQuiz();
  else if (mode === 'type') nextType();
  else if (mode === 'flash') { flashQueue = [...getPool()]; shuffle(flashQueue); nextFlash(); }
  else if (mode === 'table') buildTable();
}

// Enter key for type mode
document.getElementById('typeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitType();
});

buildGroupFilter();
restartGame();
</script>
