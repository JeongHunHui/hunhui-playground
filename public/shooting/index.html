<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🚀 스페이스 슈터 - 훈희 플레이그라운드</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  overflow:hidden;
}
#ui {
  position:fixed;
  top:0; left:0; right:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(4px);
  z-index:10;
  font-size:16px;
  font-weight:bold;
}
#score-val { color:#00ffcc; font-size:20px; }
#wave-val { color:#ffaa00; font-size:20px; }
canvas { display:block; cursor:crosshair; touch-action:none; }
#overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.85);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:20; text-align:center; padding:20px;
}
#overlay h1 { font-size:clamp(2rem,5vw,3rem); margin-bottom:16px; }
#overlay p { font-size:1.1rem; color:#aaa; margin-bottom:8px; }
.score-big { font-size:2rem; color:#00ffcc; margin:16px 0; }
#btn {
  margin-top:24px; padding:14px 40px;
  font-size:1.2rem; font-weight:bold;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border:none; border-radius:12px; color:#fff;
  cursor:pointer; transition:transform 0.15s;
}
#btn:hover { transform:scale(1.05); }
.controls { margin-top:16px; font-size:0.9rem; color:#666; }
#back-btn {
  position:fixed; top:14px; left:16px; z-index:30;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  color:#fff; padding:6px 12px;
  border-radius:8px; font-size:14px;
  cursor:pointer; text-decoration:none;
}
#back-btn:hover { background:rgba(255,255,255,0.2); }
</style>
</head>
<body>
<a href="/" id="back-btn">← 홈</a>
<div id="ui">
  <div>❤️ <span id="lives-val">3</span></div>
  <div>🏆 <span id="score-val">0</span></div>
  <div>🌊 WAVE <span id="wave-val">1</span></div>
</div>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>🚀 스페이스 슈터</h1>
  <p>마우스로 조준 이동, 클릭/터치로 발사</p>
  <p>WASD / 방향키로도 이동 가능</p>
  <p>적을 모두 처치하면 다음 웨이브! 5웨이브마다 보스!</p>
  <div id="final-score"></div>
  <button id="btn" onclick="startGame()">게임 시작</button>
  <div class="controls">⚡ 파워업: 멀티샷 | 🛡 쉴드 | ❤️ 목숨</div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

let gameRunning=false,score=0,lives=3,wave=1;
let player,bullets,enemies,enemyBullets,particles,powerups;
let keys={},mouseDown=false,shootCooldown=0,waveComplete=false,waveTimer=0,animId;

class Player{
  constructor(){this.x=W/2;this.y=H-100;this.w=30;this.h=36;this.speed=5;this.invincible=0;this.power=1;this.powerTimer=0;this.shield=0;}
  update(){
    const s=this.speed;
    if(keys['ArrowLeft']||keys['a']||keys['A'])this.x=Math.max(this.w,this.x-s);
    if(keys['ArrowRight']||keys['d']||keys['D'])this.x=Math.min(W-this.w,this.x+s);
    if(keys['ArrowUp']||keys['w']||keys['W'])this.y=Math.max(80+this.h,this.y-s);
    if(keys['ArrowDown']||keys['s']||keys['S'])this.y=Math.min(H-this.h,this.y+s);
    if(this.invincible>0)this.invincible--;
    if(this.powerTimer>0){this.powerTimer--;if(this.powerTimer<=0)this.power=1;}
    if(this.shield>0)this.shield--;
  }
  draw(){
    if(this.invincible>0&&Math.floor(this.invincible/4)%2===0)return;
    ctx.save();ctx.translate(this.x,this.y);
    if(this.shield>0){ctx.beginPath();ctx.arc(0,0,40,0,Math.PI*2);ctx.strokeStyle='rgba(0,200,255,'+(this.shield/300)+')';ctx.lineWidth=3;ctx.stroke();}
    ctx.fillStyle='#00aaff';ctx.shadowBlur=15;ctx.shadowColor='#00aaff';
    ctx.beginPath();ctx.moveTo(0,-this.h/2);ctx.lineTo(this.w/2,this.h/2);ctx.lineTo(0,this.h/3);ctx.lineTo(-this.w/2,this.h/2);ctx.closePath();ctx.fill();
    ctx.fillStyle='#aaddff';ctx.beginPath();ctx.ellipse(0,-5,8,12,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

class Bullet{
  constructor(x,y,vx,vy,isEnemy,pw){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.isEnemy=isEnemy;this.power=pw||1;this.r=isEnemy?5:4;this.life=1;}
  update(){this.x+=this.vx;this.y+=this.vy;if(this.y<-20||this.y>H+20||this.x<-20||this.x>W+20)this.life=0;}
  draw(){
    ctx.save();
    if(this.isEnemy){ctx.shadowBlur=10;ctx.shadowColor='#ff4400';ctx.fillStyle='#ff6600';}
    else{ctx.shadowBlur=15;ctx.shadowColor='#00ffaa';ctx.fillStyle='#00ffcc';}
    ctx.beginPath();ctx.ellipse(this.x,this.y,this.r,this.r*2.5,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

class Enemy{
  constructor(x,y,type,w){
    this.x=x;this.y=y;this.type=type;this.wv=w;
    this.shootTimer=Math.random()*120;this.life=1;this.angle=0;this.moveAngle=Math.random()*Math.PI*2;
    switch(type){
      case 0:this.hp=1;this.maxHp=1;this.size=22;this.speed=1+w*0.2;this.pts=10;this.color='#ff4444';break;
      case 1:this.hp=1;this.maxHp=1;this.size=16;this.speed=2.5+w*0.3;this.pts=20;this.color='#ff9900';break;
      case 2:this.hp=3;this.maxHp=3;this.size=30;this.speed=0.6+w*0.1;this.pts=50;this.color='#aa44ff';break;
      case 3:this.hp=20+w*10;this.maxHp=20+w*10;this.size=55;this.speed=1;this.pts=500;this.color='#ff0055';break;
    }
    this.vx=(Math.random()-0.5)*this.speed;
    this.vy=this.speed*(0.3+Math.random()*0.4);
  }
  update(){
    if(this.type===3){this.x+=Math.sin(Date.now()/1000)*2;this.y+=0.3;if(this.y>H*0.35)this.y=H*0.35;}
    else if(this.type===1){this.moveAngle+=0.05;this.x+=Math.sin(this.moveAngle)*2;this.y+=this.vy;}
    else{this.x+=this.vx;this.y+=this.vy;if(this.x<this.size||this.x>W-this.size)this.vx*=-1;}
    if(this.y>H+this.size)this.life=0;
    this.angle+=0.02;
    this.shootTimer--;
    const rate=this.type===3?30:Math.max(20,80-wave*5);
    if(this.shootTimer<=0){this.shootTimer=rate+Math.random()*40;this.shoot();}
  }
  shoot(){
    if(this.type===3){
      for(let i=-2;i<=2;i++){const a=Math.PI/2+i*0.25;enemyBullets.push(new Bullet(this.x,this.y+this.size,Math.cos(a)*3,Math.sin(a)*3,true));}
    }else{
      const dx=player.x-this.x,dy=player.y-this.y,dist=Math.sqrt(dx*dx+dy*dy);
      const spd=this.type===1?5:3;
      enemyBullets.push(new Bullet(this.x,this.y,dx/dist*spd,dy/dist*spd,true));
    }
  }
  hit(){
    this.hp--;spawnParticles(this.x,this.y,this.color,5);
    if(this.hp<=0){this.life=0;score+=this.pts;spawnParticles(this.x,this.y,this.color,20);if(Math.random()<0.2)powerups.push(new PowerUp(this.x,this.y));}
  }
  draw(){
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.angle);
    ctx.shadowBlur=15;ctx.shadowColor=this.color;ctx.fillStyle=this.color;
    ctx.beginPath();
    if(this.type===3){
      ctx.moveTo(0,-this.size);ctx.lineTo(this.size*0.8,-this.size*0.4);ctx.lineTo(this.size,this.size*0.5);
      ctx.lineTo(0,this.size*0.2);ctx.lineTo(-this.size,this.size*0.5);ctx.lineTo(-this.size*0.8,-this.size*0.4);ctx.closePath();ctx.fill();
      ctx.rotate(-this.angle);const bw=100,bh=10;
      ctx.fillStyle='#333';ctx.fillRect(-bw/2,this.size+10,bw,bh);
      ctx.fillStyle='#ff0055';ctx.fillRect(-bw/2,this.size+10,bw*(this.hp/this.maxHp),bh);
    }else if(this.type===2){
      for(let i=0;i<6;i++){const a=i*Math.PI/3;i===0?ctx.moveTo(Math.cos(a)*this.size,Math.sin(a)*this.size):ctx.lineTo(Math.cos(a)*this.size,Math.sin(a)*this.size);}
      ctx.closePath();ctx.fill();
      if(this.maxHp>1){ctx.rotate(-this.angle);const bw=40;ctx.fillStyle='#333';ctx.fillRect(-bw/2,this.size+5,bw,6);ctx.fillStyle='#aa44ff';ctx.fillRect(-bw/2,this.size+5,bw*(this.hp/this.maxHp),6);}
    }else{
      ctx.moveTo(0,-this.size);ctx.lineTo(this.size*0.6,this.size*0.5);ctx.lineTo(-this.size*0.6,this.size*0.5);ctx.closePath();ctx.fill();
    }
    ctx.restore();
  }
}

class Particle{
  constructor(x,y,color){this.x=x;this.y=y;this.color=color;this.vx=(Math.random()-0.5)*8;this.vy=(Math.random()-0.5)*8;this.life=1;this.decay=0.02+Math.random()*0.04;this.r=2+Math.random()*4;}
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.1;this.life-=this.decay;}
  draw(){ctx.save();ctx.globalAlpha=this.life;ctx.fillStyle=this.color;ctx.shadowBlur=6;ctx.shadowColor=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();ctx.restore();}
}

class PowerUp{
  constructor(x,y){
    this.x=x;this.y=y;this.vy=1.5;this.life=1;this.angle=0;
    const r=Math.random();this.type=r<0.4?'power':(r<0.7?'shield':'life');
    this.colors={power:'#ffcc00',shield:'#00ccff',life:'#ff4488'};
    this.icons={power:'⚡',shield:'🛡',life:'❤️'};
  }
  update(){this.y+=this.vy;this.angle+=0.05;if(this.y>H+30)this.life=0;}
  draw(){
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.angle);
    ctx.shadowBlur=15;ctx.shadowColor=this.colors[this.type];
    ctx.strokeStyle=this.colors[this.type];ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.stroke();
    ctx.restore();
    ctx.font='18px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(this.icons[this.type],this.x,this.y);
  }
}

function spawnParticles(x,y,color,n){for(let i=0;i<n;i++)particles.push(new Particle(x,y,color));}

function spawnWave(){
  enemies=[];waveComplete=false;
  if(wave%5===0){
    enemies.push(new Enemy(W/2,80,3,wave));
  }else{
    const count=5+wave*2;
    const cols=Math.min(count,8);
    for(let i=0;i<count;i++){
      const r=Math.random();
      const type=wave<2?0:(r<0.3?1:(r<0.5?2:0));
      const x=80+(i%cols)*(W-160)/Math.max(cols-1,1);
      const y=100+Math.floor(i/cols)*60;
      enemies.push(new Enemy(x,y,type,wave));
    }
  }
}

function startGame(){
  score=0;lives=3;wave=1;
  bullets=[];enemyBullets=[];particles=[];powerups=[];
  player=new Player();spawnWave();
  overlay.style.display='none';
  gameRunning=true;
  if(animId)cancelAnimationFrame(animId);
  loop();
}

function loseLife(){
  lives--;spawnParticles(player.x,player.y,'#ff4444',30);
  player.invincible=120;
  if(lives<=0)gameOver();
}

function gameOver(){
  gameRunning=false;
  overlay.querySelector('h1').textContent='💥 게임 오버';
  document.getElementById('final-score').className='score-big';
  document.getElementById('final-score').textContent='최종 점수: '+score.toLocaleString();
  document.getElementById('btn').textContent='다시 하기';
  overlay.style.display='flex';
}

function shootPlayer(){
  const p=player.power;
  if(p===1)bullets.push(new Bullet(player.x,player.y-player.h/2,0,-12,false));
  else if(p===2){bullets.push(new Bullet(player.x-10,player.y-player.h/2,0,-12,false));bullets.push(new Bullet(player.x+10,player.y-player.h/2,0,-12,false));}
  else{bullets.push(new Bullet(player.x,player.y-player.h/2,0,-14,false));bullets.push(new Bullet(player.x-14,player.y-player.h/2,-1,-12,false));bullets.push(new Bullet(player.x+14,player.y-player.h/2,1,-12,false));}
}

const stars=[];
for(let i=0;i<120;i++)stars.push({x:Math.random()*3000,y:Math.random()*3000,s:Math.random()*2+0.5,sp:Math.random()*2+0.5});

function loop(){
  if(!gameRunning)return;
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  for(let s of stars){ctx.fillStyle='rgba(255,255,255,'+(0.2+s.s/4)+')';ctx.beginPath();ctx.arc(s.x%W,s.y%H,s.s*0.5,0,Math.PI*2);ctx.fill();s.y=(s.y+s.sp)%(H+10);}

  if(mouseDown&&shootCooldown<=0){shootPlayer();shootCooldown=8;}
  if(shootCooldown>0)shootCooldown--;

  player.update();player.draw();

  for(let b of bullets){b.update();if(b.life)b.draw();}
  bullets=bullets.filter(b=>b.life);
  for(let b of enemyBullets){b.update();if(b.life)b.draw();}
  enemyBullets=enemyBullets.filter(b=>b.life);
  for(let e of enemies){e.update();if(e.life)e.draw();}
  enemies=enemies.filter(e=>e.life);
  for(let p of particles){p.update();if(p.life>0)p.draw();}
  particles=particles.filter(p=>p.life>0);
  for(let p of powerups){p.update();if(p.life)p.draw();}
  powerups=powerups.filter(p=>p.life);

  // Collisions
  for(let b of bullets){
    if(!b.life)continue;
    for(let e of enemies){
      if(!e.life)continue;
      const dx=b.x-e.x,dy=b.y-e.y;
      if(Math.sqrt(dx*dx+dy*dy)<e.size+b.r){b.life=0;e.hit();break;}
    }
  }
  if(player.invincible<=0){
    const shielded=player.shield>0;
    const radius=shielded?40:20;
    for(let b of enemyBullets){
      if(!b.life)continue;
      const dx=b.x-player.x,dy=b.y-player.y;
      if(Math.sqrt(dx*dx+dy*dy)<radius){b.life=0;if(shielded)spawnParticles(b.x,b.y,'#00ccff',5);else loseLife();}
    }
    if(!shielded){
      for(let e of enemies){
        if(!e.life)continue;
        const dx=e.x-player.x,dy=e.y-player.y;
        if(Math.sqrt(dx*dx+dy*dy)<e.size+20){e.life=0;spawnParticles(e.x,e.y,e.color,15);loseLife();}
      }
    }
  }
  for(let p of powerups){
    if(!p.life)continue;
    const dx=p.x-player.x,dy=p.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<30){
      p.life=0;
      if(p.type==='power'){player.power=Math.min(3,player.power+1);player.powerTimer=600;}
      else if(p.type==='shield')player.shield=300;
      else lives=Math.min(5,lives+1);
      spawnParticles(p.x,p.y,p.colors[p.type],10);
    }
  }

  if(!waveComplete&&enemies.length===0){waveComplete=true;waveTimer=120;}
  if(waveComplete){
    waveTimer--;
    ctx.save();
    const alpha=Math.min(1,(waveTimer/60));
    ctx.globalAlpha=alpha;
    ctx.fillStyle='#ffaa00';ctx.font='bold 40px Segoe UI';ctx.textAlign='center';
    ctx.shadowBlur=20;ctx.shadowColor='#ffaa00';
    ctx.fillText('WAVE '+wave+' CLEAR!',W/2,H/2);
    ctx.restore();
    if(waveTimer<=0){wave++;bullets=[];enemyBullets=[];powerups=[];spawnWave();}
  }

  document.getElementById('lives-val').textContent=lives;
  document.getElementById('score-val').textContent=score.toLocaleString();
  document.getElementById('wave-val').textContent=wave;
  animId=requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if([' ','ArrowUp','ArrowDown'].includes(e.key))e.preventDefault();
  if(e.key===' '&&gameRunning&&shootCooldown<=0){shootPlayer();shootCooldown=8;}
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
canvas.addEventListener('mousemove',e=>{if(gameRunning&&player){player.x=e.clientX;player.y=Math.max(80,Math.min(H-40,e.clientY));}});
canvas.addEventListener('mousedown',()=>mouseDown=true);
canvas.addEventListener('mouseup',()=>mouseDown=false);
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(gameRunning&&player&&e.touches[0]){player.x=e.touches[0].clientX;player.y=Math.max(80,Math.min(H-40,e.touches[0].clientY));mouseDown=true;}},{passive:false});
canvas.addEventListener('touchstart',e=>{e.preventDefault();mouseDown=true;if(gameRunning&&player&&e.touches[0]){player.x=e.touches[0].clientX;player.y=Math.max(80,Math.min(H-40,e.touches[0].clientY));}},{passive:false});
canvas.addEventListener('touchend',()=>mouseDown=false);
</script>
</body>
</html>
