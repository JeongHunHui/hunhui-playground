<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Segoe UI',sans-serif; overflow:hidden; }
#homeBtn { position:fixed; top:12px; left:12px; color:#fff; text-decoration:none; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.3); padding:6px 12px; border-radius:20px; font-size:13px; z-index:100; backdrop-filter:blur(4px); transition:background 0.2s; }
#homeBtn:hover { background:rgba(255,255,255,0.2); }
#gameWrapper { position:relative; display:flex; gap:12px; align-items:flex-start; }
canvas { display:block; }
#sidebar { width:160px; color:#fff; font-size:13px; padding:8px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; }
#sidebar h3 { color:#f0a0ff; font-size:14px; margin-bottom:8px; text-align:center; text-shadow:0 0 8px #f0a0ff; }
.stat { margin:6px 0; }
.stat-label { color:#aaa; font-size:11px; }
.stat-val { color:#fff; font-size:15px; font-weight:bold; }
#overlay { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,10,0.88); color:#fff; z-index:10; text-align:center; gap:14px; }
#overlay h1 { font-size:28px; color:#f0a0ff; text-shadow:0 0 20px #f0a0ff,0 0 40px #cc80ff; letter-spacing:2px; }
#overlay h2 { font-size:18px; color:#80f0ff; text-shadow:0 0 10px #80f0ff; }
#overlay p { color:#ccc; font-size:13px; max-width:280px; line-height:1.6; }
.btn { padding:10px 28px; border:2px solid #f0a0ff; background:transparent; color:#f0a0ff; font-size:15px; border-radius:24px; cursor:pointer; transition:all 0.2s; text-shadow:0 0 8px #f0a0ff; box-shadow:0 0 12px rgba(240,160,255,0.3); }
.btn:hover { background:rgba(240,160,255,0.15); box-shadow:0 0 24px rgba(240,160,255,0.6); }
select.gdiff { background:#111; color:#fff; border:1px solid #555; border-radius:4px; padding:6px 10px; font-size:13px; }
#mobileControls { display:none; position:absolute; bottom:0; left:0; right:0; height:140px; pointer-events:none; }
#joystickArea { position:absolute; bottom:20px; left:20px; width:100px; height:100px; border-radius:50%; background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.3); pointer-events:all; touch-action:none; }
#joystickKnob { position:absolute; width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.5); top:50%; left:50%; transform:translate(-50%,-50%); }
#bombBtn { position:absolute; bottom:30px; right:30px; width:60px; height:60px; border-radius:50%; background:rgba(255,80,80,0.3); border:2px solid rgba(255,80,80,0.7); pointer-events:all; display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer; }
@media (max-width:700px) { #sidebar { display:none; } #mobileControls { display:block; } #gameWrapper { gap:0; } }
</style>
</head>
<body>
<a id="homeBtn" href="/">🏠 Home</a>
<div id="gameWrapper">
  <div style="position:relative">
    <canvas id="c"></canvas>
    <div id="overlay">
      <h1>東方幻想郷</h1>
      <h2>Danmaku Shooter</h2>
      <p>WASD / Arrow Keys to move<br>Auto-fire enabled • X / Space = Bomb<br>Graze bullets for bonus score!<br>Boss appears at 120 seconds!</p>
      <select id="diffSel" class="gdiff">
        <option value="easy">🌸 Easy</option>
        <option value="normal" selected>⚔️ Normal</option>
        <option value="hard">💀 Hard</option>
      </select>
      <button class="btn" id="startBtn">▶ Start Game</button>
    </div>
    <div id="mobileControls">
      <div id="joystickArea"><div id="joystickKnob"></div></div>
      <div id="bombBtn">💣</div>
    </div>
  </div>
  <div id="sidebar">
    <h3>幻想郷</h3>
    <div class="stat"><div class="stat-label">SCORE</div><div class="stat-val" id="sScore">0</div></div>
    <div class="stat"><div class="stat-label">HI-SCORE</div><div class="stat-val" id="sHi">0</div></div>
    <div class="stat"><div class="stat-label">LIVES</div><div class="stat-val" id="sLives">❤️❤️❤️</div></div>
    <div class="stat"><div class="stat-label">BOMBS</div><div class="stat-val" id="sBombs">💣💣💣</div></div>
    <div class="stat"><div class="stat-label">POWER</div><div class="stat-val" id="sPower">1.0</div></div>
    <div class="stat"><div class="stat-label">GRAZE</div><div class="stat-val" id="sGraze">0</div></div>
    <div style="margin-top:16px;color:#888;font-size:11px;line-height:1.6">
      Move: WASD/Arrows<br>Bomb: X / Space<br>Graze bullets!<br>Boss at 120s
    </div>
  </div>
</div>
<script>
(function(){
'use strict';
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){
  const vw=window.innerWidth-(window.innerWidth>700?190:10);
  const vh=window.innerHeight-10;
  let h=Math.min(vh,640),w=h*9/16;
  if(w>vw){w=vw;h=w*16/9;}
  canvas.width=W=Math.floor(w);
  canvas.height=H=Math.floor(h);
}
resize();
window.addEventListener('resize',resize);

let state='title';
let difficulty='normal';
let score=0,hiScore=0,graze=0,lives=3,bombs=3,power=1.0;
let gameTime=0,frame=0,lastTime=0;
let invincible=0,bombActive=0,bossWarn=0;

const DIFF={
  easy:{bs:0.65,bc:0.6,eh:0.7,sr:1.6},
  normal:{bs:1.0,bc:1.0,eh:1.0,sr:1.0},
  hard:{bs:1.4,bc:1.4,eh:1.3,sr:0.7}
};
function D(){return DIFF[difficulty]||DIFF.normal;}

let player={x:0,y:0,radius:5,vis:14,shootT:0};
let pBullets=[],eBullets=[],enemies=[],boss=null;
let particles=[],powerups=[],lasers=[];
let lastSpawn=0;
let mbSpawned={30:false,60:false,90:false};

const keys={};
const mob={dx:0,dy:0};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(state==='playing'&&(e.key==='x'||e.key==='X'||e.key===' ')){useBomb();e.preventDefault();}
});
document.addEventListener('keyup',e=>keys[e.key]=false);

// Joystick
const jA=document.getElementById('joystickArea');
const jK=document.getElementById('joystickKnob');
let jId=null;
jA.addEventListener('touchstart',e=>{jId=e.changedTouches[0].identifier;e.preventDefault();},{passive:false});
jA.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){if(t.identifier===jId){
    const r=jA.getBoundingClientRect();
    let dx=t.clientX-(r.left+r.width/2),dy=t.clientY-(r.top+r.height/2);
    const d=Math.sqrt(dx*dx+dy*dy),mx=30;
    if(d>mx){dx=dx/d*mx;dy=dy/d*mx;}
    jK.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
    mob.dx=dx/mx;mob.dy=dy/mx;
  }}
  e.preventDefault();
},{passive:false});
['touchend','touchcancel'].forEach(ev=>jA.addEventListener(ev,()=>{mob.dx=mob.dy=0;jK.style.transform='translate(-50%,-50%)';jId=null;}));
document.getElementById('bombBtn').addEventListener('touchstart',e=>{useBomb();e.preventDefault();},{passive:false});
document.getElementById('bombBtn').addEventListener('click',()=>useBomb());
document.getElementById('diffSel').addEventListener('change',e=>{difficulty=e.target.value;});
document.getElementById('startBtn').addEventListener('click',startGame);

function startGame(){
  document.getElementById('overlay').style.display='none';
  difficulty=document.getElementById('diffSel').value;
  initGame();state='playing';
  lastTime=performance.now();
  requestAnimationFrame(loop);
}

function initGame(){
  player.x=W/2;player.y=H*0.8;player.shootT=0;
  pBullets=[];eBullets=[];enemies=[];boss=null;
  particles=[];powerups=[];lasers=[];
  score=0;graze=0;lives=3;bombs=3;power=1.0;
  gameTime=0;frame=0;invincible=0;bombActive=0;bossWarn=0;
  lastSpawn=0;mbSpawned={30:false,60:false,90:false};
  for(let i=0;i<3;i++)spawnBasic();
  updateHUD();
}

function spawnBasic(){
  const d=D();
  enemies.push({
    type:'basic',
    x:W*0.1+Math.random()*W*0.8,y:H*0.05+Math.random()*H*0.2,
    vx:(Math.random()-0.5)*2,vy:0,
    hp:Math.ceil(20*d.eh),maxHp:Math.ceil(20*d.eh),
    radius:13,shootT:60+Math.random()*60,
    patt:['spiral','ring','aimed','wave'][0|Math.random()*4],
    ang:Math.random()*Math.PI*2,
    color:`hsl(${0|Math.random()*360},90%,65%)`
  });
}

function spawnMini(ph){
  const d=D();
  enemies=enemies.filter(e=>e.type!=='basic');
  enemies.push({
    type:'miniboss',
    x:W/2,y:H*0.12,vx:1.2,vy:0,
    hp:Math.ceil(200*d.eh),maxHp:Math.ceil(200*d.eh),
    radius:22,shootT:35,
    patt:ph===1?'spiral':ph===2?'wave':'aimed',
    ang:0,ph,
    color:`hsl(${ph*120},90%,65%)`
  });
}

function spawnBoss(){
  const d=D();
  boss={
    x:W/2,y:H*0.15,vx:0.9,vy:0,
    hp:Math.ceil(700*d.eh),maxHp:Math.ceil(700*d.eh),
    radius:30,shootT:20,attackPhase:0,
    ang:0,color:'#ff80ff',
    spells:['Petal Storm','Void Rings','Chaos Spiral','Death Laser'],
    spell:0
  };
  bossWarn=200;
}

function shootPatt(e,type){
  const d=D();
  const bx=e.x,by=e.y;
  const toP=Math.atan2(player.y-by,player.x-bx);
  const spd=2.5*d.bs;
  const cnt=Math.ceil(8*d.bc);
  switch(type){
    case 'spiral':{
      e.ang+=0.18;
      const sc=Math.ceil(5*d.bc);
      for(let i=0;i<sc;i++){
        const a=e.ang+(Math.PI*2/sc)*i;
        addEB(bx,by,Math.cos(a)*spd,Math.sin(a)*spd,'spiral');
      }break;}
    case 'ring':{
      const rc=Math.ceil(12*d.bc);
      for(let i=0;i<rc;i++){
        const a=(Math.PI*2/rc)*i+e.ang;
        addEB(bx,by,Math.cos(a)*spd,Math.sin(a)*spd,'ring');
      }e.ang+=0.05;break;}
    case 'aimed':{
      for(let i=-1;i<=1;i++){
        const a=toP+i*0.18;
        addEB(bx,by,Math.cos(a)*spd*1.3,Math.sin(a)*spd*1.3,'aimed');
      }break;}
    case 'wave':{
      e.ang+=0.07;
      const wc=Math.ceil(5*d.bc);
      for(let i=0;i<wc;i++){
        const a=toP+Math.sin(e.ang+i)*0.45;
        addEB(bx,by,Math.cos(a)*spd,Math.sin(a)*spd,'wave');
      }break;}
    case 'bigring':{
      const br=Math.ceil(18*d.bc);
      for(let i=0;i<br;i++){
        const a=(Math.PI*2/br)*i+e.ang;
        addEB(bx,by,Math.cos(a)*spd*0.7,Math.sin(a)*spd*0.7,'ring');
        addEB(bx,by,Math.cos(a)*spd*1.5,Math.sin(a)*spd*1.5,'aimed');
      }e.ang+=0.04;break;}
    case 'chaos':{
      e.ang+=0.15;
      const cc=Math.ceil(7*d.bc);
      for(let i=0;i<cc;i++){
        const a=e.ang*3+(Math.PI*2/cc)*i;
        const s=spd*(0.6+Math.sin(e.ang+i)*0.5);
        addEB(bx,by,Math.cos(a)*s,Math.sin(a)*s,'spiral');
      }break;}
    case 'laser_warn':{
      lasers.push({x:bx,warn:70,active:0,w:18,color:'#ffff00'});break;}
  }
}

const EC={
  spiral:['#ff80ff','#ff40cc','#cc00ff'],
  ring:['#80ffff','#40ccff','#0080ff'],
  aimed:['#ffff60','#ffcc00','#ff8800'],
  wave:['#80ff80','#40cc40','#00ff88']
};
function addEB(x,y,vx,vy,type){
  const cols=EC[type]||EC.spiral;
  eBullets.push({x,y,vx,vy,radius:5,type,color:cols[0|Math.random()*cols.length],trail:[],age:0});
}

function playerShoot(){
  const pw=Math.floor(power);
  for(let i=-pw+1;i<=pw-1;i++){
    const a=-Math.PI/2+i*0.15;
    pBullets.push({x:player.x+i*7,y:player.y-10,vx:Math.cos(a)*10,vy:Math.sin(a)*10,radius:4,dmg:1+(power-1)*0.3,color:`hsl(${200+i*20},100%,70%)`});
  }
  if(power>=3)[{o:-28},{o:28}].forEach(({o})=>{
    pBullets.push({x:player.x+o,y:player.y,vx:0,vy:-8,radius:3,dmg:0.5,color:'#a0ffff'});
  });
}

function useBomb(){
  if(state!=='playing'||bombs<=0||bombActive>0)return;
  bombs--;bombActive=120;
  eBullets=[];lasers=[];
  enemies.forEach(e=>e.hp-=40);
  if(boss)boss.hp-=120;
  spawnExp(player.x,player.y,80,'#ffffff');
  updateHUD();
}

function spawnExp(x,y,n,c){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*4+1;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,dec:0.02+Math.random()*0.03,r:Math.random()*4+1,color:c});
  }
}

function spawnPU(x,y){
  const r=Math.random();
  const type=r<0.6?'power':r<0.85?'bomb':'life';
  powerups.push({x,y,vy:1.5,type,radius:10,age:0,emoji:type==='power'?'⭐':type==='bomb'?'💣':'❤️'});
}

function updateHUD(){
  document.getElementById('sScore').textContent=score.toLocaleString();
  document.getElementById('sHi').textContent=hiScore.toLocaleString();
  document.getElementById('sLives').textContent='❤️'.repeat(Math.max(0,lives));
  document.getElementById('sBombs').textContent='💣'.repeat(Math.max(0,bombs));
  document.getElementById('sPower').textContent=power.toFixed(1);
  document.getElementById('sGraze').textContent=graze;
}

function playerHit(){
  if(invincible>0)return;
  lives--;invincible=200;bombs=3;power=Math.max(1,power-1);
  spawnExp(player.x,player.y,40,'#ff4040');
  updateHUD();
  if(lives<=0){state='gameover';setTimeout(showGameOver,400);}
}

function showGameOver(){
  if(score>hiScore)hiScore=score;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h1>GAME OVER</h1><h2>Score: ${score.toLocaleString()}</h2><p>Hi-Score: ${hiScore.toLocaleString()}<br>Graze: ${graze}</p><button class="btn" id="r1">▶ Play Again</button><a href="/" class="btn" style="text-decoration:none;display:inline-block">🏠 Home</a>`;
  ov.style.display='flex';
  document.getElementById('r1').addEventListener('click',()=>{ov.style.display='none';initGame();state='playing';lastTime=performance.now();requestAnimationFrame(loop);});
  if(typeof gtag!=='undefined')gtag('event','game_over',{score,graze,difficulty});
}

function showClear(){
  if(score>hiScore)hiScore=score;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h1 style="color:#80ffff">✨ CLEARED! ✨</h1><h2>Score: ${score.toLocaleString()}</h2><p>Hi-Score: ${hiScore.toLocaleString()}<br>Graze: ${graze}<br>🎉 You defeated the boss!</p><button class="btn" id="r2">▶ Play Again</button><a href="/" class="btn" style="text-decoration:none;display:inline-block">🏠 Home</a>`;
  ov.style.display='flex';
  document.getElementById('r2').addEventListener('click',()=>{ov.style.display='none';initGame();state='playing';lastTime=performance.now();requestAnimationFrame(loop);});
  if(typeof gtag!=='undefined')gtag('event','game_clear',{score,graze,difficulty});
}

function checkSpawns(){
  const t=Math.floor(gameTime);
  if(t>=120&&!boss&&enemies.length===0){spawnBoss();return;}
  if(boss)return;
  if(t>=90&&!mbSpawned[90]&&!enemies.find(e=>e.type==='miniboss')){mbSpawned[90]=true;spawnMini(3);return;}
  if(t>=60&&!mbSpawned[60]&&!mbSpawned[90]&&!enemies.find(e=>e.type==='miniboss')){mbSpawned[60]=true;spawnMini(2);return;}
  if(t>=30&&!mbSpawned[30]&&!mbSpawned[60]&&!enemies.find(e=>e.type==='miniboss')){mbSpawned[30]=true;spawnMini(1);return;}
  if(gameTime-lastSpawn>7*D().sr&&enemies.filter(e=>e.type==='basic').length<5){lastSpawn=gameTime;spawnBasic();}
}

function loop(ts){
  if(state!=='playing'){requestAnimationFrame(loop);return;}
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;gameTime+=dt;frame++;

  // Player move
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A'])dx-=1;
  if(keys['ArrowRight']||keys['d']||keys['D'])dx+=1;
  if(keys['ArrowUp']||keys['w']||keys['W'])dy-=1;
  if(keys['ArrowDown']||keys['s']||keys['S'])dy+=1;
  dx+=mob.dx;dy+=mob.dy;
  const mg=Math.sqrt(dx*dx+dy*dy);
  if(mg>0){dx/=mg;dy/=mg;}
  player.x=Math.max(player.vis,Math.min(W-player.vis,player.x+dx*3.5));
  player.y=Math.max(player.vis,Math.min(H-player.vis,player.y+dy*3.5));

  player.shootT--;
  if(player.shootT<=0){playerShoot();player.shootT=Math.max(4,10-Math.floor(power));}

  if(invincible>0)invincible--;
  if(bombActive>0)bombActive--;

  checkSpawns();

  // Player bullets
  pBullets=pBullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;return b.y>-20&&b.x>-20&&b.x<W+20;});

  // Enemies
  enemies=enemies.filter(e=>{
    e.x+=e.vx;
    if(e.x<e.radius||e.x>W-e.radius)e.vx*=-1;
    e.y+=Math.sin(frame*0.02+e.x*0.01)*0.4;
    e.shootT--;
    if(e.shootT<=0){
      shootPatt(e,e.patt);
      e.shootT=Math.ceil((e.type==='miniboss'?40:65)/D().bs);
    }
    pBullets.forEach((pb,pi)=>{
      if(!pb)return;
      if(Math.hypot(pb.x-e.x,pb.y-e.y)<e.radius+pb.radius){
        e.hp-=pb.dmg*10;pBullets[pi]=null;spawnExp(pb.x,pb.y,5,'#fff');score+=50;
      }
    });
    pBullets=pBullets.filter(Boolean);
    if(e.hp<=0){
      spawnExp(e.x,e.y,e.type==='miniboss'?60:20,e.color);
      score+=e.type==='miniboss'?2000:500;
      if(Math.random()<0.5)spawnPU(e.x,e.y);
      updateHUD();return false;
    }
    return e.y<H+50;
  });

  // Boss
  if(boss){
    boss.x+=boss.vx;
    if(boss.x<boss.radius||boss.x>W-boss.radius)boss.vx*=-1;
    boss.y+=Math.sin(frame*0.015)*0.4;
    boss.y=Math.max(boss.radius+20,Math.min(H*0.3,boss.y));
    boss.shootT--;
    const hr=boss.hp/boss.maxHp;
    boss.spell=hr>0.75?0:hr>0.5?1:hr>0.25?2:3;
    const patts=['ring','bigring','chaos','laser_warn'];
    const dlys=[30,22,16,45];
    if(boss.shootT<=0){
      shootPatt(boss,patts[boss.spell]);
      boss.shootT=Math.ceil(dlys[boss.spell]/D().bs);
    }
    pBullets.forEach((pb,pi)=>{
      if(!pb)return;
      if(Math.hypot(pb.x-boss.x,pb.y-boss.y)<boss.radius+pb.radius){
        boss.hp-=pb.dmg*10;pBullets[pi]=null;spawnExp(pb.x,pb.y,4,'#fff');score+=20;
      }
    });
    pBullets=pBullets.filter(Boolean);
    if(boss.hp<=0){
      spawnExp(boss.x,boss.y,120,'#ff80ff');
      spawnExp(boss.x+30,boss.y-20,80,'#80ffff');
      score+=10000;boss=null;state='gameover';
      updateHUD();setTimeout(showClear,600);
    }
  }

  // Enemy bullets
  const gr=player.radius+18,hr2=player.radius+3;
  eBullets=eBullets.filter(b=>{
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>8)b.trail.shift();
    b.x+=b.vx;b.y+=b.vy;b.age++;
    if(b.x<-30||b.x>W+30||b.y<-30||b.y>H+30)return false;
    if(bombActive>0)return false;
    const d=Math.hypot(b.x-player.x,b.y-player.y);
    if(d<gr&&d>hr2&&invincible===0){
      graze++;score+=10;
      if(graze%5===0){
        for(let i=0;i<4;i++){const a=Math.random()*Math.PI*2;particles.push({x:player.x,y:player.y,vx:Math.cos(a)*2,vy:Math.sin(a)*2,life:1,dec:0.06,r:2,color:'#ffff80'});}
      }
      if(graze%10===0)updateHUD();
    }
    if(d<hr2&&invincible===0){playerHit();return false;}
    return true;
  });

  // Lasers
  lasers=lasers.filter(l=>{
    if(l.warn>0){l.warn--;}
    else{
      l.active++;
      if(l.active===1)spawnExp(l.x,H/2,25,'#ffff80');
      if(l.active>35)return false;
      if(Math.abs(player.x-l.x)<l.w/2+player.radius&&invincible===0&&bombActive===0)playerHit();
    }
    return true;
  });

  // Powerups
  powerups=powerups.filter(p=>{
    p.y+=p.vy;p.age++;
    if(Math.hypot(p.x-player.x,p.y-player.y)<player.vis+p.radius){
      if(p.type==='power')power=Math.min(4,power+0.5);
      else if(p.type==='bomb')bombs=Math.min(5,bombs+1);
      else lives=Math.min(5,lives+1);
      spawnExp(p.x,p.y,15,'#fff');score+=200;updateHUD();return false;
    }
    return p.y<H+30&&p.age<400;
  });

  // Particles
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.94;p.vy*=0.94;p.life-=p.dec;return p.life>0;});

  render();
  updateHUD();
  requestAnimationFrame(loop);
}

const stars=Array.from({length:70},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.5+0.3,sp:Math.random()*0.4+0.1,b:Math.random()}));

function render(){
  ctx.fillStyle='#000010';
  ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s=>{
    s.y+=s.sp/H*2;if(s.y>1){s.y=0;s.x=Math.random();}
    ctx.globalAlpha=Math.max(0,0.3+s.b*0.5+Math.sin(frame*0.02+s.x*10)*0.2);
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
  });
  ctx.globalAlpha=1;

  if(bombActive>60){
    ctx.fillStyle=`rgba(255,255,255,${(bombActive-60)/60*0.5})`;
    ctx.fillRect(0,0,W,H);
  }

  // Lasers
  lasers.forEach(l=>{
    if(l.warn>0){
      ctx.strokeStyle=`rgba(255,255,0,${(Math.sin(frame*0.4)*0.5+0.5)*0.7})`;
      ctx.lineWidth=3;ctx.setLineDash([12,8]);
      ctx.beginPath();ctx.moveTo(l.x,0);ctx.lineTo(l.x,H);ctx.stroke();
      ctx.setLineDash([]);
    }else{
      const al=1-l.active/35;
      ctx.shadowBlur=40;ctx.shadowColor='#ffff00';
      ctx.strokeStyle=`rgba(255,255,180,${al})`;ctx.lineWidth=l.w;
      ctx.beginPath();ctx.moveTo(l.x,0);ctx.lineTo(l.x,H);ctx.stroke();
      ctx.shadowBlur=0;
    }
  });

  // Enemy bullets
  eBullets.forEach(b=>{
    if(b.trail.length>1){
      ctx.globalAlpha=0.3;
      for(let i=1;i<b.trail.length;i++){
        const t=i/b.trail.length;
        ctx.beginPath();ctx.arc(b.trail[i].x,b.trail[i].y,b.radius*t*0.6,0,Math.PI*2);
        ctx.fillStyle=b.color;ctx.fill();
      }
      ctx.globalAlpha=1;
    }
    ctx.shadowBlur=10;ctx.shadowColor=b.color;
    ctx.beginPath();ctx.arc(b.x,b.y,b.radius+2,0,Math.PI*2);
    ctx.fillStyle=b.color+'44';ctx.fill();
    ctx.beginPath();ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
    ctx.fillStyle=b.color;ctx.fill();
    ctx.beginPath();ctx.arc(b.x,b.y,b.radius*0.4,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
    ctx.shadowBlur=0;
  });

  // Player bullets
  pBullets.forEach(b=>{
    ctx.shadowBlur=8;ctx.shadowColor=b.color;
    ctx.beginPath();ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
    ctx.fillStyle=b.color;ctx.fill();
    ctx.shadowBlur=0;
  });

  // Enemies
  enemies.forEach(e=>{
    const bw=e.radius*2,bh=4;
    ctx.fillStyle='#333';ctx.fillRect(e.x-e.radius,e.y-e.radius-9,bw,bh);
    ctx.fillStyle=e.color;ctx.fillRect(e.x-e.radius,e.y-e.radius-9,bw*(e.hp/e.maxHp),bh);
    ctx.shadowBlur=15;ctx.shadowColor=e.color;
    if(e.type==='miniboss'){
      ctx.save();ctx.translate(e.x,e.y);ctx.rotate(frame*0.03);
      ctx.beginPath();
      ctx.moveTo(0,-e.radius);ctx.lineTo(e.radius,0);ctx.lineTo(0,e.radius);ctx.lineTo(-e.radius,0);ctx.closePath();
      ctx.fillStyle=e.color;ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
      ctx.restore();
      // Inner spin
      ctx.save();ctx.translate(e.x,e.y);ctx.rotate(-frame*0.05);
      ctx.beginPath();
      const rr=e.radius*0.5;
      ctx.moveTo(0,-rr);ctx.lineTo(rr,0);ctx.lineTo(0,rr);ctx.lineTo(-rr,0);ctx.closePath();
      ctx.fillStyle='#fff';ctx.fill();ctx.restore();
    }else{
      ctx.beginPath();ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);
      ctx.fillStyle=e.color;ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
      ctx.beginPath();ctx.arc(e.x,e.y,e.radius*0.35,0,Math.PI*2);
      ctx.fillStyle='#fff';ctx.fill();
      ctx.beginPath();ctx.arc(e.x+2,e.y+2,e.radius*0.15,0,Math.PI*2);
      ctx.fillStyle='#000';ctx.fill();
    }
    ctx.shadowBlur=0;
  });

  // Boss
  if(boss){
    ctx.fillStyle='#222';ctx.fillRect(8,6,W-16,7);
    const hr=boss.hp/boss.maxHp;
    ctx.fillStyle=hr>0.5?'#00ff88':hr>0.25?'#ffcc00':'#ff4040';
    ctx.fillRect(8,6,(W-16)*hr,7);
    ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.strokeRect(8,6,W-16,7);
    ctx.fillStyle='#f0a0ff';
    ctx.font=`bold ${Math.floor(W*0.038)}px sans-serif`;
    ctx.textAlign='center';ctx.shadowBlur=8;ctx.shadowColor='#f0a0ff';
    ctx.fillText(boss.spells[boss.spell],W/2,22);ctx.shadowBlur=0;

    ctx.save();ctx.translate(boss.x,boss.y);
    for(let ring=0;ring<4;ring++){
      ctx.rotate(frame*0.015*(ring%2===0?1:-1));
      ctx.beginPath();
      const pts=6+ring*3;
      for(let i=0;i<pts;i++){
        const a=(Math.PI*2/pts)*i;
        const r=boss.radius+ring*10;
        i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
      ctx.closePath();
      ctx.shadowBlur=20;ctx.shadowColor=`hsl(${280+ring*25},100%,75%)`;
      ctx.strokeStyle=`hsl(${280+ring*25},100%,${65+ring*8}%)`;
      ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=0;
    }
    ctx.beginPath();ctx.arc(0,0,boss.radius*0.75,0,Math.PI*2);
    ctx.fillStyle='#ff80ff';ctx.fill();
    ctx.beginPath();ctx.arc(0,0,boss.radius*0.4,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
    ctx.restore();
  }

  // Powerups
  powerups.forEach(p=>{
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.age*0.05);
    ctx.shadowBlur=15;ctx.shadowColor=p.type==='power'?'#ffdd00':p.type==='bomb'?'#ff6060':'#ff80a0';
    ctx.font=`${Math.floor(W*0.05)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.emoji,0,0);ctx.shadowBlur=0;ctx.restore();
  });

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.fill();
  });
  ctx.globalAlpha=1;

  // Player
  if(invincible===0||frame%6<3){
    ctx.save();ctx.translate(player.x,player.y);
    if(invincible>0){ctx.shadowBlur=25;ctx.shadowColor='#fff';}
    const s=player.vis;
    ctx.fillStyle='#60c0ff';
    ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(-s*0.65,s*0.8);ctx.lineTo(0,s*0.4);ctx.lineTo(s*0.65,s*0.8);ctx.closePath();
    ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    ctx.beginPath();ctx.arc(0,-s*0.2,s*0.28,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    ctx.shadowBlur=12;ctx.shadowColor='#40ffff';
    ctx.beginPath();ctx.arc(0,s*0.5,s*0.2,0,Math.PI*2);ctx.fillStyle='#40ffff';ctx.fill();
    ctx.shadowBlur=0;
    // Hitbox dot
    ctx.beginPath();ctx.arc(0,0,player.radius,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();
    ctx.restore();
  }

  // Graze glow
  const nd=eBullets.reduce((m,b)=>Math.min(m,Math.hypot(b.x-player.x,b.y-player.y)),Infinity);
  if(nd<player.vis+25&&nd>player.radius){
    ctx.shadowBlur=20;ctx.shadowColor='#ffff00';
    ctx.beginPath();ctx.arc(player.x,player.y,player.vis+5,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,0,0.6)';ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=0;
  }

  // HUD bar
  const fs=Math.floor(W*0.034);
  ctx.fillStyle='rgba(0,0,15,0.55)';
  ctx.fillRect(0,H-fs*2-10,W,fs*2+10);
  ctx.font=`${fs}px monospace`;ctx.textAlign='left';ctx.fillStyle='#fff';
  ctx.fillText(`❤️ ${'♥'.repeat(lives)}  💣 ${'◆'.repeat(bombs)}`,6,H-fs-4);
  ctx.textAlign='right';
  ctx.fillText(`${score.toLocaleString()} pt`,W-6,H-fs-4);
  ctx.textAlign='left';ctx.fillStyle='#aaa';
  ctx.font=`${Math.floor(fs*0.8)}px monospace`;
  ctx.fillText(`PWR ${power.toFixed(1)}  GRAZE ${graze}  T:${Math.floor(gameTime)}s`,6,H-4);
  ctx.textAlign='right';
  ctx.fillText(`HI ${hiScore.toLocaleString()}`,W-6,H-4);

  // Boss warning
  if(bossWarn>0){
    bossWarn--;
    ctx.globalAlpha=Math.min(1,bossWarn/80)*(Math.sin(frame*0.2)*0.5+0.5);
    ctx.fillStyle='#ff0000';
    ctx.font=`bold ${Math.floor(W*0.055)}px sans-serif`;
    ctx.textAlign='center';ctx.shadowBlur=20;ctx.shadowColor='#ff0000';
    ctx.fillText('⚠ BOSS INCOMING ⚠',W/2,H/2);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
}

// Title loop
function titleLoop(ts){
  if(state!=='title'){return;}
  frame++;
  ctx.fillStyle='#000010';ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{
    s.y+=s.sp/H*2;if(s.y>1){s.y=0;s.x=Math.random();}
    ctx.globalAlpha=Math.max(0,0.3+s.b*0.5);
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  });
  ctx.globalAlpha=1;
  const cols=['#ff80ff','#80ffff','#ffff80','#ff8080','#80ff80','#ff80a0'];
  for(let i=0;i<14;i++){
    const a=(Math.PI*2/14)*i+frame*0.008;
    const r=Math.min(W,H)*0.28;
    const x=W/2+Math.cos(a)*r,y=H/2+Math.sin(a)*r;
    ctx.shadowBlur=15;ctx.shadowColor=cols[i%cols.length];
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fillStyle=cols[i%cols.length];ctx.fill();
    ctx.shadowBlur=0;
  }
  requestAnimationFrame(titleLoop);
}
requestAnimationFrame(titleLoop);
})();
</script>
