<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>갤러그</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }

canvas {
  position: fixed;
  top: 0; left: 50%;
  transform: translateX(-50%);
  display: block;
}

/* HUD */
#hud {
  position: fixed;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  display: flex; justify-content: space-between;
  padding: 8px 16px;
  font: bold 14px monospace;
  color: #0ff; z-index: 10;
  pointer-events: none;
}

/* 버튼 3개 - 화면 맨 아래 고정 */
#btnL, #btnR, #btnF {
  position: fixed;
  bottom: 0;
  width: 33.33%;
  height: 100px;
  border: none;
  font-size: 2.5rem;
  cursor: pointer;
  z-index: 20;
  -webkit-tap-highlight-color: rgba(0,0,0,0);
  touch-action: manipulation;
}
#btnL { left: 0;      background: rgba(0,150,255,0.25); border-right: 1px solid #333; }
#btnF { left: 33.33%; background: rgba(255,50,50,0.25);  border-right: 1px solid #333; }
#btnR { right: 0;     background: rgba(0,150,255,0.25); }

#btnL:active, #btnR:active { background: rgba(0,200,255,0.5); }
#btnF:active { background: rgba(255,100,100,0.6); }

/* 게임오버 패널 */
#panel {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.9);
  border: 2px solid #f44;
  border-radius: 16px;
  padding: 32px 40px;
  text-align: center;
  font-family: monospace;
  color: #fff;
  z-index: 30;
  display: none;
}
#panel h2 { font-size: 2rem; color: #f44; margin-bottom: 12px; }
#panel p  { font-size: 1.2rem; margin-bottom: 20px; }
#panel button {
  background: #ff0; color: #000;
  font: bold 1.1rem monospace;
  border: none; border-radius: 10px;
  padding: 14px 36px; cursor: pointer;
  touch-action: manipulation;
}
#panel button:active { opacity: 0.7; }

a.back {
  position: fixed; top: 8px; left: 8px;
  color: #666; font: 12px sans-serif;
  text-decoration: none; z-index: 40;
  background: rgba(255,255,255,0.06);
  padding: 6px 10px; border-radius: 20px;
}
</style>
</head>
<body>
<a class="back" href="/">← 홈</a>
<canvas id="g"></canvas>
<div id="hud">
  <span id="hScore">0</span>
  <span id="hLives">❤❤❤</span>
  <span id="hStage">ST.1</span>
</div>
<button id="btnL">◀</button>
<button id="btnF">🔥</button>
<button id="btnR">▶</button>
<div id="panel">
  <h2>GAME OVER</h2>
  <p id="panelScore"></p>
  <button onclick="restart()">다시 하기</button>
</div>

<script>
var cv = document.getElementById('g');
var cx = cv.getContext('2d');

// 캔버스 크기 = 화면 - 버튼 높이(100px) - HUD(36px)
var W, H;
function resize() {
  W = Math.min(window.innerWidth, 480);
  H = window.innerHeight - 100 - 36;
  cv.style.top  = '36px';
  cv.width  = W;
  cv.height = H;
}
resize();
window.addEventListener('resize', resize);

// ── 입력 ──
var L=false, R=false, F=false;

// 왼쪽 버튼
document.getElementById('btnL').addEventListener('touchstart', function(e){ e.preventDefault(); L=true;  F=true;  }, {passive:false});
document.getElementById('btnL').addEventListener('touchend',   function(e){ e.preventDefault(); L=false; F=false; }, {passive:false});
document.getElementById('btnL').addEventListener('touchcancel',function(e){ e.preventDefault(); L=false; F=false; }, {passive:false});
// 오른쪽 버튼
document.getElementById('btnR').addEventListener('touchstart', function(e){ e.preventDefault(); R=true;  F=true;  }, {passive:false});
document.getElementById('btnR').addEventListener('touchend',   function(e){ e.preventDefault(); R=false; F=false; }, {passive:false});
document.getElementById('btnR').addEventListener('touchcancel',function(e){ e.preventDefault(); R=false; F=false; }, {passive:false});
// 발사 버튼
document.getElementById('btnF').addEventListener('touchstart', function(e){ e.preventDefault(); F=true;  }, {passive:false});
document.getElementById('btnF').addEventListener('touchend',   function(e){ e.preventDefault(); F=false; }, {passive:false});
document.getElementById('btnF').addEventListener('touchcancel',function(e){ e.preventDefault(); F=false; }, {passive:false});
// 마우스 (PC)
document.getElementById('btnL').onmousedown = function(){ L=true;  F=true;  };
document.getElementById('btnL').onmouseup   = function(){ L=false; F=false; };
document.getElementById('btnR').onmousedown = function(){ R=true;  F=true;  };
document.getElementById('btnR').onmouseup   = function(){ R=false; F=false; };
document.getElementById('btnF').onmousedown = function(){ F=true;  };
document.getElementById('btnF').onmouseup   = function(){ F=false; };
// 키보드
var KD = {};
document.addEventListener('keydown', function(e){
  KD[e.code]=true;
  if(e.code==='Space'||e.code==='Tab') e.preventDefault();
});
document.addEventListener('keyup', function(e){ KD[e.code]=false; });

function isL(){ return L || KD['ArrowLeft']  || KD['KeyA']; }
function isR(){ return R || KD['ArrowRight'] || KD['KeyD']; }
function isF(){ return F || KD['Space']      || KD['KeyZ']; }

// ── 게임 ──
var HI = +(localStorage.getItem('ghi')||0);
var score, lives, stage;
var px, py, piv, pcd, alive;
var shots=[], eshots=[], foes=[], sparks=[], stars=[];
var ft=0, clearing=false, clearT=0;

function hs(){ document.getElementById('hScore').textContent=score; }
function hl(){ document.getElementById('hLives').textContent='❤'.repeat(Math.max(0,lives)); }
function hst(){ document.getElementById('hStage').textContent='ST.'+stage; }

function mStars(){
  stars=[];
  for(var i=0;i<70;i++) stars.push({x:rnd(W),y:rnd(H),s:Math.random()*1.2+0.3,v:Math.random()*0.6+0.2,b:Math.random()});
}
function rnd(n){ return Math.random()*n; }
function rndI(n){ return Math.floor(Math.random()*n); }

var ET = {
  b:{col:'#0ff',pts:50, w:16,h:16,hp:1},
  m:{col:'#fa0',pts:80, w:20,h:18,hp:1},
  B:{col:'#f0f',pts:200,w:24,h:24,hp:2}
};
var ROWS = ['B','m','m','b','b'];

function mFoes(){
  foes=[];
  var cols=Math.min(9,5+Math.floor(stage/3));
  var rows=Math.min(5,3+Math.floor(stage/4));
  for(var r=0;r<rows;r++){
    var tk=ROWS[Math.min(r,ROWS.length-1)], t=ET[tk];
    for(var c=0;c<cols;c++){
      foes.push({
        x:(c+1)*W/(cols+1), y:-160-r*48,
        tx:(c+1)*W/(cols+1), ty:50+r*38,
        w:t.w, h:t.h, k:tk, col:t.col,
        pts:t.pts+(stage-1)*10, hp:t.hp, mhp:t.hp,
        alive:true, inf:false, dv:null,
        sc:60+rnd(100), fl:0
      });
    }
  }
}

function explode(x,y,col){
  for(var i=0;i<12;i++){
    var a=rnd(Math.PI*2), sp=rnd(3)+1;
    sparks.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:40+rnd(20),ml:60,col:col,r:rnd(2)+1});
  }
}

function gameStart(){
  score=0;lives=3;stage=1;
  piv=0;pcd=0;alive=true;
  px=W/2; py=H-60;
  document.getElementById('panel').style.display='none';
  mStars(); mFoes();
  ft=0;clearing=false;
  hs();hl();hst();
}

function restart(){
  document.getElementById('panel').style.display='none';
  gameStart();
}

// ── 루프 ──
var lt=0;
function loop(ts){
  requestAnimationFrame(loop);
  var dt=Math.min((ts-lt)/16.67,3); lt=ts;
  tick(dt);
  paint();
}

function tick(dt){
  ft++;
  for(var i=0;i<stars.length;i++){ stars[i].y+=stars[i].v; if(stars[i].y>H)stars[i].y=0; }

  if(clearing){
    clearT-=dt;
    if(clearT<=0){ stage++; mFoes(); ft=0; clearing=false; hst(); }
    return;
  }

  // 플레이어
  if(alive){
    if(isL()) px=Math.max(14,px-5);
    if(isR()) px=Math.min(W-14,px+5);
  }
  if(pcd>0) pcd-=dt;
  if(alive && isF() && pcd<=0){ shots.push({x:px,y:py-16}); pcd=12; }
  if(piv>0) piv-=dt;

  shots  =shots.filter(function(s){ s.y-=10; return s.y>-10 && !s._d; });
  eshots =eshots.filter(function(s){ s.x+=s.vx; s.y+=s.vy; return s.y<H+20 && !s.hit; });
  sparks =sparks.filter(function(p){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.07; p.life-=dt; return p.life>0; });

  // 적
  var allIn=true;
  for(var i=0;i<foes.length;i++){
    var e=foes[i]; if(!e.alive) continue;
    if(e.fl>0) e.fl-=dt;
    if(!e.inf&&!e.dv){
      allIn=false;
      var fx=e.tx+Math.sin(ft*0.02)*14, fy=e.ty;
      var dx=fx-e.x, dy=fy-e.y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<4){ e.x=fx; e.y=fy; e.inf=true; }
      else { e.x+=dx/d*3.5; e.y+=dy/d*3.5; }
    } else if(e.inf&&!e.dv){
      e.x=e.tx+Math.sin(ft*0.02)*14; e.y=e.ty;
    }
    if(e.dv){
      allIn=false; e.x+=e.dv.vx; e.y+=e.dv.vy;
      if(e.y>H+40){ e.y=-40; e.x=e.tx; e.inf=false; e.dv=null; }
    }
    if(e.inf||e.dv){
      e.sc-=dt;
      if(e.sc<=0){
        e.sc=60+rnd(85)-stage*3;
        var sp=3+stage*0.2, ang=Math.atan2(py-e.y,px-e.x);
        eshots.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp});
        if(stage>3&&Math.random()<0.3){
          eshots.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(ang+0.22)*sp,vy:Math.sin(ang+0.22)*sp});
          eshots.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(ang-0.22)*sp,vy:Math.sin(ang-0.22)*sp});
        }
      }
    }
  }

  // 다이브
  if(allIn&&ft%90===0){
    var live=foes.filter(function(e){return e.alive&&e.inf;});
    var n=Math.min(1+Math.floor(stage/3),3);
    for(var i=0;i<n&&i<live.length;i++){
      var e=live[rndI(live.length)];
      var sp=2.5+stage*0.3, ang=Math.atan2(H-e.y,px-e.x);
      e.dv={vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp}; e.inf=false;
    }
  }

  // 충돌: 내 총알 → 적
  for(var bi=0;bi<shots.length;bi++){
    var b=shots[bi];
    for(var ei=0;ei<foes.length;ei++){
      var e=foes[ei]; if(!e.alive||b._d) continue;
      if(Math.abs(b.x-e.x)<e.w/2+2&&Math.abs(b.y-e.y)<e.h/2+2){
        b._d=true; e.hp--; e.fl=5;
        if(e.hp<=0){ e.alive=false; score+=e.pts; explode(e.x,e.y,e.col); hs(); }
      }
    }
  }
  shots=shots.filter(function(s){return!s._d;});

  // 충돌: 적 총알/적 → 나
  if(alive&&piv<=0){
    for(var i=0;i<eshots.length;i++){
      var s=eshots[i]; if(s.hit) continue;
      if(Math.abs(s.x-px)<11&&Math.abs(s.y-py)<11){ s.hit=true; explode(px,py,'#4ff'); hit(); }
    }
    for(var i=0;i<foes.length;i++){
      var e=foes[i]; if(!e.alive||!alive) continue;
      if(Math.abs(e.x-px)<(e.w+20)/2&&Math.abs(e.y-py)<(e.h+20)/2){
        e.hp--; if(e.hp<=0){e.alive=false;score+=e.pts;explode(e.x,e.y,e.col);hs();}
        explode(px,py,'#4ff'); hit();
      }
    }
  }

  if(!clearing && foes.every(function(e){return!e.alive;})){
    clearing=true; clearT=90;
  }
}

function hit(){
  if(piv>0) return;
  lives--; hl(); alive=false;
  if(lives<=0){
    var isRec=score>HI&&score>0;
    if(isRec){HI=score;localStorage.setItem('ghi',HI);}
    document.getElementById('panelScore').textContent='점수: '+score+(isRec?' 🏆 최고기록!':'');
    document.getElementById('panel').style.display='block';
  } else {
    piv=120;
    setTimeout(function(){alive=true;px=W/2;py=H-60;},1500);
  }
}

// ── 그리기 ──
function drawShip(x,y,col){
  cx.shadowBlur=10; cx.shadowColor=col; cx.fillStyle=col;
  cx.beginPath(); cx.moveTo(x,y-13); cx.lineTo(x-11,y+13); cx.lineTo(x,y+5); cx.lineTo(x+11,y+13); cx.closePath(); cx.fill();
  cx.fillStyle='rgba(255,255,255,0.85)'; cx.beginPath(); cx.arc(x,y-3,4,0,Math.PI*2); cx.fill();
  cx.shadowBlur=0;
}
function drawFoe(e){
  if(!e.alive) return;
  var col=e.fl>0?'#fff':e.col;
  cx.shadowBlur=8; cx.shadowColor=col; cx.fillStyle=col;
  if(e.k==='b'){
    cx.beginPath(); cx.moveTo(e.x,e.y-e.h/2); cx.lineTo(e.x+e.w/2,e.y); cx.lineTo(e.x,e.y+e.h/2); cx.lineTo(e.x-e.w/2,e.y); cx.closePath(); cx.fill();
  } else if(e.k==='m'){
    cx.beginPath(); cx.ellipse(e.x,e.y,e.w/2,e.h/2,0,0,Math.PI*2); cx.fill();
    cx.fillStyle='#000'; cx.beginPath(); cx.arc(e.x-e.w/5,e.y-2,2.5,0,Math.PI*2); cx.arc(e.x+e.w/5,e.y-2,2.5,0,Math.PI*2); cx.fill();
  } else {
    cx.beginPath(); cx.moveTo(e.x,e.y-e.h/2); cx.lineTo(e.x+e.w/2,e.y+e.h/2); cx.lineTo(e.x,e.y+e.h*0.2); cx.lineTo(e.x-e.w/2,e.y+e.h/2); cx.closePath(); cx.fill();
    if(e.mhp>1){ cx.fillStyle='#333'; cx.fillRect(e.x-e.w/2,e.y-e.h/2-6,e.w,3); cx.fillStyle=col; cx.fillRect(e.x-e.w/2,e.y-e.h/2-6,e.w*(e.hp/e.mhp),3); }
  }
  cx.shadowBlur=0;
}

function paint(){
  cx.fillStyle='#000'; cx.fillRect(0,0,W,H);
  for(var i=0;i<stars.length;i++){
    var s=stars[i]; cx.globalAlpha=0.3+s.b*0.6; cx.fillStyle='#fff';
    cx.beginPath(); cx.arc(s.x,s.y,s.s,0,Math.PI*2); cx.fill();
  }
  cx.globalAlpha=1;
  for(var i=0;i<foes.length;i++) drawFoe(foes[i]);
  if(alive){
    if(piv>0&&Math.floor(piv/4)%2===0) cx.globalAlpha=0.3;
    drawShip(px,py,'#4ff'); cx.globalAlpha=1;
    cx.fillStyle='rgba(255,140,0,0.75)'; cx.fillRect(px-3,py+14,6,5+Math.random()*5);
  }
  for(var i=0;i<shots.length;i++){
    cx.fillStyle='#ff0'; cx.shadowBlur=6; cx.shadowColor='#ff0';
    cx.beginPath(); cx.arc(shots[i].x,shots[i].y,3,0,Math.PI*2); cx.fill(); cx.shadowBlur=0;
  }
  for(var i=0;i<eshots.length;i++){
    cx.fillStyle='#f55'; cx.shadowBlur=5; cx.shadowColor='#f55';
    cx.beginPath(); cx.arc(eshots[i].x,eshots[i].y,3,0,Math.PI*2); cx.fill(); cx.shadowBlur=0;
  }
  for(var i=0;i<sparks.length;i++){
    var p=sparks[i]; cx.globalAlpha=p.life/p.ml; cx.fillStyle=p.col;
    cx.beginPath(); cx.arc(p.x,p.y,p.r,0,Math.PI*2); cx.fill();
  }
  cx.globalAlpha=1;
  if(clearing){
    cx.fillStyle='rgba(0,0,0,0.55)'; cx.fillRect(0,H/2-42,W,84);
    cx.fillStyle='#ff0'; cx.font='bold '+Math.round(W*0.07)+'px monospace'; cx.textAlign='center';
    cx.fillText('STAGE '+stage+' CLEAR!',W/2,H/2+14);
  }
}

// 시작
gameStart();
lt=performance.now();
requestAnimationFrame(loop);
</script>
</body>
</html>
