<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>👊 아빠와 나</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;}
body{background:#0d0a1a;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;overflow:hidden;height:100svh;}
canvas{display:block;max-width:600px;width:100%;}
#hud{display:flex;gap:8px;padding:8px;width:100%;max-width:600px;}
.hbar-wrap{flex:1;}.hbar-label{font-size:0.7rem;color:#7c6a9a;margin-bottom:2px;}
.hbar-bg{height:12px;border-radius:6px;background:#1a1030;}
.hbar-fill{height:100%;border-radius:6px;transition:width 0.2s;}
.player-hp{background:linear-gradient(90deg,#22c55e,#4ade80);}
.enemy-hp{background:linear-gradient(90deg,#ef4444,#f87171);}
#btns{display:flex;gap:6px;padding:8px;width:100%;max-width:600px;flex-wrap:wrap;justify-content:center;}
.btn{padding:10px 18px;border-radius:10px;border:none;font-size:0.9rem;font-weight:700;cursor:pointer;flex:1;min-width:70px;max-width:110px;}
.btn-punch{background:linear-gradient(135deg,#ef4444,#f97316);color:#fff;}
.btn-kick{background:linear-gradient(135deg,#f97316,#fbbf24);color:#fff;}
.btn-jump{background:linear-gradient(135deg,#3b82f6,#06b6d4);color:#fff;}
.btn-defend{background:linear-gradient(135deg,#7c3aed,#c084fc);color:#fff;}
.btn-special{background:linear-gradient(135deg,#ec4899,#f43f5e);color:#fff;}
.btn:active{transform:scale(0.95);}
#overlay{position:fixed;inset:0;background:#000d;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;}
.start{padding:14px 32px;border-radius:99px;border:none;background:linear-gradient(135deg,#ef4444,#f97316);color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;}
#stage-txt{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:0.8rem;color:#7c6a9a;}
</style>
</head>
<body>
<div id="hud">
  <div class="hbar-wrap"><div class="hbar-label">👦 나</div><div class="hbar-bg"><div class="hbar-fill player-hp" id="php" style="width:100%"></div></div></div>
  <div style="width:60px;text-align:center;font-size:0.75rem;color:#7c6a9a;padding-top:14px;" id="stage-info">1/5</div>
  <div class="hbar-wrap"><div class="hbar-label" style="text-align:right">아빠 👨</div><div class="hbar-bg"><div class="hbar-fill enemy-hp" id="ehp" style="width:100%"></div></div></div>
</div>
<canvas id="c" height="280"></canvas>
<div id="btns">
  <button class="btn btn-punch" onclick="action('punch')">👊 펀치<br><small>D/A</small></button>
  <button class="btn btn-kick" onclick="action('kick')">🦵 킥<br><small>S</small></button>
  <button class="btn btn-jump" onclick="action('jump')">⬆️ 점프<br><small>W/↑</small></button>
  <button class="btn btn-defend" onclick="action('defend')">🛡 방어<br><small>←/→</small></button>
  <button class="btn btn-special" onclick="action('special')">💥 필살기<br><small>Q</small></button>
</div>
<div id="overlay">
  <div style="font-size:5rem;margin-bottom:8px;">👊</div>
  <h1 style="font-size:2rem;color:#f97316;margin-bottom:8px;">아빠와 나</h1>
  <p style="color:#9f8ab8;margin-bottom:24px;text-align:center;">아빠를 이겨라!<br>5라운드 격투 게임</p>
  <button class="start" onclick="startGame()">시작!</button>
</div>
<script>
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
cv.width=Math.min(600,window.innerWidth);
const W=cv.width,H=280;
const GY=H-60;

const STAGES=[
  {name:'거실',bg:'#1a0f2e',enemy:{name:'아빠',color:'#f97316',hp:100,atk:8,spd:1.2,size:44,emoji:'👨'}},
  {name:'주방',bg:'#0f1a10',enemy:{name:'엄마',color:'#ec4899',hp:130,atk:10,spd:1.4,size:42,emoji:'👩'}},
  {name:'학교',bg:'#0f1020',enemy:{name:'선생님',color:'#3b82f6',hp:160,atk:12,spd:1.5,size:46,emoji:'👨‍🏫'}},
  {name:'길거리',bg:'#1a1000',enemy:{name:'불량배',color:'#ef4444',hp:200,atk:15,spd:1.8,size:50,emoji:'😤'}},
  {name:'보스',bg:'#1a0000',enemy:{name:'최종 보스',color:'#9333ea',hp:300,atk:20,spd:2,size:56,emoji:'😈'}},
];

let player,enemy,stage,running,particles,atkTimer,aiTimer,frame;
let specialCharge=0;

function startGame(){
  document.getElementById('overlay').style.display='none';
  stage=0;initRound();
}

function initRound(){
  const s=STAGES[stage];
  player={x:80,y:GY-48,w:36,h:48,vy:0,hp:100,maxHp:100,atk:15,onGround:true,defending:false,facing:1,anim:0,hitFlash:0,special:specialCharge};
  const e=s.enemy;
  enemy={x:W-100,y:GY-e.size,w:e.size*0.7,h:e.size,vy:0,hp:e.hp,maxHp:e.hp,atk:e.atk,spd:e.spd,size:e.size,onGround:true,facing:-1,emoji:e.emoji,color:e.color,name:e.name,hitFlash:0,anim:0,stun:0};
  particles=[];atkTimer=0;aiTimer=0;frame=0;running=true;
  document.getElementById('stage-info').textContent=`${stage+1}/5`;
  loop();
}

let animId;
function loop(){
  if(!running)return;
  update();draw();animId=requestAnimationFrame(loop);
}

function update(){
  frame++;atkTimer--;aiTimer--;
  player.anim++;enemy.anim++;
  if(player.hitFlash>0)player.hitFlash--;
  if(enemy.hitFlash>0)enemy.hitFlash--;
  if(enemy.stun>0)enemy.stun--;

  // 중력
  [player,enemy].forEach(f=>{
    f.vy+=0.6;f.y+=f.vy;
    if(f.y+f.h>=GY){f.y=GY-f.h;f.vy=0;f.onGround=true;}
  });

  // AI
  if(aiTimer<=0&&enemy.stun===0){
    aiTimer=Math.floor(30+Math.random()*40);
    const dist=player.x-enemy.x;
    if(Math.abs(dist)>80){enemy.x+=Math.sign(dist)*enemy.spd*2;}
    else if(Math.random()<0.55){enemyAttack();}
    else if(Math.random()<0.3&&enemy.onGround){enemy.vy=-10;}
  }
  enemy.x=Math.max(player.x+60,Math.min(W-80,enemy.x));

  // 파티클
  for(let p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;}
  particles=particles.filter(p=>p.life>0);

  // 충전
  specialCharge=Math.min(100,specialCharge+0.15);
  if(specialCharge>=100&&document.querySelector('.btn-special').style.opacity!=='1'){
    document.querySelector('.btn-special').style.opacity='1';
  }
}

function enemyAttack(){
  if(Math.abs(player.x-enemy.x)>120)return;
  const dmg=player.defending?Math.floor(enemy.atk*0.2):enemy.atk;
  player.hp=Math.max(0,player.hp-dmg);
  player.hitFlash=15;
  spawnParticles(player.x+18,player.y+24,'#f87171',5);
  if(player.hp<=0){endRound(false);}
  updateHUD();
}

function action(type){
  if(!running)return;
  if(type==='punch'||type==='kick'){
    if(atkTimer>0)return;
    atkTimer=type==='punch'?18:25;
    const reach=type==='punch'?80:100;
    if(Math.abs(enemy.x-player.x)<reach){
      const dmg=type==='punch'?player.atk:Math.floor(player.atk*1.5);
      dealDmg(dmg,type==='kick');
    }
  } else if(type==='jump'&&player.onGround){
    player.vy=-13;player.onGround=false;
  } else if(type==='defend'){
    player.defending=true;setTimeout(()=>player.defending=false,500);
  } else if(type==='special'&&specialCharge>=100){
    specialCharge=0;
    dealDmg(player.atk*4,true);
    spawnParticles(enemy.x+enemy.w/2,enemy.y,'#fde047',20);
    document.querySelector('.btn-special').style.opacity='0.4';
  }
}

function dealDmg(dmg,stun){
  enemy.hp=Math.max(0,enemy.hp-dmg);
  enemy.hitFlash=12;
  if(stun)enemy.stun=30;
  spawnParticles(enemy.x+enemy.w/2,enemy.y+20,'#fbbf24',6);
  updateHUD();
  if(enemy.hp<=0){endRound(true);}
}

function draw(){
  const s=STAGES[stage];
  ctx.fillStyle=s.bg||'#0d0a1a';ctx.fillRect(0,0,W,H);

  // 배경 (무대)
  ctx.fillStyle='#1a1030';ctx.fillRect(0,GY,W,H-GY);
  ctx.fillStyle='#3d2a5e';ctx.fillRect(0,GY,W,4);

  // 파티클
  for(let p of particles){
    ctx.globalAlpha=p.life/30;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.fill();
  }ctx.globalAlpha=1;

  drawFighter(player,'#c084fc','🧒');
  drawFighterEnemy(enemy);

  // 방어 표시
  if(player.defending){
    ctx.strokeStyle='#c084fc88';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(player.x+18,player.y+24,30,0,Math.PI*2);ctx.stroke();
  }

  // 스턴
  if(enemy.stun>0){
    ctx.font='20px sans-serif';ctx.textAlign='center';
    ctx.fillText('😵',enemy.x+enemy.w/2,enemy.y-20);
  }

  // 스테이지명
  ctx.fillStyle='#7c6a9a';ctx.font='12px sans-serif';ctx.textAlign='left';
  ctx.fillText(s.name,8,20);
  // 필살기 게이지
  ctx.fillStyle='#333';ctx.fillRect(8,H-28,80,8);
  ctx.fillStyle='#ec4899';ctx.fillRect(8,H-28,80*(specialCharge/100),8);
  ctx.fillStyle='#e2d4ff';ctx.font='10px sans-serif';ctx.fillText('💥 필살기',8,H-14);
}

function drawFighter(p,color,emoji){
  ctx.globalAlpha=p.hitFlash>0&&Math.floor(p.hitFlash/3)%2?0.3:1;
  // 몸
  ctx.fillStyle=color+'44';
  ctx.beginPath();ctx.roundRect(p.x,p.y,p.w,p.h,8);ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(p.x,p.y,p.w,p.h,8);ctx.stroke();
  ctx.font='28px sans-serif';ctx.textAlign='center';
  ctx.fillText(emoji,p.x+p.w/2,p.y+p.h/2+10);
  ctx.globalAlpha=1;
}
function drawFighterEnemy(e){
  ctx.globalAlpha=e.hitFlash>0&&Math.floor(e.hitFlash/3)%2?0.3:1;
  ctx.fillStyle=e.color+'44';
  ctx.beginPath();ctx.roundRect(e.x,e.y,e.w,e.h,8);ctx.fill();
  ctx.strokeStyle=e.color;ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(e.x,e.y,e.w,e.h,8);ctx.stroke();
  ctx.font=`${e.size*0.6}px sans-serif`;ctx.textAlign='center';
  ctx.fillText(e.emoji,e.x+e.w/2,e.y+e.h*0.7);
  ctx.globalAlpha=1;
}

function updateHUD(){
  document.getElementById('php').style.width=(player.hp/player.maxHp*100)+'%';
  document.getElementById('ehp').style.width=(enemy.hp/enemy.maxHp*100)+'%';
}

function endRound(win){
  running=false;cancelAnimationFrame(animId);
  const ov=document.getElementById('overlay');
  if(win){
    if(stage<STAGES.length-1){
      stage++;
      ov.innerHTML=`<div style="font-size:4rem">🎉</div><h1 style="color:#22c55e;font-size:1.8rem">${STAGES[stage-1].enemy.name} 격파!</h1><p style="color:#9f8ab8;margin:12px 0">다음 상대: ${STAGES[stage].enemy.name} ${STAGES[stage].enemy.emoji}</p><button class="start" onclick="initRound()">계속!</button>`;
    } else {
      ov.innerHTML=`<div style="font-size:4rem">🏆</div><h1 style="color:#fde047;font-size:2rem">전설이 됐다!</h1><p style="color:#9f8ab8;margin:12px 0">모든 상대를 이겼어!</p><button class="start" onclick="stage=0;specialCharge=0;initRound()">처음부터</button>`;
    }
  } else {
    ov.innerHTML=`<div style="font-size:4rem">💀</div><h1 style="color:#ef4444;font-size:2rem">패배...</h1><p style="color:#9f8ab8;margin:12px 0">${enemy.name}에게 졌어</p><button class="start" onclick="specialCharge=0;initRound()">다시 도전</button>`;
  }
  ov.style.display='flex';
}

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*4+1;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:25,color});}
}

document.addEventListener('keydown',e=>{
  const map={KeyD:'punch',KeyA:'punch',KeyS:'kick',KeyW:'jump',ArrowUp:'jump',ArrowLeft:'defend',ArrowRight:'defend',KeyQ:'special'};
  if(map[e.code])action(map[e.code]);
});
document.querySelector('.btn-special').style.opacity='0.4';
</script>
</body>
</html>
