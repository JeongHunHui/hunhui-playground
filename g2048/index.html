<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048 🎮</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;}
body{background:#0d0a1a;color:#f0e6ff;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px;}
h1{font-size:2.5rem;color:#c084fc;text-shadow:0 0 20px #c084fc88;margin:16px 0 4px;}
#info{display:flex;gap:16px;margin-bottom:16px;}
.box{background:#1a1030;border:1px solid #3d2a5e;border-radius:10px;padding:8px 20px;text-align:center;}
.box label{font-size:0.7rem;color:#7c6a9a;display:block;}
.box span{font-size:1.4rem;font-weight:700;color:#c084fc;}
#grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  background:#1a1030;border-radius:14px;padding:12px;
  width:min(360px,90vw);
}
.cell{
  aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:clamp(14px,4vw,24px);transition:all 0.1s;
  background:#120a28;color:#7c6a9a;
}
.t2{background:#3d2a5e;color:#e2d4ff;}
.t4{background:#5b3a8a;color:#f0e6ff;}
.t8{background:#7c3aed;color:#fff;}
.t16{background:#9333ea;color:#fff;}
.t32{background:#a855f7;color:#fff;}
.t64{background:#c026d3;color:#fff;}
.t128{background:#db2777;color:#fff;font-size:clamp(12px,3.5vw,20px);}
.t256{background:#e11d48;color:#fff;font-size:clamp(11px,3vw,18px);}
.t512{background:#f97316;color:#fff;font-size:clamp(11px,3vw,18px);}
.t1024{background:#eab308;color:#fff;font-size:clamp(10px,2.5vw,16px);}
.t2048{background:linear-gradient(135deg,#fde047,#f97316);color:#fff;font-size:clamp(10px,2.5vw,15px);box-shadow:0 0 20px #fde04766;}
.new{animation:pop 0.15s ease;}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
#btns{display:flex;gap:10px;margin-top:12px;}
button{padding:10px 24px;border-radius:99px;border:none;cursor:pointer;font-size:0.9rem;font-weight:700;}
.btn-new{background:linear-gradient(135deg,#7c3aed,#c084fc);color:#fff;}
#msg{margin-top:12px;font-size:1.1rem;height:24px;color:#c084fc;}
</style>
<style>
#tut-btn{position:fixed;top:10px;right:10px;z-index:998;padding:5px 12px;border-radius:99px;background:rgba(13,10,26,0.92);border:1px solid #3d2a5e;color:#c084fc;font-size:0.82rem;font-weight:700;cursor:pointer;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);}
#tut-modal{display:none;position:fixed;inset:0;background:#0009;z-index:1000;align-items:center;justify-content:center;padding:16px;}
#tut-modal.open{display:flex;}
#tut-inner{background:#120a28;border:1px solid #3d2a5e;border-radius:16px;max-width:440px;width:100%;padding:20px;max-height:80vh;overflow-y:auto;}
#tut-inner h3{color:#c084fc;font-size:1.1rem;margin-bottom:12px;}
.tut-ctrl{background:#1a1030;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:0.82rem;color:#a78bfa;}
.tut-ctrl b{color:#c084fc;display:block;margin-bottom:4px;}
.tut-tips{list-style:none;display:flex;flex-direction:column;gap:6px;}
.tut-tips li{font-size:0.82rem;color:#9f8ab8;padding:6px 10px;background:#1a1030;border-radius:8px;border-left:3px solid #3d2a5e;}
.tut-close{width:100%;margin-top:14px;padding:10px;border-radius:8px;border:none;background:#2d1f4e;color:#e2d4ff;cursor:pointer;font-size:0.9rem;}
</style>
</head>
<body>
<div id="tut-btn" onclick="document.getElementById('tut-modal').classList.add('open')">❓ 도움말</div>
<div id="tut-modal" onclick="if(event.target===this)this.classList.remove('open')">
<div id="tut-inner">
  <h3>🎮 2048</h3>
  <div class="tut-ctrl"><b>🎮 조작법</b>화살표 키 또는 스와이프로 이동</div>
  <ul class="tut-tips"><li>💡 같은 숫자 타일이 만나면 합쳐져요</li><li>💡 한 방향으로만 모으는 전략을 써보세요</li><li>💡 가장 큰 숫자를 구석에 두는 게 유리해요</li><li>💡 2048 타일을 만들면 성공!</li></ul>
  <button class="tut-close" onclick="document.getElementById('tut-modal').classList.remove('open')">✕ 닫기</button>
</div>
</div>
<a href="/" style="position:fixed;top:10px;left:10px;z-index:999;display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:99px;background:rgba(13,10,26,0.92);border:1px solid #3d2a5e;color:#c084fc;font-size:0.82rem;font-weight:700;text-decoration:none;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);transition:all 0.2s;" onmouseover="this.style.background='rgba(45,31,78,0.95)'" onmouseout="this.style.background='rgba(13,10,26,0.85)'">🏠 홈</a>
<h1>2048</h1>
<div id="info">
  <div class="box"><label>점수</label><span id="score">0</span></div>
  <div class="box"><label>최고</label><span id="best">0</span></div>
</div>
<div id="grid"></div>
<div id="btns"><button class="btn-new" onclick="init()">🔄 새 게임</button></div>
<div id="msg"></div>
<script>
let board=[], score=0, best=+localStorage.getItem('2048best')||0;
const N=4;
const grid=document.getElementById('grid');

function init(){
  board=Array.from({length:N},()=>Array(N).fill(0));
  score=0; addRandom(); addRandom();
  document.getElementById('msg').textContent='';
  render();
}

function addRandom(){
  const empty=[];
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(!board[r][c])empty.push([r,c]);
  if(!empty.length)return false;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  board[r][c]=Math.random()<0.9?2:4;
  return [r,c];
}

function slide(row){
  let a=row.filter(x=>x);
  let merged=false;
  for(let i=0;i<a.length-1;i++){
    if(a[i]===a[i+1]&&!merged){
      a[i]*=2; score+=a[i]; a.splice(i+1,1); merged=true;
    } else merged=false;
  }
  while(a.length<N)a.push(0);
  return a;
}

function move(dir){
  let moved=false;
  const old=JSON.stringify(board);
  if(dir===0||dir===2){// left/right
    for(let r=0;r<N;r++){
      let row=board[r].slice();
      if(dir===2)row.reverse();
      const s=slide(row);
      if(dir===2)s.reverse();
      board[r]=s;
    }
  } else {// up/down
    for(let c=0;c<N;c++){
      let col=board.map(r=>r[c]);
      if(dir===3)col.reverse();
      const s=slide(col);
      if(dir===3)s.reverse();
      for(let r=0;r<N;r++)board[r][c]=s[r];
    }
  }
  if(JSON.stringify(board)!==old){
    moved=true; addRandom();
    if(score>best){best=score;localStorage.setItem('2048best',best);}
    render();
    if(board.some(r=>r.includes(2048)))document.getElementById('msg').textContent='🎉 2048 달성!';
    else if(!canMove())document.getElementById('msg').textContent='💀 게임 오버!';
  }
}

function canMove(){
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    if(!board[r][c])return true;
    if(c<N-1&&board[r][c]===board[r][c+1])return true;
    if(r<N-1&&board[r][c]===board[r+1][c])return true;
  }
  return false;
}

function tileClass(v){
  if(!v)return'';
  if(v>=2048)return't2048';
  return't'+v;
}

function render(){
  grid.innerHTML='';
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const d=document.createElement('div');
    d.className='cell '+(board[r][c]?tileClass(board[r][c]):'');
    d.textContent=board[r][c]||'';
    grid.appendChild(d);
  }
  document.getElementById('score').textContent=score;
  document.getElementById('best').textContent=best;
}

// 키보드
document.addEventListener('keydown',e=>{
  const map={ArrowLeft:0,ArrowRight:2,ArrowUp:1,ArrowDown:3};
  if(map[e.key]!==undefined){e.preventDefault();move(map[e.key]);}
});

// 터치 스와이프
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){move(dx<0?0:2);}
  else{move(dy<0?1:3);}
});

init();
</script>
</body>
</html>
