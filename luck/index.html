<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔮 신점 | MZ 무당의 오늘 운세</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

    :root {
      --purple: #9333ea;
      --pink: #ec4899;
      --cyan: #06b6d4;
      --gold: #f59e0b;
      --dark: #0d0d1a;
      --card: #13131f;
      --border: rgba(147,51,234,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--dark);
      color: #e2e8f0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── 배경 별 파티클 ── */
    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(2px 2px at 35% 15%, rgba(147,51,234,0.8) 0%, transparent 100%),
        radial-gradient(2px 2px at 70% 50%, rgba(236,72,153,0.6) 0%, transparent 100%);
    }

    .bg-glow {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(147,51,234,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(236,72,153,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 60% 30%, rgba(6,182,212,0.08) 0%, transparent 60%);
    }

    /* ── 헤더 ── */
    header {
      position: relative; z-index: 10;
      text-align: center;
      padding: 3rem 1.5rem 1rem;
    }

    .badge-top {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: rgba(147,51,234,0.15);
      border: 1px solid rgba(147,51,234,0.4);
      color: #c084fc;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 0.3rem 0.8rem; border-radius: 999px;
      margin-bottom: 1.2rem;
      animation: pulse-border 2s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%,100% { box-shadow: 0 0 0 0 rgba(147,51,234,0.4); }
      50% { box-shadow: 0 0 0 6px rgba(147,51,234,0); }
    }

    .title-main {
      font-size: clamp(2.2rem, 8vw, 4rem);
      font-weight: 900;
      line-height: 1.1;
      background: linear-gradient(135deg, #e879f9 0%, #c084fc 40%, #818cf8 70%, #67e8f9 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.6rem;
    }

    .title-sub {
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      color: #94a3b8;
      font-weight: 400;
      margin-bottom: 0.5rem;
    }

    .shaman-emoji {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 0.8rem;
      animation: float-emoji 3s ease-in-out infinite;
    }

    @keyframes float-emoji {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-10px) rotate(3deg); }
    }

    /* ── 메인 컨테이너 ── */
    .container {
      position: relative; z-index: 10;
      max-width: 600px;
      margin: 0 auto;
      padding: 1rem 1.5rem 4rem;
    }

    /* ── 카드 ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 40px rgba(147,51,234,0.1);
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #c084fc;
      margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 0.5rem;
    }

    /* ── 폼 ── */
    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }

    input[type="text"],
    select {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(147,51,234,0.25);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      color: #e2e8f0;
      font-size: 0.95rem;
      font-family: inherit;
      transition: all 0.2s;
      outline: none;
      appearance: none;
    }

    input[type="text"]:focus,
    select:focus {
      border-color: var(--purple);
      background: rgba(147,51,234,0.08);
      box-shadow: 0 0 0 3px rgba(147,51,234,0.15);
    }

    select option {
      background: #1e1e2e;
      color: #e2e8f0;
    }

    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.6rem;
    }

    .gender-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    .gender-btn {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(147,51,234,0.25);
      border-radius: 12px;
      padding: 0.85rem;
      color: #94a3b8;
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .gender-btn:hover { border-color: var(--purple); color: #c084fc; }
    .gender-btn.active {
      background: rgba(147,51,234,0.2);
      border-color: var(--purple);
      color: #e879f9;
      box-shadow: 0 0 15px rgba(147,51,234,0.2);
    }

    /* ── 카테고리 선택 ── */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }

    .cat-btn {
      background: rgba(255,255,255,0.03);
      border: 1.5px solid rgba(147,51,234,0.2);
      border-radius: 14px;
      padding: 1rem 0.75rem;
      cursor: pointer;
      transition: all 0.25s;
      text-align: center;
      font-family: inherit;
      color: #94a3b8;
    }

    .cat-btn .cat-emoji { font-size: 1.8rem; display: block; margin-bottom: 0.4rem; }
    .cat-btn .cat-label { font-size: 0.8rem; font-weight: 600; }

    .cat-btn:hover {
      border-color: var(--purple);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(147,51,234,0.2);
    }

    .cat-btn.active {
      background: rgba(147,51,234,0.18);
      border-color: var(--purple);
      color: #e879f9;
      box-shadow: 0 0 20px rgba(147,51,234,0.25);
    }

    /* ── 제출 버튼 ── */
    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #9333ea, #ec4899);
      border: none;
      border-radius: 16px;
      padding: 1.1rem;
      color: white;
      font-size: 1.05rem;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 0.02em;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #a855f7, #f472b6);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .submit-btn:hover::before { opacity: 1; }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(147,51,234,0.4); }
    .submit-btn:active { transform: translateY(0); }

    .submit-btn span { position: relative; z-index: 1; }

    /* ── 로딩 ── */
    #loading {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
    }

    .crystal-ball {
      font-size: 4rem;
      display: block;
      animation: spin-glow 1.5s ease-in-out infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin-glow {
      0% { transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 10px rgba(147,51,234,0.5)); }
      50% { transform: scale(1.15) rotate(10deg); filter: drop-shadow(0 0 25px rgba(236,72,153,0.8)); }
      100% { transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 10px rgba(147,51,234,0.5)); }
    }

    .loading-text {
      color: #94a3b8;
      font-size: 0.9rem;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .loading-msgs { color: #c084fc; font-weight: 600; font-size: 1rem; margin-bottom: 0.5rem; }

    /* ── 결과 ── */
    #result { display: none; }

    .result-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .result-name {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e879f9, #818cf8);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
    }

    .result-date { color: #64748b; font-size: 0.85rem; }

    .fortune-card {
      background: linear-gradient(135deg, rgba(147,51,234,0.12), rgba(236,72,153,0.08));
      border: 1px solid rgba(147,51,234,0.35);
      border-radius: 20px;
      padding: 1.75rem;
      margin-bottom: 1rem;
      position: relative;
      overflow: hidden;
      animation: card-in 0.5s ease both;
    }

    .fortune-card::before {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(147,51,234,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fortune-card:nth-child(2) { animation-delay: 0.1s; }
    .fortune-card:nth-child(3) { animation-delay: 0.2s; }
    .fortune-card:nth-child(4) { animation-delay: 0.3s; }

    .fortune-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }

    .fortune-category {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.95rem; font-weight: 700; color: #c084fc;
    }

    .fortune-score {
      font-size: 1.4rem; font-weight: 900;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .star-bar {
      display: flex; gap: 3px; margin-bottom: 0.75rem;
    }

    .star { font-size: 1rem; transition: transform 0.2s; }
    .star.lit { filter: drop-shadow(0 0 4px rgba(245,158,11,0.8)); }

    .fortune-text {
      font-size: 0.92rem;
      line-height: 1.75;
      color: #cbd5e1;
    }

    .fortune-keyword {
      display: inline-block;
      background: rgba(147,51,234,0.2);
      border: 1px solid rgba(147,51,234,0.4);
      color: #c084fc;
      font-size: 0.72rem; font-weight: 700;
      padding: 0.2rem 0.6rem; border-radius: 999px;
      margin: 0.6rem 0.2rem 0;
    }

    .lucky-items {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      margin-top: 1rem; padding-top: 1rem;
      border-top: 1px solid rgba(147,51,234,0.2);
    }

    .lucky-chip {
      background: rgba(6,182,212,0.1);
      border: 1px solid rgba(6,182,212,0.3);
      color: #67e8f9;
      font-size: 0.75rem; font-weight: 600;
      padding: 0.3rem 0.7rem; border-radius: 999px;
    }

    /* ── 오늘의 한마디 ── */
    .shaman-quote {
      background: linear-gradient(135deg, rgba(236,72,153,0.1), rgba(147,51,234,0.1));
      border: 1px solid rgba(236,72,153,0.3);
      border-radius: 20px;
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
      animation: card-in 0.5s 0.4s ease both;
    }

    .quote-label { font-size: 0.75rem; color: #f472b6; font-weight: 700; margin-bottom: 0.8rem; letter-spacing: 0.1em; }
    .quote-text { font-size: 1.05rem; font-weight: 600; color: #f1f5f9; line-height: 1.6; }
    .quote-emoji { font-size: 2rem; display: block; margin-top: 0.8rem; }

    /* ── 다시하기 버튼 ── */
    .retry-btn {
      width: 100%;
      background: transparent;
      border: 1.5px solid rgba(147,51,234,0.4);
      border-radius: 14px;
      padding: 0.9rem;
      color: #c084fc;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      animation: card-in 0.5s 0.5s ease both;
    }

    .retry-btn:hover {
      background: rgba(147,51,234,0.1);
      border-color: var(--purple);
      transform: translateY(-1px);
    }

    /* ── 푸터 문구 ── */
    .disclaimer {
      text-align: center;
      color: #374151;
      font-size: 0.72rem;
      margin-top: 2rem;
      line-height: 1.6;
    }

    /* ── 반응형 ── */
    @media (max-width: 400px) {
      .category-grid { grid-template-columns: repeat(2, 1fr); }
      .card { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="bg-glow"></div>

  <header>
    <div class="badge-top">✨ AI 신점 · 무료 운세</div>
    <span class="shaman-emoji">🔮</span>
    <h1 class="title-main">신점닷컴</h1>
    <p class="title-sub">MZ 무당이 직접 보는 오늘의 운세</p>
  </header>

  <div class="container">

    <!-- 입력 폼 -->
    <div id="formSection">
      <div class="card">
        <div class="card-title">🧿 내 정보 입력</div>

        <div class="form-group">
          <label>이름 (닉네임도 OK)</label>
          <input type="text" id="userName" placeholder="예) 김운세" maxlength="10" />
        </div>

        <div class="form-group">
          <label>성별</label>
          <div class="gender-row">
            <button class="gender-btn active" onclick="selectGender('남')" id="btn-남">🙋‍♂️ 남자</button>
            <button class="gender-btn" onclick="selectGender('여')" id="btn-여">🙋‍♀️ 여자</button>
          </div>
        </div>

        <div class="form-group">
          <label>생년월일</label>
          <div class="date-row">
            <select id="birthYear"></select>
            <select id="birthMonth"></select>
            <select id="birthDay"></select>
          </div>
        </div>

        <div class="form-group">
          <label>태어난 시간 <span style="color:#4b5563;font-weight:400;">(모르면 패스)</span></label>
          <select id="birthHour">
            <option value="-1">🤷 모름</option>
            <option value="0">자시 (23~01시)</option>
            <option value="1">축시 (01~03시)</option>
            <option value="2">인시 (03~05시)</option>
            <option value="3">묘시 (05~07시)</option>
            <option value="4">진시 (07~09시)</option>
            <option value="5">사시 (09~11시)</option>
            <option value="6">오시 (11~13시)</option>
            <option value="7">미시 (13~15시)</option>
            <option value="8">신시 (15~17시)</option>
            <option value="9">유시 (17~19시)</option>
            <option value="10">술시 (19~21시)</option>
            <option value="11">해시 (21~23시)</option>
          </select>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🎴 무엇이 궁금해?</div>
        <div class="category-grid">
          <button class="cat-btn active" onclick="selectCat(this, 'total')" data-cat="total">
            <span class="cat-emoji">🌟</span>
            <span class="cat-label">오늘의 총운</span>
          </button>
          <button class="cat-btn" onclick="selectCat(this, 'love')" data-cat="love">
            <span class="cat-emoji">💕</span>
            <span class="cat-label">연애운</span>
          </button>
          <button class="cat-btn" onclick="selectCat(this, 'money')" data-cat="money">
            <span class="cat-emoji">💰</span>
            <span class="cat-label">재물운</span>
          </button>
          <button class="cat-btn" onclick="selectCat(this, 'career')" data-cat="career">
            <span class="cat-emoji">🔥</span>
            <span class="cat-label">직장/학업운</span>
          </button>
        </div>
      </div>

      <button class="submit-btn" onclick="runFortune()">
        <span>🔮 지금 바로 운세 보기</span>
      </button>
    </div>

    <!-- 로딩 -->
    <div id="loading" class="card" style="text-align:center; padding:3rem 1rem;">
      <span class="crystal-ball">🔮</span>
      <div class="loading-msgs" id="loadingMsg">신기(神氣) 채널 연결 중...</div>
      <div class="loading-text">잠시만 기다려줘 👁️</div>
    </div>

    <!-- 결과 -->
    <div id="result"></div>
  </div>

  <script>
    // ── 셀렉트 채우기 ──
    const yearSel = document.getElementById('birthYear');
    const monthSel = document.getElementById('birthMonth');
    const daySel = document.getElementById('birthDay');

    for (let y = 2010; y >= 1940; y--) {
      const o = document.createElement('option');
      o.value = y; o.textContent = y + '년';
      if (y === 1995) o.selected = true;
      yearSel.appendChild(o);
    }
    for (let m = 1; m <= 12; m++) {
      const o = document.createElement('option');
      o.value = m; o.textContent = m + '월';
      if (m === 1) o.selected = true;
      monthSel.appendChild(o);
    }
    for (let d = 1; d <= 31; d++) {
      const o = document.createElement('option');
      o.value = d; o.textContent = d + '일';
      if (d === 1) o.selected = true;
      daySel.appendChild(o);
    }

    let selectedGender = '남';
    let selectedCat = 'total';

    function selectGender(g) {
      selectedGender = g;
      document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + g).classList.add('active');
    }

    function selectCat(el, cat) {
      selectedCat = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
    }

    // ── 운세 데이터 ──
    const FORTUNES = {
      total: {
        label: '🌟 오늘의 총운',
        pools: [
          { score: 92, texts: ['오늘은 완전 레전드 날이야. 뭘 해도 다 풀리는 에너지가 흐르고 있어. 아침에 눈 뜨는 순간부터 우주가 너 편이거든?', '그동안 묵혀뒀던 거 오늘 다 터져나올 준비 됐어. 두려워하지 말고 그냥 질러봐. 후회 없을 하루.'], keys: ['대길', '행운폭발', '레전드데이'], lucky: ['💎 흰색 아이템', '☕ 아이스 아메리카노', '🕙 오전 10시'] },
          { score: 78, texts: ['오늘 에너지 꽤 좋아. 약간 충전이 필요한 배터리가 80%쯤 된 느낌? 큰 결정은 내일로 미루고 오늘은 관계에 집중해봐.', '주변 사람들이 너한테 관심 많은 날이야. SNS 올리면 반응 폭발할 수도 있어. 자신감 뿜뿜하게 가봐!'], keys: ['소확행', '관계운UP', '긍정에너지'], lucky: ['💜 보라색 소품', '🍵 따뜻한 차', '🌙 오후 2시'] },

    function seededRandom(seed) {
      let s = seed;
      return function() {
        s = (s * 1664525 + 1013904223) & 0xffffffff;
        return (s >>> 0) / 0xffffffff;
      };
    }

    function pickFortune(cat, name, year, month, day, gender) {
      const today = new Date();
      const seed = (year * 31 + month * 7 + day * 3 + today.getFullYear() * 365 + today.getMonth() * 30 + today.getDate())

      const rng = seededRandom(Math.abs(seed));
      const pool = FORTUNES[cat].pools;
      const idx = Math.floor(rng() * pool.length);
      const item = pool[idx];
      const textIdx = Math.floor(rng() * item.texts.length);
      const quoteIdx = Math.floor(rng() * QUOTES.length);
      return { item, textIdx, quoteIdx };
    }
