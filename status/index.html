<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>훈희 작업 현황</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#08080f;color:#e2d4ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:20px 16px 40px;}
a{color:inherit;text-decoration:none;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.topbar h1{font-size:1.1rem;font-weight:700;color:#c084fc;}
.topbar .home{font-size:0.8rem;background:#1a1530;border:1px solid #2a1f4e;padding:5px 12px;border-radius:8px;color:#9f8ab8;}
.status-hero{background:linear-gradient(135deg,#10101e,#1a1030);border:1px solid #3d2a5e;border-radius:16px;padding:20px;margin-bottom:16px;}
.status-hero .label{font-size:0.7rem;color:#6b5a8a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.status-hero .main-status{font-size:1.5rem;font-weight:700;margin-bottom:4px;}
.status-hero .current-task{font-size:0.88rem;color:#c084fc;margin-bottom:12px;}
.status-hero .updated{font-size:0.7rem;color:#4a3a6a;}
.pill{display:inline-flex;align-items:center;gap:5px;background:#1a1530;border:1px solid #2a1f4e;border-radius:99px;padding:3px 10px;font-size:0.72rem;margin-right:4px;margin-top:6px;}
.pill.green{border-color:#22c55e44;color:#22c55e;background:#0a1a0f;}
.pill.purple{border-color:#7c3aed44;color:#c084fc;background:#130d1a;}
.pill.blue{border-color:#3b82f644;color:#60a5fa;background:#0d1520;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
@media(max-width:480px){.grid{grid-template-columns:1fr;}}
.card{background:#10101e;border:1px solid #2a1f4e;border-radius:14px;padding:14px;}
.card h3{font-size:0.7rem;color:#6b5a8a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.ctx-num{font-size:2rem;font-weight:800;color:#c084fc;}
.bar-wrap{background:#1a1530;border-radius:99px;height:6px;margin:6px 0 4px;}
.bar{height:6px;border-radius:99px;transition:width .6s ease;}
.ctx-bar{background:linear-gradient(90deg,#7c3aed,#c084fc);}
.warn .ctx-bar{background:linear-gradient(90deg,#eab308,#fde047);}
.danger .ctx-bar{background:linear-gradient(90deg,#ef4444,#f97316);}
.small{font-size:0.7rem;color:#4a3a6a;}
.row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #141422;font-size:0.82rem;}
.row:last-child{border:none;}
.badge{background:#1a1530;border:1px solid #2a1f4e;border-radius:6px;padding:1px 8px;font-size:0.7rem;color:#9f8ab8;}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;flex-shrink:0;}
.dot.green{background:#22c55e;box-shadow:0 0 5px #22c55e88;}
.dot.yellow{background:#eab308;}
.dot.gray{background:#4a3a6a;}
.big-card{background:#10101e;border:1px solid #2a1f4e;border-radius:14px;padding:14px;margin-bottom:12px;}
.big-card h3{font-size:0.7rem;color:#6b5a8a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.next-task{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid #141422;font-size:0.82rem;}
.next-task:last-child{border:none;}
.task-icon{font-size:1rem;flex-shrink:0;margin-top:1px;}
.task-text .title{font-weight:600;color:#e2d4ff;}
.task-text .desc{font-size:0.7rem;color:#6b5a8a;margin-top:2px;}
#refresh-btn{display:block;width:100%;background:#1a1530;color:#c084fc;border:1px solid #3d2a5e;border-radius:10px;padding:10px;cursor:pointer;font-size:0.85rem;text-align:center;}
#refresh-btn:active{background:#2a1f4e;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #3d2a5e;border-top-color:#c084fc;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px;}
@keyframes spin{to{transform:rotate(360deg);}}
.blink{animation:blink 1.2s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
</style>
</head>
<body>
<div class="topbar">
  <h1>📊 훈희 작업 현황</h1>
  <a class="home" href="/">← 홈</a>
</div>

<div class="status-hero" id="hero">
  <div class="label">현재 상태</div>
  <div class="main-status" id="main-status"><span class="spinner"></span>로딩 중...</div>
  <div class="current-task" id="current-task"></div>
  <div id="pills"></div>
  <div class="updated" id="updated"></div>
</div>

<div class="grid">
  <div class="card">
    <h3>🧠 컨텍스트</h3>
    <div class="ctx-num" id="ctx-pct">--</div>
    <div class="bar-wrap" id="ctx-wrap"><div class="bar ctx-bar" id="ctx-bar" style="width:0%"></div></div>
    <div class="small" id="ctx-sub">--</div>
  </div>
  <div class="card">
    <h3>🤖 에이전트 정보</h3>
    <div id="agent-rows"><div class="small">로딩 중...</div></div>
  </div>
</div>

<div class="big-card" id="tasks-card">
  <h3>✅ 완료된 작업</h3>
  <div id="done-tasks"><div class="small">로딩 중...</div></div>
</div>

<div class="big-card" id="next-card">
  <h3>⏳ 다음 작업</h3>
  <div id="next-tasks"><div class="small">로딩 중...</div></div>
</div>

<div class="big-card">
  <h3>⏰ 크론 스케줄</h3>
  <div id="cron-rows"><div class="small">로딩 중...</div></div>
</div>

<button id="refresh-btn" onclick="load(true)">🔄 새로고침</button>

<script>
let loading=false;
async function load(manual){
  if(loading)return;
  loading=true;
  if(manual){document.getElementById('refresh-btn').innerHTML='<span class="spinner"></span>새로고침 중...';}
  try{
    const r=await fetch('/api/status?t='+Date.now());
    const d=await r.json();
    if(d.error){throw new Error(d.error);}

    // Hero
    const st=d['상태']||'';
    document.getElementById('main-status').textContent=st||'알 수 없음';
    document.getElementById('main-status').style.color=st.includes('🟢')?'#22c55e':st.includes('🟡')?'#eab308':'#9f8ab8';
    document.getElementById('current-task').textContent=d['현재작업']||'-';
    document.getElementById('updated').textContent='마지막 업데이트: '+(d['업데이트시각']||'-');

    // Pills
    const model=d['모델']||'-';
    const ctx=d['컨텍스트%']||'0';
    document.getElementById('pills').innerHTML=
      `<span class="pill purple">🤖 ${model}</span>`+
      `<span class="pill ${parseInt(ctx)<50?'green':parseInt(ctx)<80?'blue':'yellow'}">🧠 컨텍스트 ${ctx}%</span>`+
      (d['비고']?`<span class="pill">${d['비고'].slice(0,20)}</span>`:'');

    // Context bar
    const pct=parseInt(ctx)||0;
    document.getElementById('ctx-pct').textContent=pct+'%';
    document.getElementById('ctx-bar').style.width=pct+'%';
    const wrap=document.getElementById('ctx-wrap');
    wrap.className='bar-wrap'+(pct>80?' danger':pct>50?' warn':'');
    document.getElementById('ctx-sub').textContent=pct>80?'⚠️ 곧 컨텍스트 압축':pct>50?'중간 이상 사용 중':'여유 있음';

    // Agent
    document.getElementById('agent-rows').innerHTML=[
      ['모델',model],['세션','main'],['채널','Slack #openclaw'],
    ].map(([k,v])=>`<div class="row"><span>${k}</span><span class="badge">${v}</span></div>`).join('');

    // Done tasks
    const done=(d['완료작업']||'').split(/[,\/]/).filter(Boolean);
    document.getElementById('done-tasks').innerHTML=done.length
      ?done.map(t=>`<div class="next-task"><span class="task-icon">✅</span><div class="task-text"><div class="title">${t.trim()}</div></div></div>`).join('')
      :'<div class="small">없음</div>';

    // Next tasks
    const next=(d['다음작업']||'').split(/[,\/]/).filter(Boolean);
    document.getElementById('next-tasks').innerHTML=next.length
      ?next.map((t,i)=>`<div class="next-task"><span class="task-icon">${i===0?'🔜':'⬜'}</span><div class="task-text"><div class="title">${t.trim()}</div></div></div>`).join('')
      :'<div class="small">없음</div>';

    // Crons (static)
    document.getElementById('cron-rows').innerHTML=[
      {name:'daily-news-9am',time:'매일 09:00 KST',on:true},
      {name:'token-reminder',time:'매 20분',on:true},
    ].map(c=>`<div class="row"><span><span class="dot ${c.on?'green':'gray'}"></span>${c.name}</span><span class="badge">${c.time}</span></div>`).join('');

  }catch(e){
    document.getElementById('main-status').textContent='⚠️ 오류: '+e.message;
  }finally{
    loading=false;
    document.getElementById('refresh-btn').textContent='🔄 새로고침';
  }
}
load();
setInterval(()=>load(false),20000);
</script>
</body>
</html>
