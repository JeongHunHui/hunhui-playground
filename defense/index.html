<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>훈희 디펜스 🏰</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
h1 { margin: 16px 0 8px; font-size: 1.6rem; color: #c084fc; text-shadow: 0 0 20px #c084fc88; }
#ui { display: flex; gap: 16px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
.stat { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 6px 14px; font-size: 0.9rem; }
.stat span { color: #c084fc; font-weight: bold; }
#canvas { border: 2px solid #333; border-radius: 4px; cursor: crosshair; background: #111; display: block; }
#tower-select { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; justify-content: center; }
.tower-btn {
  padding: 8px 14px; border-radius: 8px; border: 2px solid transparent;
  cursor: pointer; font-size: 0.85rem; background: #1a1a2e; color: #ccc;
  transition: all 0.2s;
}
.tower-btn:hover { border-color: #c084fc; color: #fff; }
.tower-btn.active { border-color: #c084fc; background: #2d1f4e; color: #fff; }
.tower-btn .cost { color: #fbbf24; font-size: 0.75rem; }
#msg { color: #f87171; font-size: 0.9rem; height: 20px; margin-bottom: 4px; }
#start-btn {
  padding: 10px 28px; border-radius: 8px; border: none;
  background: linear-gradient(135deg, #7c3aed, #c084fc);
  color: #fff; font-size: 1rem; font-weight: bold; cursor: pointer;
  margin: 4px; transition: opacity 0.2s;
}
#start-btn:hover { opacity: 0.85; }
#start-btn:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>
<h1>🏰 훈희 디펜스</h1>
<div id="ui">
  <div class="stat">💰 골드: <span id="gold">150</span></div>
  <div class="stat">❤️ 목숨: <span id="lives">20</span></div>
  <div class="stat">🌊 웨이브: <span id="wave">0</span></div>
  <div class="stat">⚔️ 처치: <span id="kills">0</span></div>
</div>
<div id="tower-select">
  <button class="tower-btn active" data-type="arrow" onclick="selectTower('arrow',this)">🏹 화살탑 <span class="cost">(50G)</span></button>
  <button class="tower-btn" data-type="cannon" onclick="selectTower('cannon',this)">💣 대포탑 <span class="cost">(100G)</span></button>
  <button class="tower-btn" data-type="magic" onclick="selectTower('magic',this)">✨ 마법탑 <span class="cost">(80G)</span></button>
  <button class="tower-btn" data-type="ice" onclick="selectTower('ice',this)">❄️ 얼음탑 <span class="cost">(70G)</span></button>
</div>
<div id="msg"></div>
<canvas id="canvas"></canvas>
<div style="margin:10px;">
  <button id="start-btn" onclick="startWave()">▶ 웨이브 시작</button>
  <button id="start-btn" onclick="sellMode()" style="background:linear-gradient(135deg,#dc2626,#f87171)">🔨 판매 모드</button>

  <button id="speed-btn" onclick="cycleSpeed()" style="background:linear-gradient(135deg,#d97706,#fbbf24);min-width:60px">⚡ 1x</button>
</div>
<div style="color:#555;font-size:0.78rem;margin-top:6px;">좌클릭: 배치 | 우클릭: 업그레이드(Lv3) | 드래그: 타워 이동 | 경로 위 배치 불가</div>

<script>
const CELL = 40;
const COLS = 20, ROWS = 14;
const W = COLS * CELL, H = ROWS * CELL;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

// 경로 정의 (격자 좌표)
const PATH = [
  [0,3],[1,3],[2,3],[3,3],[4,3],[4,4],[4,5],[4,6],
  [5,6],[6,6],[7,6],[8,6],[8,5],[8,4],[8,3],[8,2],[8,1],
  [9,1],[10,1],[11,1],[12,1],[12,2],[12,3],[12,4],[12,5],[12,6],
  [13,6],[14,6],[15,6],[15,7],[15,8],[15,9],[15,10],
  [14,10],[13,10],[12,10],[11,10],[10,10],[9,10],[8,10],
  [8,11],[8,12],[8,13],[9,13],[10,13],[11,13],[12,13],[13,13],
  [14,13],[15,13],[16,13],[17,13],[18,13],[19,13]
];

// 경로 셀 세트
const pathSet = new Set(PATH.map(([c,r])=>`${c},${r}`));

// 게임 상태
let gold = 150, lives = 20, wave = 0, kills = 0;
let towers = [], enemies = [], bullets = [], particles = [];
let selectedType = 'arrow';
let isSelling = false;
let isMoving = false;
let movingTower = null;
let dragging = null;   // 드래그 중인 타워
let dragX = 0, dragY = 0; // 마우스 현재 위치
let waveRunning = false;
let autoStartTimer = 0;
let gameSpeed = 1; // 1x, 2x, 3x
let spawnTimer = 0, spawnCount = 0, spawnTotal = 0;
let gameOver = false;

const TOWER_DEF = {
  arrow:  { color: '#22c55e', emoji: '🏹', cost: 50,  dmg: 15, range: 3.5, rate: 60,  bullet: '#86efac', size: 6 },
  cannon: { color: '#f97316', emoji: '💣', cost: 100, dmg: 60, range: 2.5, rate: 120, bullet: '#fdba74', size: 10, splash: 1.2 },
  magic:  { color: '#a855f7', emoji: '✨', cost: 80,  dmg: 30, range: 4,   rate: 45,  bullet: '#d8b4fe', size: 7 },
  ice:    { color: '#38bdf8', emoji: '❄️', cost: 70,  dmg: 10, range: 3,   rate: 50,  bullet: '#7dd3fc', size: 7, slow: 0.4 },
};

function selectTower(type, btn) {
  isSelling = false;
  selectedType = type;
  document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  showMsg('');
}
function sellMode() {
  isSelling = !isSelling; isMoving = false; movingTower = null;
  showMsg(isSelling ? '🔨 판매 모드: 타워 클릭해서 판매' : '');
}
function moveMode() {
  isMoving = !isMoving; isSelling = false; movingTower = null;
  showMsg(isMoving ? '🚚 이동 모드: 먼저 이동할 타워, 그 다음 빈 칸 클릭' : '');
}
function cycleSpeed() {
  gameSpeed = gameSpeed === 1 ? 2 : gameSpeed === 2 ? 3 : 1;
  document.getElementById('speed-btn').textContent = `⚡ ${gameSpeed}x`;
}

function upgradeCost(t) {
  return Math.floor(TOWER_DEF[t.type].cost * 0.7 * t.level);
}
function upgradeMode(col, row) {
  const t = towers.find(t => t.col === col && t.row === row);
  if (!t) return;
  if (t.level >= 3) { showMsg('⚠️ 이미 최대 레벨!'); return; }
  const cost = upgradeCost(t);
  if (gold < cost) { showMsg(`💰 골드 부족! 업그레이드 ${cost}G 필요`); return; }
  gold -= cost;
  t.level++;
  showMsg(`⬆️ ${TOWER_DEF[t.type].emoji} Lv.${t.level} 업그레이드! (-${cost}G)`);
  updateUI();
}

function showMsg(m) { document.getElementById('msg').textContent = m; }
function updateUI() {
  document.getElementById('gold').textContent = gold;
  document.getElementById('lives').textContent = lives;
  document.getElementById('wave').textContent = wave;
  document.getElementById('kills').textContent = kills;
}

// 경로 픽셀 좌표 계산
function pathPixel(i) {
  const [c, r] = PATH[i];
  return { x: c * CELL + CELL/2, y: r * CELL + CELL/2 };
}

function getCell(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    col: Math.floor((e.clientX - rect.left) / CELL),
    row: Math.floor((e.clientY - rect.top) / CELL),
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

canvas.addEventListener('mousedown', e => {
  if (gameOver || e.button !== 0) return;
  const { col, row, x, y } = getCell(e);
  const t = towers.find(t => t.col === col && t.row === row);
  if (t && !isSelling) {
    dragging = t;
    dragX = x; dragY = y;
    e.preventDefault();
  }
});

canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  dragX = e.clientX - rect.left;
  dragY = e.clientY - rect.top;
});

canvas.addEventListener('mouseup', e => {
  if (!dragging) return;
  const { col, row } = getCell(e);
  const occupied = towers.some(t => t !== dragging && t.col === col && t.row === row);
  if (!pathSet.has(`${col},${row}`) && !occupied && col >= 0 && col < COLS && row >= 0 && row < ROWS) {
    dragging.col = col;
    dragging.row = row;
    showMsg('✅ 이동 완료!');
  } else {
    showMsg('⚠️ 그 위치엔 놓을 수 없어!');
  }
  dragging = null;
});

canvas.addEventListener('mouseleave', () => { dragging = null; });

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const col = Math.floor((e.clientX - rect.left) / CELL);
  const row = Math.floor((e.clientY - rect.top) / CELL);
  upgradeMode(col, row);
});

canvas.addEventListener('click', e => {
  if (gameOver || dragging) return;
  const { col, row } = getCell(e);

  if (isSelling) {
    const idx = towers.findIndex(t => t.col === col && t.row === row);
    if (idx >= 0) {
      const refund = Math.floor(TOWER_DEF[towers[idx].type].cost * 0.6);
      gold += refund;
      showMsg(`💰 +${refund}G 환불`);
      towers.splice(idx, 1);
      updateUI();
    }
    return;
  }



  if (pathSet.has(`${col},${row}`)) { showMsg('⚠️ 경로 위에는 배치 불가!'); return; }
  if (towers.some(t => t.col === col && t.row === row)) { showMsg('⚠️ 이미 타워가 있어!'); return; }

  const def = TOWER_DEF[selectedType];
  if (gold < def.cost) { showMsg(`💰 골드 부족! (${def.cost}G 필요)`); return; }

  gold -= def.cost;
  towers.push({ col, row, type: selectedType, timer: 0, target: null, level: 1 });
  showMsg('');
  updateUI();
});

function startWave() {
  if (waveRunning || gameOver) return;
  wave++;
  spawnCount = 0;
  spawnTotal = 8 + wave * 3;
  spawnTimer = 0;
  waveRunning = true;
  document.getElementById('start-btn').disabled = true;
  updateUI();
}

function spawnEnemy() {
  const hp = Math.floor((40 + wave * 20) * (Math.random() * 0.4 + 0.8));
  const speed = 0.8 + wave * 0.05;
  const boss = spawnCount === spawnTotal - 1 && wave % 5 === 0;
  enemies.push({
    pathIdx: 0,
    x: pathPixel(0).x, y: pathPixel(0).y,
    hp, maxHp: boss ? hp * 3 : hp,
    speed: boss ? speed * 0.6 : speed,
    slowTimer: 0,
    boss, size: boss ? 18 : 10,
    color: boss ? '#ef4444' : `hsl(${Math.random()*60+0},70%,60%)`
  });
}

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function updateEnemies() {
  for (let e of enemies) {
    const spd = e.slowTimer > 0 ? e.speed * 0.4 : e.speed;
    if (e.slowTimer > 0) e.slowTimer--;

    if (e.pathIdx >= PATH.length - 1) {
      lives -= e.boss ? 3 : 1;
      e.dead = true;
      if (lives <= 0) { gameOver = true; }
      continue;
    }
    const target = pathPixel(e.pathIdx + 1);
    const dx = target.x - e.x, dy = target.y - e.y;
    const d = Math.hypot(dx, dy);
    if (d < spd) {
      e.pathIdx++;
    } else {
      e.x += dx/d * spd;
      e.y += dy/d * spd;
    }
  }
  enemies = enemies.filter(e => !e.dead);
}

function updateTowers() {
  for (let t of towers) {
    t.timer++;
    const base = TOWER_DEF[t.type];
    const lvMult = 1 + (t.level - 1) * 0.4; // 레벨당 40% 향상
    const def = {
      ...base,
      dmg: base.dmg * lvMult,
      range: base.range * (1 + (t.level-1)*0.15),
      rate: Math.max(20, base.rate / lvMult),
    };
    const rangePx = def.range * CELL;
    const cx = t.col*CELL+CELL/2, cy = t.row*CELL+CELL/2;

    // 타겟 선정: 범위 내 적 중 pathIdx 가장 작은 놈(맨 뒤) 우선
    t.target = null;
    let minPathIdx = Infinity;
    for (let e of enemies) {
      const td = dist({ x: cx, y: cy }, e);
      if (td < rangePx && e.pathIdx < minPathIdx) {
        minPathIdx = e.pathIdx;
        t.target = e;
      }
    }

    if (t.target && t.timer >= def.rate) {
      t.timer = 0;
      bullets.push({
        x: cx, y: cy,
        tx: t.target, type: t.type,
        speed: 5, def
      });
    }
  }
}

function updateBullets() {
  for (let b of bullets) {
    if (!b.tx || b.tx.dead) { b.dead = true; continue; }
    const dx = b.tx.x - b.x, dy = b.tx.y - b.y;
    const d = Math.hypot(dx, dy);
    if (d < b.speed + 2) {
      // 히트
      if (b.def.splash) {
        for (let e of enemies) {
          if (dist(e, b.tx) < b.def.splash * CELL) {
            e.hp -= b.def.dmg;
            if (e.hp <= 0) { killEnemy(e); }
          }
        }
        spawnParticles(b.tx.x, b.tx.y, '#f97316', 12);
      } else {
        b.tx.hp -= b.def.dmg;
        if (b.def.slow) b.tx.slowTimer = 90;
        if (b.tx.hp <= 0) { killEnemy(b.tx); }
        spawnParticles(b.tx.x, b.tx.y, b.def.bullet, 5);
      }
      b.dead = true;
    } else {
      b.x += dx/d * b.speed;
      b.y += dy/d * b.speed;
    }
  }
  bullets = bullets.filter(b => !b.dead);
}

function killEnemy(e) {
  if (e.dead) return;
  e.dead = true;
  const reward = e.boss ? 30 + wave * 5 : 8 + wave;
  gold += reward;
  kills++;
  spawnParticles(e.x, e.y, '#fbbf24', 8);
  updateUI();
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * 2 + 1;
    particles.push({ x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, life: 30, color });
  }
}

function updateParticles() {
  for (let p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);
}

// 그리기
function draw() {
  ctx.clearRect(0, 0, W, H);

  // 배경 격자
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c*CELL,0); ctx.lineTo(c*CELL,H); ctx.stroke(); }
  for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0,r*CELL); ctx.lineTo(W,r*CELL); ctx.stroke(); }

  // 경로 그리기
  ctx.fillStyle = '#2d2d1e';
  for (const [c, r] of PATH) ctx.fillRect(c*CELL+1, r*CELL+1, CELL-2, CELL-2);
  // 경로 라인
  ctx.beginPath();
  ctx.strokeStyle = '#5a5a2a';
  ctx.lineWidth = 2;
  ctx.moveTo(pathPixel(0).x, pathPixel(0).y);
  for (let i = 1; i < PATH.length; i++) { const p = pathPixel(i); ctx.lineTo(p.x, p.y); }
  ctx.stroke();

  // 시작/끝 표시
  ctx.font = '18px sans-serif';
  ctx.fillText('🏁', PATH[0][0]*CELL+10, PATH[0][1]*CELL+26);
  ctx.fillText('🏰', PATH[PATH.length-1][0]*CELL+8, PATH[PATH.length-1][1]*CELL+26);

  // 타워
  for (let t of towers) {
    const def = TOWER_DEF[t.type];
    const cx = t.col*CELL+CELL/2, cy = t.row*CELL+CELL/2;
    // 범위 원 (hover느낌)
    ctx.beginPath();
    ctx.arc(cx, cy, def.range*CELL, 0, Math.PI*2);
    ctx.strokeStyle = def.color + '22';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cx, cy, CELL*0.38, 0, Math.PI*2);
    ctx.fillStyle = '#1a1a2e';
    ctx.fill();
    ctx.strokeStyle = def.color;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(def.emoji, cx, cy+6);

    // 레벨 표시
    if (t.level > 1) {
      ctx.font = 'bold 10px sans-serif';
      ctx.fillStyle = '#fbbf24';
      ctx.fillText('★'.repeat(t.level-1), cx, cy - CELL*0.3);
    }

    // 이동 선택된 타워 강조
    if (movingTower === t) {
      ctx.beginPath();
      ctx.arc(cx, cy, CELL*0.45, 0, Math.PI*2);
      ctx.strokeStyle = '#fbbf24';
      ctx.lineWidth = 3;
      ctx.stroke();
    }
  }

  // 적
  for (let e of enemies) {
    // HP바
    const barW = e.size * 3;
    ctx.fillStyle = '#333';
    ctx.fillRect(e.x - barW/2, e.y - e.size - 8, barW, 5);
    ctx.fillStyle = e.hp/e.maxHp > 0.5 ? '#22c55e' : e.hp/e.maxHp > 0.25 ? '#fbbf24' : '#ef4444';
    ctx.fillRect(e.x - barW/2, e.y - e.size - 8, barW * (e.hp/e.maxHp), 5);

    ctx.beginPath();
    ctx.arc(e.x, e.y, e.size, 0, Math.PI*2);
    ctx.fillStyle = e.slowTimer > 0 ? '#7dd3fc' : (e.boss ? '#ef4444' : e.color);
    ctx.fill();
    if (e.boss) {
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('👹', e.x, e.y + 5);
    }
  }

  // 탄환
  for (let b of bullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.def.size/2, 0, Math.PI*2);
    ctx.fillStyle = b.def.bullet;
    ctx.fill();
  }

  // 드래그 고스트
  if (dragging) {
    const def = TOWER_DEF[dragging.type];
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.arc(dragX, dragY, CELL*0.38, 0, Math.PI*2);
    ctx.fillStyle = '#1a1a2e';
    ctx.fill();
    ctx.strokeStyle = def.color;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(def.emoji, dragX, dragY+6);
    ctx.globalAlpha = 1;

    // 놓을 수 있는 칸 표시
    const hc = Math.floor(dragX/CELL), hr = Math.floor(dragY/CELL);
    const canPlace = !pathSet.has(`${hc},${hr}`) && !towers.some(t=>t!==dragging&&t.col===hc&&t.row===hr);
    ctx.fillStyle = canPlace ? 'rgba(34,197,94,0.2)' : 'rgba(239,68,68,0.2)';
    ctx.fillRect(hc*CELL, hr*CELL, CELL, CELL);
  }

  // 파티클
  for (let p of particles) {
    ctx.globalAlpha = p.life / 30;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 게임오버
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = 'bold 48px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ef4444';
    ctx.fillText('💀 GAME OVER', W/2, H/2 - 20);
    ctx.font = '24px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText(`${wave}웨이브 | ${kills}마리 처치`, W/2, H/2 + 30);
    ctx.font = '16px sans-serif';
    ctx.fillStyle = '#888';
    ctx.fillText('새로고침해서 다시 시작', W/2, H/2 + 65);
  }


}

function tick() {
  if (gameOver) return;
  if (waveRunning && spawnCount < spawnTotal) {
    spawnTimer++;
    if (spawnTimer >= Math.max(60, 100 - wave * 3)) {
      spawnEnemy(); spawnCount++; spawnTimer = 0;
    }
  }
  updateEnemies();
  updateTowers();
  updateBullets();
  updateParticles();

  // 자동 웨이브
  if (waveRunning && enemies.length === 0 && spawnCount >= spawnTotal) {
    waveRunning = false;
    const bonus = wave * 20;
    gold += bonus;
    autoStartTimer = 180;
    showMsg(`🎉 웨이브 ${wave} 클리어! +${bonus}G | 3초 후 자동 시작...`);
    updateUI();
  }
  if (!waveRunning && autoStartTimer > 0 && !gameOver) {
    autoStartTimer--;
    const sec = Math.ceil(autoStartTimer / 60);
    if (autoStartTimer % 60 === 0 && autoStartTimer > 0) showMsg(`⏱ ${sec}초 후 웨이브 ${wave+1} 자동 시작...`);
    if (autoStartTimer === 0) startWave();
  }
}

function gameLoop() {
  for (let i = 0; i < gameSpeed; i++) tick();
  updateUI();
  draw();
  requestAnimationFrame(gameLoop);
}

updateUI();
gameLoop();
</script>
