<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Arrow Survivor 🏹</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0a1a;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;overflow:hidden;height:100vh;}
canvas{display:block;touch-action:none;}
#hud{position:fixed;top:0;left:50%;transform:translateX(-50%);display:flex;gap:16px;padding:10px;z-index:10;pointer-events:none;}
.hud-box{background:rgba(13,10,26,0.85);border:1px solid #3d2a5e;border-radius:8px;padding:4px 14px;font-size:0.85rem;}
.hud-box span{color:#c084fc;font-weight:700;}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,10,26,0.9);z-index:20;}
#overlay h1{font-size:2rem;color:#c084fc;margin-bottom:8px;}
#overlay p{color:#9f8ab8;margin-bottom:24px;text-align:center;}
#start-btn{padding:14px 36px;border-radius:99px;border:none;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;}
</style>
<style>
#tut-btn{position:fixed;top:10px;right:10px;z-index:998;padding:5px 12px;border-radius:99px;background:rgba(13,10,26,0.85);border:1px solid #3d2a5e;color:#c084fc;font-size:0.82rem;font-weight:700;cursor:pointer;backdrop-filter:blur(8px);}
#tut-modal{display:none;position:fixed;inset:0;background:#0009;z-index:1000;align-items:center;justify-content:center;padding:16px;}
#tut-modal.open{display:flex;}
#tut-inner{background:#120a28;border:1px solid #3d2a5e;border-radius:16px;max-width:440px;width:100%;padding:20px;max-height:80vh;overflow-y:auto;}
#tut-inner h3{color:#c084fc;font-size:1.1rem;margin-bottom:12px;}
.tut-ctrl{background:#1a1030;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:0.82rem;color:#a78bfa;}
.tut-ctrl b{color:#c084fc;display:block;margin-bottom:4px;}
.tut-tips{list-style:none;display:flex;flex-direction:column;gap:6px;}
.tut-tips li{font-size:0.82rem;color:#9f8ab8;padding:6px 10px;background:#1a1030;border-radius:8px;border-left:3px solid #3d2a5e;}
.tut-close{width:100%;margin-top:14px;padding:10px;border-radius:8px;border:none;background:#2d1f4e;color:#e2d4ff;cursor:pointer;font-size:0.9rem;}
</style>
</head>
<body>
<div id="tut-btn" onclick="document.getElementById('tut-modal').classList.add('open')">❓ 도움말</div>
<div id="tut-modal" onclick="if(event.target===this)this.classList.remove('open')">
<div id="tut-inner">
  <h3>🏹 Arrow Survivor</h3>
  <div class="tut-ctrl"><b>🎮 조작법</b>마우스/터치로 화살 방향 조준</div>
  <ul class="tut-tips"><li>💡 게이트를 통과하면 화살 수가 변해요</li><li>💡 × 게이트(초록)는 곱하기, ÷(빨강)는 나누기</li><li>💡 화살이 너무 많아지면 관리가 어려워요!</li><li>💡 웨이브가 올라갈수록 적이 강해지니 주의!</li></ul>
  <button class="tut-close" onclick="document.getElementById('tut-modal').classList.remove('open')">✕ 닫기</button>
</div>
</div>
<a href="/" style="position:fixed;top:10px;left:10px;z-index:999;display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:99px;background:rgba(13,10,26,0.85);border:1px solid #3d2a5e;color:#c084fc;font-size:0.82rem;font-weight:700;text-decoration:none;backdrop-filter:blur(8px);transition:all 0.2s;" onmouseover="this.style.background='rgba(45,31,78,0.95)'" onmouseout="this.style.background='rgba(13,10,26,0.85)'">🏠 홈</a>
<div id="hud">
  <div class="hud-box">🏹 화살: <span id="arrows">1</span></div>
  <div class="hud-box">🌊 웨이브: <span id="wave">1</span></div>
  <div class="hud-box">💀 처치: <span id="kills">0</span></div>
</div>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>🏹 Arrow Survivor</h1>
  <p>화살을 조준해서 곱하기 게이트로 강화하고<br>적을 처치하세요!</p>
  <button id="start-btn" onclick="startGame()">게임 시작</button>
</div>
<script>
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
let W,H;

function resize(){
  W=cv.width=Math.min(window.innerWidth,480);
  H=cv.height=window.innerHeight;
}
resize();
window.addEventListener('resize',()=>{resize();});

let arrows=[],gates=[],enemies=[],particles=[];
let arrowCount=1,wave=1,kills=0,running=false;
let aimX=W/2,dragging=false,lastFired=0;
const FIRE_RATE=1500;

function startGame(){
  document.getElementById('overlay').style.display='none';
  arrows=[]; gates=[]; enemies=[]; particles=[];
  arrowCount=1; wave=1; kills=0;
  running=true;
  spawnWave();
  loop();
}

function spawnWave(){
  // 게이트 (곱/나누기/더하기/빼기) 여러 쌍
  for(let i=0;i<2+wave;i++){
    const y=H*0.3-i*130;
    const ops=getGatePair();
    const x1=W*0.25+Math.random()*W*0.1;
    const x2=W*0.55+Math.random()*W*0.1;
    gates.push({x:x1,y,w:70,h:36,op:ops[0],vy:1+wave*0.3,hit:false});
    gates.push({x:x2,y,w:70,h:36,op:ops[1],vy:1+wave*0.3,hit:false});
  }
  // 적
  for(let i=0;i<3+wave*2;i++){
    const hp=Math.ceil((1+wave)*1.5);
    enemies.push({
      x:W*0.1+Math.random()*W*0.8, y:-60-i*80,
      hp,maxHp:hp, r:22,vy:0.8+wave*0.15,
      color:`hsl(${Math.random()*40},80%,55%)`
    });
  }
  updateHUD();
}

function getGatePair(){
  const types=[
    ['×2','÷2'],['×2','÷2'],['+3','-2'],['×2','+2'],
    ['+5','÷2'],['+3','-3'],['×2','-3'],['+4','-2']
  ];
  return types[Math.floor(Math.random()*types.length)];
}

function applyGate(op){
  const n=parseInt(op.replace(/[×÷+\-]/,''));
  if(op[0]==='×')arrowCount=Math.min(12,arrowCount*n);
  else if(op[0]==='÷')arrowCount=Math.max(1,Math.floor(arrowCount/n));
  else if(op[0]==='+')arrowCount=Math.min(12,arrowCount+n);
  else if(op[0]==='-')arrowCount=Math.max(1,arrowCount-n);
}

function fireArrows(){
  const spread=Math.min(arrowCount-1,9);
  for(let i=0;i<arrowCount;i++){
    const offset=(arrowCount>1?(i/(arrowCount-1)-0.5)*spread*10:0);
    arrows.push({
      x:aimX+offset, y:H*0.85,
      vx:offset*0.2, vy:-10,
      r:5, bounces:0
    });
  }
}

let animId;
function loop(){
  if(!running){cancelAnimationFrame(animId);return;}
  update();
  draw();
  animId=requestAnimationFrame(loop);
}

function update(){
  const now=Date.now();
  // 자동 발사
  if(now-lastFired>FIRE_RATE){lastFired=now;fireArrows();}

  // 화살 이동
  for(let a of arrows){
    a.x+=a.vx; a.y+=a.vy;
    a.vy+=0.18; // 중력
    // 벽 반사
    if(a.x<5){a.x=5;a.vx=Math.abs(a.vx);}
    if(a.x>W-5){a.x=W-5;a.vx=-Math.abs(a.vx);}
  }
  arrows=arrows.filter(a=>a.y<H+20);

  // 게이트 이동 + 화살 충돌
  for(let g of gates){
    g.y+=g.vy;
    if(!g.hit){
      for(let a of arrows){
        if(a.x>g.x&&a.x<g.x+g.w&&a.y>g.y&&a.y<g.y+g.h){
          if(!g.hit){g.hit=true;applyGate(g.op);updateHUD();spawnParticles(g.x+g.w/2,g.y,g.op[0]==='×'?'#22c55e':'#f87171',8);}
        }
      }
    }
  }
  gates=gates.filter(g=>g.y<H+60&&!g.hit);

  // 적 이동 + 화살 충돌
  for(let e of enemies){
    e.y+=e.vy;
    for(let a of arrows){
      if(Math.hypot(a.x-e.x,a.y-e.y)<e.r+a.r){
        e.hp--;
        a.vy=-Math.abs(a.vy)*0.5;
        spawnParticles(e.x,e.y,'#f87171',3);
        if(e.hp<=0){e.dead=true;kills++;spawnParticles(e.x,e.y,'#fbbf24',10);a.dead=true;}
        break;
      }
    }
    if(e.y>H+40)e.dead=true;
  }
  arrows=arrows.filter(a=>!a.dead);
  enemies=enemies.filter(e=>!e.dead);

  // 파티클
  for(let p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;}
  particles=particles.filter(p=>p.life>0);

  // 다음 웨이브
  if(enemies.length===0&&gates.length===0){
    wave++;
    setTimeout(()=>{spawnWave();},1500);
  }
  updateHUD();
}

function draw(){
  ctx.fillStyle='#0d0a1a';
  ctx.fillRect(0,0,W,H);

  // 배경 그리드
  ctx.strokeStyle='#1a1030';ctx.lineWidth=1;
  for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // 게이트
  for(let g of gates){
    const good=g.op[0]==='×'||g.op[0]==='+';
    ctx.fillStyle=good?'rgba(34,197,94,0.2)':'rgba(248,113,113,0.2)';
    ctx.strokeStyle=good?'#22c55e':'#f87171';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(g.x,g.y,g.w,g.h,8);ctx.fill();ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
    ctx.fillText(g.op,g.x+g.w/2,g.y+g.h/2+6);
  }

  // 적
  for(let e of enemies){
    ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
    ctx.fillStyle=e.color;ctx.fill();
    // HP바
    const bw=e.r*2.5,bh=5;
    ctx.fillStyle='#333';ctx.fillRect(e.x-bw/2,e.y-e.r-10,bw,bh);
    ctx.fillStyle='#22c55e';ctx.fillRect(e.x-bw/2,e.y-e.r-10,bw*(e.hp/e.maxHp),bh);
    ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('👾',e.x,e.y+5);
  }

  // 화살
  for(let a of arrows){
    ctx.fillStyle='#c084fc';
    ctx.beginPath();
    ctx.save();ctx.translate(a.x,a.y);
    const ang=Math.atan2(a.vy,a.vx);
    ctx.rotate(ang+Math.PI/2);
    ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(-4,4);ctx.lineTo(4,4);ctx.closePath();
    ctx.fill();ctx.restore();
  }

  // 파티클
  for(let p of particles){
    ctx.globalAlpha=p.life/30;
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.fill();
  }
  ctx.globalAlpha=1;

  // 발사 위치
  ctx.strokeStyle='#c084fc44';ctx.lineWidth=2;
  ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(aimX,H*0.85);ctx.lineTo(aimX,H*0.75);ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();ctx.arc(aimX,H*0.85,8,0,Math.PI*2);
  ctx.fillStyle='#c084fc';ctx.fill();
}

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*3+1;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:30,color});
  }
}

function updateHUD(){
  document.getElementById('arrows').textContent=arrowCount;
  document.getElementById('wave').textContent=wave;
  document.getElementById('kills').textContent=kills;
}

// 마우스/터치로 조준
function setAim(x){aimX=Math.max(20,Math.min(W-20,x));}
cv.addEventListener('mousemove',e=>{if(running)setAim(e.offsetX);});
cv.addEventListener('touchmove',e=>{e.preventDefault();if(running)setAim(e.touches[0].clientX-cv.getBoundingClientRect().left);},{passive:false});
</script>
</body>
</html>
