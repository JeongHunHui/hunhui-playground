<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>💕 연애 시뮬레이션</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0a1a;color:#f0e6ff;font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}

/* ========= 캐릭터 선택 ========= */
#char-select{text-align:center;padding:24px;}
#char-select h1{font-size:2rem;color:#c084fc;margin-bottom:6px;}
#char-select p{color:#7c6a9a;margin-bottom:32px;}
.chars{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.char-card{
  background:linear-gradient(160deg,#1a1030,#251540);
  border:2px solid #3d2a5e;border-radius:20px;padding:0;
  cursor:pointer;width:180px;overflow:hidden;transition:all 0.25s;
}
.char-card:hover{border-color:#c084fc;transform:translateY(-6px);box-shadow:0 12px 40px #c084fc44;}
.char-img{width:100%;height:220px;object-fit:contain;display:block;background:#1a1030;padding:10px;}
.char-info{padding:14px;}
.char-name{font-weight:700;font-size:1.05rem;color:#e2d4ff;margin-bottom:4px;}
.char-sub{font-size:0.76rem;color:#7c6a9a;line-height:1.5;}

/* ========= 비주얼 노벨 ========= */
#vn{display:none;width:100%;max-width:680px;position:relative;}
#scene-bg{
  width:100%;height:380px;border-radius:16px 16px 0 0;
  background:linear-gradient(160deg,#0f0820 0%,#1e0f3a 50%,#2d1040 100%);
  position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;
}
#bg-overlay{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 120%,#7c3aed18 0%,transparent 70%);
}
#char-sprite{
  height:340px;width:auto;object-fit:contain;object-position:top;
  position:relative;z-index:1;transition:opacity 0.4s,transform 0.4s;filter:drop-shadow(0 0 20px #c084fc44);
}
/* 감정별 효과 */
.emote-happy #char-sprite{filter:drop-shadow(0 0 24px #f9a8d488);}
.emote-sad #char-sprite{filter:drop-shadow(0 0 24px #60a5fa88) brightness(0.9);}
.emote-shy #char-sprite{filter:drop-shadow(0 0 24px #fb923c88);}
.emote-excited #char-sprite{filter:drop-shadow(0 0 30px #fde04788);}

#particles-bg{position:absolute;inset:0;pointer-events:none;z-index:0;}

/* 호감도 */
#aff-bar-wrap{background:#0a0818;padding:8px 16px;display:flex;align-items:center;gap:10px;}
#aff-label{font-size:0.75rem;color:#7c6a9a;white-space:nowrap;}
#aff-bg{flex:1;background:#1a1030;border-radius:99px;height:8px;overflow:hidden;}
#aff-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#7c3aed,#ec4899);transition:width 0.5s;}
#aff-num{font-size:0.75rem;color:#c084fc;white-space:nowrap;}

/* 대화창 */
#dialog-box{
  background:rgba(10,8,24,0.95);border:1px solid #3d2a5e;
  border-radius:0 0 16px 16px;padding:20px;
  backdrop-filter:blur(10px);
}
#speaker-badge{
  display:inline-block;background:#2d1f4e;border:1px solid #7c3aed;
  border-radius:20px;padding:4px 14px;font-size:0.82rem;
  color:#c084fc;margin-bottom:10px;font-weight:700;
}
#dialog-text{
  font-size:0.95rem;line-height:1.9;color:#e2d4ff;
  min-height:60px;white-space:pre-wrap;margin-bottom:16px;
}
#choices{display:flex;flex-direction:column;gap:8px;}
.choice{
  padding:12px 16px;border-radius:10px;border:1px solid #3d2a5e;
  background:#120a28;color:#d4c0f8;cursor:pointer;font-size:0.88rem;
  text-align:left;transition:all 0.18s;
}
.choice:hover{background:#1e1040;border-color:#c084fc;transform:translateX(4px);}

/* ========= 엔딩 ========= */
#ending{display:none;text-align:center;padding:40px 24px;max-width:480px;}
#ending-img{width:160px;height:160px;border-radius:50%;object-fit:cover;object-position:top;border:3px solid #c084fc;margin-bottom:20px;filter:drop-shadow(0 0 20px #c084fc66);}
#ending h2{font-size:1.8rem;margin-bottom:12px;}
#ending-sub{color:#9f8ab8;line-height:1.8;margin-bottom:28px;}
.restart{
  padding:12px 32px;border-radius:99px;border:none;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  color:#fff;font-size:1rem;cursor:pointer;font-weight:700;
}
</style>
</head>

const canvas = document.getElementById('particles-bg');
const pctx = canvas.getContext('2d');
let ptcls = Array.from({length:30},()=>({
  x:Math.random()*680, y:Math.random()*380,
  vx:(Math.random()-0.5)*0.3, vy:-Math.random()*0.5-0.2,
  r:Math.random()*2+0.5, life:Math.random()
}));
function animPtcl(){
  pctx.clearRect(0,0,680,380);
  for(let p of ptcls){
    p.x+=p.vx; p.y+=p.vy; p.life+=0.003;
    if(p.y<0||p.life>1){p.y=380;p.x=Math.random()*680;p.life=0;}
    pctx.globalAlpha=Math.sin(p.life*Math.PI)*0.5;
    pctx.beginPath();pctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    pctx.fillStyle='#c084fc';pctx.fill();
  }
  requestAnimationFrame(animPtcl);
}
animPtcl();

function startGame(id){
  charId=id; affection=0; sceneIdx=0;
  document.getElementById('char-select').style.display='none';
  document.getElementById('vn').style.display='block';
  document.getElementById('speaker-badge').textContent=CHARS[id].badge;
  document.getElementById('scene-bg').style.background=CHARS[id].bg;
  renderScene();
}

function setSprite(emote){
  const sp=document.getElementById('char-sprite');
  const url=CHARS[charId].sprites[emote]||CHARS[charId].sprites.normal;
  sp.style.opacity='0'; sp.style.transform='scale(0.95)';
  setTimeout(()=>{
    sp.src=url;
    sp.style.opacity='1'; sp.style.transform='scale(1)';
  },150);
  const bg=document.getElementById('scene-bg');
  bg.className=''; bg.classList.add(`emote-${emote}`);
}

function renderScene(){
  const s=SCENARIOS[charId][sceneIdx];
  setSprite(s.emote);
  typeText(s.text);
  updateBar();
  const ch=document.getElementById('choices');
  ch.innerHTML='';
  s.choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='choice'; btn.textContent=c.text;
    btn.onclick=()=>choose(c);
    ch.appendChild(btn);
  });
}

let typeTimeout=null;
function typeText(text){
  const el=document.getElementById('dialog-text');
  el.textContent='';
  let i=0;
  if(typeTimeout) clearInterval(typeTimeout);
  typeTimeout=setInterval(()=>{
    el.textContent=text.slice(0,++i);
    if(i>=text.length) clearInterval(typeTimeout);
  },28);
}

function choose(c){
  affection=Math.min(100,Math.max(0,affection+c.delta));
  setSprite(c.emote);
  sceneIdx++;
  updateBar();
  if(sceneIdx>=SCENARIOS[charId].length){setTimeout(showEnding,400);return;}
  document.getElementById('choices').innerHTML='<div style="color:#7c6a9a;text-align:center;padding:16px;">...</div>';
  setTimeout(renderScene,700);
}

function updateBar(){
  document.getElementById('aff-fill').style.width=affection+'%';
  document.getElementById('aff-num').textContent=affection+' / 100';
}

function showEnding(){
  document.getElementById('vn').style.display='none';
  const ed=document.getElementById('ending');
  ed.style.display='block';
  const e=ENDINGS.find(e=>affection>=e.min&&affection<=e.max)||ENDINGS[0];
  document.getElementById('ending-img').src=CHARS[charId].sprites.happy;
  document.getElementById('ending-title').textContent=e.emoji+' '+e.title;
  document.getElementById('ending-sub').textContent=e.sub;
}

function restart(){
  affection=0;sceneIdx=0;
  document.getElementById('ending').style.display='none';
  document.getElementById('char-select').style.display='block';
}
</script>
</body>
</html>
