body{background:#0d0a1a;color:#f0e6ff;font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}

<script>
// ══════════════════════════════════════
// 애니 스타일 캐릭터 드로잉 함수
// ══════════════════════════════════════
function drawAnimeChar(ctx, config, w, h) {
  const { skin, hair, hairColor, eyeColor, expression, gender, outfit } = config;
  const cx = w / 2;
  // 배경 그라디언트
  const bg = ctx.createLinearGradient(0, 0, 0, h);
  bg.addColorStop(0, config.bgTop || '#1a1030');
  bg.addColorStop(1, config.bgBot || '#0d0820');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h);

  const faceY = h * 0.32, faceR = w * 0.24;
  const bodyTop = faceY + faceR * 0.8;

  // ── 몸통 ──
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx - faceR * 1.1, h);
  ctx.lineTo(cx - faceR * 0.9, bodyTop + 10);
  ctx.bezierCurveTo(cx - faceR * 0.6, bodyTop, cx + faceR * 0.6, bodyTop, cx + faceR * 0.9, bodyTop + 10);
  ctx.lineTo(cx + faceR * 1.1, h);
  ctx.closePath();
  ctx.fillStyle = outfit.body; ctx.fill();
  // 옷 디테일
  ctx.beginPath();
  ctx.moveTo(cx, bodyTop + 15);
  ctx.lineTo(cx - 8, bodyTop + 60);
  ctx.lineTo(cx + 8, bodyTop + 60);
  ctx.closePath();
  ctx.fillStyle = outfit.collar; ctx.fill();
  ctx.restore();

  // ── 목 ──
  ctx.beginPath();
  ctx.rect(cx - faceR * 0.18, faceY + faceR * 0.85, faceR * 0.36, faceR * 0.35);
  ctx.fillStyle = skin; ctx.fill();

  // ── 앞머리 ──
  ctx.save();
  if (gender === 'f') {
    // 여자 - 긴 머리 양옆
    ctx.beginPath();
    ctx.moveTo(cx - faceR, faceY - faceR * 0.3);
    ctx.bezierCurveTo(cx - faceR * 1.4, faceY + faceR * 0.5, cx - faceR * 1.5, faceY + faceR * 1.5, cx - faceR * 1.1, h);
    ctx.lineTo(cx - faceR * 0.9, h);
    ctx.bezierCurveTo(cx - faceR * 1.2, faceY + faceR * 1.2, cx - faceR * 1.0, faceY + faceR * 0.3, cx - faceR * 0.7, faceY - faceR * 0.1);
    ctx.closePath();
    ctx.fillStyle = hairColor; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx + faceR, faceY - faceR * 0.3);
    ctx.bezierCurveTo(cx + faceR * 1.4, faceY + faceR * 0.5, cx + faceR * 1.5, faceY + faceR * 1.5, cx + faceR * 1.1, h);
    ctx.lineTo(cx + faceR * 0.9, h);
    ctx.bezierCurveTo(cx + faceR * 1.2, faceY + faceR * 1.2, cx + faceR * 1.0, faceY + faceR * 0.3, cx + faceR * 0.7, faceY - faceR * 0.1);
    ctx.closePath();
    ctx.fillStyle = hairColor; ctx.fill();
  } else {
    // 남자 - 짧은 머리 양옆
    ctx.beginPath();
    ctx.moveTo(cx - faceR * 0.85, faceY - faceR * 0.5);
    ctx.bezierCurveTo(cx - faceR * 1.2, faceY, cx - faceR * 1.1, faceY + faceR * 0.6, cx - faceR * 0.95, faceY + faceR * 0.9);
    ctx.lineTo(cx - faceR * 0.8, faceY + faceR * 0.7);
    ctx.bezierCurveTo(cx - faceR * 0.9, faceY + faceR * 0.3, cx - faceR * 0.8, faceY - faceR * 0.1, cx - faceR * 0.6, faceY - faceR * 0.3);
    ctx.closePath();
    ctx.fillStyle = hairColor; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx + faceR * 0.85, faceY - faceR * 0.5);
    ctx.bezierCurveTo(cx + faceR * 1.2, faceY, cx + faceR * 1.1, faceY + faceR * 0.6, cx + faceR * 0.95, faceY + faceR * 0.9);
    ctx.lineTo(cx + faceR * 0.8, faceY + faceR * 0.7);
    ctx.bezierCurveTo(cx + faceR * 0.9, faceY + faceR * 0.3, cx + faceR * 0.8, faceY - faceR * 0.1, cx + faceR * 0.6, faceY - faceR * 0.3);
    ctx.closePath();
    ctx.fillStyle = hairColor; ctx.fill();
  }
  ctx.restore();

  // ── 얼굴 ──
  ctx.beginPath();
  ctx.ellipse(cx, faceY, faceR, faceR * 1.1, 0, 0, Math.PI * 2);
  ctx.fillStyle = skin; ctx.fill();

  // ── 머리카락 (얼굴 위) ──
  ctx.save();
  ctx.beginPath();
  if (gender === 'f') {
    // 긴 앞머리
    ctx.ellipse(cx, faceY - faceR * 0.6, faceR * 1.1, faceR * 0.65, 0, Math.PI, Math.PI * 2);
  } else {
    // 짧은 덮개형
    ctx.ellipse(cx, faceY - faceR * 0.55, faceR * 1.05, faceR * 0.6, 0, Math.PI, Math.PI * 2);
  }
  ctx.fillStyle = hairColor; ctx.fill();
  // 앞머리 가닥
  if (gender === 'f') {
    const bangCount = config.bangs || 5;
    for (let i = 0; i < bangCount; i++) {
      const bx = cx - faceR * 0.7 + i * (faceR * 1.4 / (bangCount - 1));
      const by1 = faceY - faceR * 0.2;
      const by2 = faceY - faceR * 0.02 + (i % 2 === 0 ? 6 : 0);
      ctx.beginPath();
      ctx.moveTo(bx - 6, faceY - faceR * 0.55);
      ctx.bezierCurveTo(bx - 4, by1, bx + 2, by1 + 5, bx + 1, by2);
      ctx.bezierCurveTo(bx - 2, by2 + 3, bx - 8, by1 + 2, bx - 6, faceY - faceR * 0.55);
      ctx.closePath();
      ctx.fillStyle = hairColor; ctx.fill();
    }
  } else {
    // 남자 앞머리 - 한쪽으로 쓸린 느낌
    ctx.beginPath();
    ctx.moveTo(cx - faceR * 0.5, faceY - faceR * 0.6);
    ctx.bezierCurveTo(cx - faceR * 0.2, faceY - faceR * 0.15, cx + faceR * 0.3, faceY - faceR * 0.1, cx + faceR * 0.6, faceY - faceR * 0.55);
    ctx.bezierCurveTo(cx + faceR * 0.4, faceY - faceR * 0.02, cx - faceR * 0.1, faceY - faceR * 0.05, cx - faceR * 0.5, faceY - faceR * 0.6);
    ctx.closePath();
    ctx.fillStyle = hairColor; ctx.fill();
  }
  ctx.restore();

  // ── 눈썹 ──
  const eyeY = faceY - faceR * 0.08;
  const eyeGap = faceR * 0.38;
  ctx.lineWidth = gender === 'f' ? 1.8 : 2.5;
  ctx.strokeStyle = hairColor;
  ctx.lineCap = 'round';
  [cx - eyeGap, cx + eyeGap].forEach((ex, i) => {
    const flip = i === 0 ? -1 : 1;
    ctx.beginPath();
    if (expression === 'sad') {
      ctx.moveTo(ex - faceR * 0.18, eyeY - faceR * 0.18 + flip * 3);
      ctx.quadraticCurveTo(ex, eyeY - faceR * 0.22, ex + faceR * 0.18, eyeY - faceR * 0.16 - flip * 3);
    } else if (expression === 'shy') {
      ctx.moveTo(ex - faceR * 0.18, eyeY - faceR * 0.2);
      ctx.quadraticCurveTo(ex, eyeY - faceR * 0.26, ex + faceR * 0.18, eyeY - faceR * 0.2);
    } else {
      ctx.moveTo(ex - faceR * 0.18, eyeY - faceR * 0.22);
      ctx.quadraticCurveTo(ex, eyeY - faceR * 0.28, ex + faceR * 0.18, eyeY - faceR * 0.22);
    }
    ctx.stroke();
  });

  // ── 눈 ──
  const eyeSize = gender === 'f' ? faceR * 0.22 : faceR * 0.18;
  [cx - eyeGap, cx + eyeGap].forEach(ex => {
    // 흰자
    ctx.beginPath();
    ctx.ellipse(ex, eyeY, eyeSize, eyeSize * (expression === 'happy' ? 0.72 : 0.82), 0, 0, Math.PI * 2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.strokeStyle = '#bbb'; ctx.lineWidth = 0.5; ctx.stroke();
    // 홍채 (크고 진함)
    ctx.beginPath();
    ctx.ellipse(ex, eyeY + 2, eyeSize * 0.72, eyeSize * (expression === 'happy' ? 0.6 : 0.7), 0, 0, Math.PI * 2);
    ctx.fillStyle = eyeColor; ctx.fill();
    // 동공
    ctx.beginPath();
    ctx.ellipse(ex + 1, eyeY + 2, eyeSize * 0.35, eyeSize * 0.38, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#111'; ctx.fill();
    // 하이라이트
    ctx.beginPath();
    ctx.ellipse(ex - eyeSize * 0.22, eyeY - eyeSize * 0.15, eyeSize * 0.22, eyeSize * 0.22, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.fill();
    ctx.beginPath();
    ctx.ellipse(ex + eyeSize * 0.2, eyeY + eyeSize * 0.15, eyeSize * 0.1, eyeSize * 0.1, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();
    // 속눈썹 (여성)
    if (gender === 'f') {
      ctx.strokeStyle = '#1a0a00'; ctx.lineWidth = 1.5;
      for (let a = -0.7; a <= 0.7; a += 0.23) {
        ctx.beginPath();
        ctx.moveTo(ex + Math.cos(a) * eyeSize, eyeY - Math.sin(Math.abs(a)) * eyeSize * 0.85);
        ctx.lineTo(ex + Math.cos(a) * (eyeSize + 5), eyeY - Math.sin(Math.abs(a)) * eyeSize * 0.85 - 4);
        ctx.stroke();
      }
    }
  });

  // ── 코 ──
  ctx.beginPath();
  ctx.moveTo(cx - 3, faceY + faceR * 0.2);
  ctx.lineTo(cx + 3, faceY + faceR * 0.2);
  ctx.strokeStyle = skin === '#f2d3b1' ? '#c9a080' : '#c09070';
  ctx.lineWidth = 1.2; ctx.stroke();

  // ── 입 ──
  const mouthY = faceY + faceR * 0.52;
  ctx.lineWidth = 1.8; ctx.lineCap = 'round';
  if (expression === 'happy') {
    ctx.beginPath();
    ctx.moveTo(cx - faceR * 0.22, mouthY - 3);
    ctx.quadraticCurveTo(cx, mouthY + 8, cx + faceR * 0.22, mouthY - 3);
    ctx.strokeStyle = '#c07060'; ctx.stroke();
    // 치아
    ctx.beginPath();
    ctx.moveTo(cx - faceR * 0.14, mouthY);
    ctx.quadraticCurveTo(cx, mouthY + 6, cx + faceR * 0.14, mouthY);
    ctx.fillStyle = '#fff4'; ctx.fill();
  } else if (expression === 'shy') {
    ctx.beginPath();
    ctx.arc(cx, mouthY, faceR * 0.1, 0, Math.PI);
    ctx.strokeStyle = '#c07060'; ctx.stroke();
    // 볼터치
    [cx - faceR * 0.55, cx + faceR * 0.55].forEach(bx => {
      ctx.beginPath();
      ctx.ellipse(bx, faceY + faceR * 0.3, faceR * 0.18, faceR * 0.1, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,150,150,0.3)'; ctx.fill();
    });
  } else if (expression === 'sad') {
    ctx.beginPath();
    ctx.moveTo(cx - faceR * 0.2, mouthY + 2);
    ctx.quadraticCurveTo(cx, mouthY - 4, cx + faceR * 0.2, mouthY + 2);
    ctx.strokeStyle = '#c07060'; ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.moveTo(cx - faceR * 0.18, mouthY);
    ctx.quadraticCurveTo(cx, mouthY + 4, cx + faceR * 0.18, mouthY);
    ctx.strokeStyle = '#c07060'; ctx.stroke();
  }

  // ── 귀 ──
  [-1, 1].forEach(s => {
    ctx.beginPath();
    ctx.ellipse(cx + s * faceR, faceY + faceR * 0.08, faceR * 0.14, faceR * 0.18, 0, 0, Math.PI * 2);
    ctx.fillStyle = skin; ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + s * faceR, faceY + faceR * 0.08, faceR * 0.08, faceR * 0.1, 0, 0, Math.PI * 2);
    ctx.fillStyle = skin === '#f2d3b1' ? '#e8a888' : '#c89060'; ctx.fill();
  });
}

// 카드 그리기
function drawCards() {
  Object.entries(CHARS).forEach(([id, c]) => {
    const cv = document.getElementById('card-' + id);
    const ctx = cv.getContext('2d');
    drawAnimeChar(ctx, { ...c, expression: 'normal' }, 180, 220);
  });
}
drawCards();

// 파티클
const bgCv = document.getElementById('bg-canvas');
const bctx = bgCv.getContext('2d');
let ptcls = [];
function initParticles(w, h) {
  ptcls = Array.from({ length: 25 }, () => ({
    x: Math.random() * w, y: Math.random() * h,
    vx: (Math.random() - 0.5) * 0.3, vy: -Math.random() * 0.4 - 0.1,
    r: Math.random() * 1.8 + 0.5, life: Math.random(),
  }));
}
function animBg(w, h, bgColor) {
  bgCv.width = w; bgCv.height = h;
  initParticles(w, h);
  const bg = bctx.createLinearGradient(0, 0, 0, h);
  const stops = bgColor.match(/#[0-9a-f]+/gi) || ['#0f0820', '#0d0820'];
  bg.addColorStop(0, stops[0]); bg.addColorStop(1, stops[1] || stops[0]);
  function frame() {
    bctx.clearRect(0, 0, w, h);
    bctx.fillStyle = bg; bctx.fillRect(0, 0, w, h);
    for (let p of ptcls) {
      p.x += p.vx; p.y += p.vy; p.life += 0.003;
      if (p.y < 0 || p.life > 1) { p.y = h; p.x = Math.random() * w; p.life = 0; }
      bctx.globalAlpha = Math.sin(p.life * Math.PI) * 0.5;
      bctx.beginPath(); bctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      bctx.fillStyle = '#c084fc'; bctx.fill();
    }
    bctx.globalAlpha = 1;
    requestAnimationFrame(frame);
  }
  frame();
}

let affection = 0, charId = '', sceneIdx = 0, currentEmote = 'normal';
const scCv = document.getElementById('scene-canvas');
const scCtx = scCv.getContext('2d');

const SCENARIOS = {
  yuna: [
    { emote: 'normal', text: '카페에서 책을 읽고 있는 유나를 발견했어.\n조용히 앉아 있는 모습이 뭔가 끌렸어.', choices: [

  { min: 0,  max: 29,  emoji: '💔', title: '짝사랑으로 끝...', sub: '인연이 닿지 않았어.\n다음엔 더 용감하게 해봐!' },
  { min: 30, max: 59,  emoji: '🌱', title: '소중한 인연',       sub: '친구 이상, 연인 미만.\n한 걸음만 더 다가갔더라면...' },
  { min: 60, max: 84,  emoji: '💜', title: '설레는 시작 ✨',   sub: '서로에게 마음이 생겼어.\n곧 되겠지? 💕' },
  { min: 85, max: 100, emoji: '💕', title: '해피엔딩! 🎉',    sub: '완벽한 커플이 됐어 💑\n오래오래 행복하게! ✨' },
];

function drawSprite(emote) {
  const c = CHARS[charId];
  scCv.width = 300; scCv.height = 360;
  scCtx.clearRect(0, 0, 300, 360);
  drawAnimeChar(scCtx, { ...c, expression: emote, bgTop: 'transparent', bgBot: 'transparent' }, 300, 360);
}

function startGame(id) {
  charId = id; affection = 0; sceneIdx = 0;
  document.getElementById('char-select').style.display = 'none';
  document.getElementById('vn').style.display = 'block';
  const bg = document.getElementById('scene-bg');
  const c = CHARS[id];
  bg.style.background = c.bg;
  document.getElementById('speaker-badge').textContent = c.badge;
  // 배경 파티클
  const rect = bg.getBoundingClientRect();
  animBg(rect.width || 660, 370, c.bg);
  renderScene();
}

function renderScene() {
  const s = SCENARIOS[charId][sceneIdx];
  drawSprite(s.emote);
  typeText(s.text);
  updateBar();
  const ch = document.getElementById('choices');
  ch.innerHTML = '';
  s.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice'; btn.textContent = c.text;
    btn.onclick = () => choose(c);
    ch.appendChild(btn);
  });
}

let typeT = null;
function typeText(text) {
  const el = document.getElementById('dialog-text');
  el.textContent = ''; let i = 0;
  if (typeT) clearInterval(typeT);
  typeT = setInterval(() => { el.textContent = text.slice(0, ++i); if (i >= text.length) clearInterval(typeT); }, 28);
}

function choose(c) {
  affection = Math.min(100, Math.max(0, affection + c.delta));
  drawSprite(c.emote);
  sceneIdx++; updateBar();
  if (sceneIdx >= SCENARIOS[charId].length) { setTimeout(showEnding, 400); return; }
  document.getElementById('choices').innerHTML = '<div style="color:#7c6a9a;text-align:center;padding:16px;">...</div>';
  setTimeout(renderScene, 700);
}
function updateBar() {
  document.getElementById('aff-fill').style.width = affection + '%';
  document.getElementById('aff-num').textContent = affection + ' / 100';
}
function showEnding() {
  document.getElementById('vn').style.display = 'none';
  const ed = document.getElementById('ending');
  ed.style.display = 'block';
  const e = ENDINGS.find(e => affection >= e.min && affection <= e.max) || ENDINGS[0];
  // 엔딩 캐릭터 그리기
  const ecv = document.getElementById('ending-canvas');
  const ectx = ecv.getContext('2d');
  ectx.clearRect(0, 0, 160, 160);
  // 원형 클립
  ectx.save(); ectx.beginPath(); ectx.arc(80, 80, 78, 0, Math.PI * 2); ectx.clip();
  drawAnimeChar(ectx, { ...CHARS[charId], expression: affection >= 60 ? 'happy' : 'sad' }, 160, 160);
  ectx.restore();
  document.getElementById('ending-title').textContent = e.emoji + ' ' + e.title;
  document.getElementById('ending-sub').textContent = e.sub;
}
function restart() {
  affection = 0; sceneIdx = 0;
  document.getElementById('ending').style.display = 'none';
  document.getElementById('char-select').style.display = 'block';
}
